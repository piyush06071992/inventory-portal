<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Restricted - Business Saarthi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; color: #333333; }
        .billing-container { max-width: 500px; margin: 80px auto; }
        .card-billing { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05); background: #ffffff; overflow: hidden; }
        .accent-bar { height: 6px; background: linear-gradient(90deg, #dc3545, #fd7e14); }
        .rent-badge { font-size: 2.5rem; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
        .btn-pay { background: #1e3a8a; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 600; }
        .btn-pay:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container billing-container px-3">
    <div class="card card-billing">
        <div class="accent-bar"></div>
        <div class="card-body p-4 p-md-5 text-center">
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill text-danger" style="font-size: 3.5rem;"></i>
                <h2 class="fw-bold mt-2">Workspace Locked</h2>
                <p class="text-muted">Your utility features are restricted due to outstanding dues.</p>
            </div>

            <div class="bg-light rounded-3 p-3 mb-4">
                <span class="text-uppercase text-muted fw-semibold small d-block mb-1">Platform Renewal Fee</span>
                <div class="rent-badge">₹50.00</div>
                
                <button onclick="payNow()" class="btn-pay shadow-sm">
                    <i class="bi bi-credit-card-2-front-fill"></i> Pay ₹50 Now (Secure)
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuyDgbmychMjHGupeoZV21vv_Z0n7WyoY",
        authDomain: "business-saarthi.firebaseapp.com",
        databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
        projectId: "business-saarthi",
        storageBucket: "business-saarthi.firebasestorage.app",
        messagingSenderId: "556256084111",
        appId: "1:556256084111:web:b06208d94c5f5cae3170fa"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

    function payNow() {
        const shopPhone = localStorage.getItem("activeUserPhone");
        if (!shopPhone) { alert("Session error. Please login again."); return; }
        
        var options = {
            "key": "rzp_test_SWvXVaTqZIFGII", 
            "amount": "5000", 
            "currency": "INR",
            "name": "Business Saarthi",
            "description": "Platform Renewal Fee",
            "handler": function (response){
                // Calculate new dates
                const newTrial = new Date();
                newTrial.setDate(newTrial.getDate() + 30);
                const newLockout = new Date();
                newLockout.setDate(newLockout.getDate() + 60);

                // Auto-Unlock in Firebase
                firebase.database().ref(`shops/${shopPhone}`).update({
                    paymentStatus: "PAID",
                    trialEndsAt: newTrial.toISOString(),
                    lockoutEndsAt: newLockout.toISOString(),
                    paymentId: response.razorpay_payment_id
                }).then(() => {
                    firebase.database().ref(`users/${shopPhone}`).update({ portalStatus: "active" })
                    .then(() => { window.location.href = "dashboard.html"; });
                });
            },
            "prefill": { "contact": shopPhone }
        };
        var rzp1 = new Razorpay(options);
        rzp1.open();
    }
</script>
</body>
</html>
