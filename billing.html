<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Restricted - Business Saarthi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            color: #333333;
        }
        .billing-container {
            max-width: 550px;
            margin: 40px auto;
        }
        .card-billing {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            overflow: hidden;
        }
        .accent-bar {
            height: 6px;
            background: linear-gradient(90deg, #dc3545, #fd7e14);
        }
        .rent-badge {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e293b;
        }
        .qr-box {
            background: #ffffff;
            padding: 15px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: inline-block;
        }
        .verification-zone {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
        }
        .form-control-utr {
            letter-spacing: 2px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container billing-container px-3">
    <div class="card card-billing">
        <div class="accent-bar"></div>
        <div class="card-body p-4 text-center">
            
            <div class="mb-3">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">Access Restricted</h2>
                <p class="text-muted small">Your workspace is locked due to pending monthly platform rent.</p>
            </div>

            <div class="bg-light rounded-3 p-2 mb-3">
                <span class="text-uppercase text-muted fw-semibold small d-block mb-1">Outstanding Amount</span>
                <div class="rent-badge">₹<span id="display-rent">50.00</span></div>
            </div>

            <div class="mb-3">
                <div class="qr-box shadow-sm">
                    <img id="upi-qr-image" src="" alt="Scan to Pay" style="width: 200px; height: 200px;">
                </div>
                <small class="text-muted d-block mt-2 fw-medium">
                    <i class="bi bi-qr-code-scan"></i> Scan this QR using GPay, PhonePe, or Paytm
                </small>
            </div>

            <div class="verification-zone text-start">
                <h5 class="fw-bold mb-1 text-dark"><i class="bi bi-shield-check text-primary"></i> Instant Verification</h5>
                <p class="text-muted small mb-3">After scanning and completing the transaction, enter your 12-digit UPI Ref / UTR code here to unlock access.</p>
                
                <div class="mb-3">
                    <input type="text" id="utr-input" class="form-control form-control-lg form-control-utr" placeholder="ENTER 12-DIGIT UTR" maxlength="12">
                </div>
                
                <button id="verify-utr-btn" class="btn btn-dark w-100 fw-semibold py-2">
                    Submit Code & Unlock Profile
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // Configured live using your active project variables from image_11deea.jpg
    const firebaseConfig = {
        apiKey: "AIzaSyBuyDgbmychMjHGupeoZV21vv_Z0n7WyoY",
        authDomain: "business-saarthi.firebaseapp.com",
        databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
        projectId: "business-saarthi",
        storageBucket: "business-saarthi.firebasestorage.app",
        messagingSenderId: "556256084111",
        appId: "1:556256084111:web:b06208d94c5f5cae3170fa"
    };
    firebase.initializeApp(firebaseConfig);

    window.onload = function() {
        const shopPhone = sessionStorage.getItem("lockedUserPhone") || "9999999999";
        
        // TESTING MODE: 50 Rupees
        const variableRent = "50"; 
        document.getElementById("display-rent").innerText = parseFloat(variableRent).toFixed(2);

        // Core Target Details
        const personalUPI = "rana.rpiyush.piyush826@okhdfcbank.com"; 
        const merchantName = "Piyush Rana"; 
        const txnRefNote = encodeURIComponent(`Saarthi Rent ${shopPhone}`);

        // Build standard NPCI string
        const upiRawUrl = `upi://pay?pa=${personalUPI}&pn=${encodeURIComponent(merchantName)}&am=${variableRent}&tn=${txnRefNote}&cu=INR`;

        // Generate dynamic QR image source via open API
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiRawUrl)}`;
        document.getElementById("upi-qr-image").setAttribute("src", qrApiUrl);
    };

    document.getElementById("verify-utr-btn").addEventListener("click", function() {
        const utrValue = document.getElementById("utr-input").value.trim();
        const shopPhone = sessionStorage.getItem("lockedUserPhone") || "unknown";
        const variableRent = "50"; 

        if (utrValue.length !== 12 || isNaN(utrValue)) {
            alert("Invalid Format! Please provide a clean 12-digit numerical UPI UTR Number found on your payment receipt.");
            return;
        }

        firebase.database().ref(`payment_verifications/${utrValue}`).set({
            phone: shopPhone,
            amountPaid: variableRent,
            utr: utrValue,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            status: "pending"
        }).then(() => {
            return firebase.database().ref(`users/${shopPhone}`).update({
                portalStatus: "pending_verification",
                lastSubmittedUtr: utrValue
            });
        }).then(() => {
            window.location.href = "payment-success.html";
        }).catch((err) => {
            alert("Database Error: " + err.message);
        });
    });
</script>
</body>
</html>
