<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Locked - Business Saarthi</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .lock-icon { font-size: 50px; color: var(--accent); margin-bottom: 10px; animation: pulse 2s infinite; }
        .billing-card { background: #F3F4F6; border: 3px dashed var(--navy-blue); border-radius: 12px; padding: 15px; margin: 20px 0; text-align: center; }
        .price-tag { font-size: 28px; color: var(--navy-blue); font-weight: 900; margin: 5px 0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%;">
        <div class="main-container">
            <div class="header-frame">
                <h1>BUSINESS SAARTHI</h1>
            </div>
            <div class="form-content" style="text-align: center;">
                <div class="lock-icon">🔒</div>
                <h2>PORTAL ACCESS LOCKED</h2>
                <p style="color: var(--navy-blue); font-size: 15px; line-height: 1.5;">
                    Your access has expired. Pay your monthly portal rent to instantly unlock your dashboard and resume operations.
                </p>
                <div class="billing-card">
                    <span style="font-size: 12px; font-weight: bold; color: #6B7280;">MONTHLY SUBSCRIPTION</span>
                    <div class="price-tag">₹299 / Month</div>
                </div>

                <button onclick="payViaRazorpay()" style="background-color: #1E40AF; box-shadow: 4px 4px 0px var(--accent); font-weight: 900;">
                    💳 PAY SECURELY VIA RAZORPAY
                </button>

                <div class="toggle-link" onclick="window.location.href='/login.html'" style="margin-top: 20px;">
                    ← BACK TO LOGIN
                </div>
            </div>
        </div>
    </div>

    <script>
        const currentShop = sessionStorage.getItem("lockedUserPhone") || "unknown";

        function payViaRazorpay() {
            if(currentShop === "unknown") {
                alert("Session Error: Please return to login page and try signing in again.");
                window.location.href = '/login.html';
                return;
            }
            
            // Your active Razorpay Payment Page URL
            const baseRazorpayUrl = "https://rzp.io/rzp/Ehul117N"; 
            
            // Appending the phone numbers cleanly to tracking parameters
            window.location.href = `${baseRazorpayUrl}?phone=${currentShop}&notes[shop_phone]=${currentShop}`;
        }
    </script>
</body>
</html>
