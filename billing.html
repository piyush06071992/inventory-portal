<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Billing - Business Saarthi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; }
        .billing-container { max-width: 500px; margin: 80px auto; }
        .card-billing { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05); }
        .btn-pay { background: #1e3a8a; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="container billing-container px-3">
    <div class="card card-billing">
        <div class="card-body p-4 p-md-5 text-center">
            <h2 class="fw-bold">Workspace Locked</h2>
            <p class="text-muted mb-4">Please complete your payment to continue.</p>
            <button onclick="payNow()" class="btn-pay shadow-sm">
                <i class="bi bi-credit-card-2-front-fill"></i> Pay ₹50 Now (Test Mode)
            </button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuyDgbmychMjHGupeoZV21vv_Z0n7WyoY",
        authDomain: "business-saarthi.firebaseapp.com",
        databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
        projectId: "business-saarthi",
        storageBucket: "business-saarthi.firebasestorage.app",
        messagingSenderId: "556256084111",
        appId: "1:556256084111:web:b06208d94c5f5cae3170fa"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

    function payNow() {
        // 1. Get phone from storage OR prompt the user if they are truly disconnected
        let shopPhone = localStorage.getItem("activeUserPhone") || sessionStorage.getItem("activeUserPhone");
        
        if (!shopPhone) {
            shopPhone = prompt("Session not detected. Please enter your registered phone number to unlock your account:");
            if (!shopPhone) return; // Exit if user cancels
        }
        
        var options = {
            "key": "rzp_test_SWvXVaTqZIFGII", 
            "amount": "5000", 
            "currency": "INR",
            "name": "Business Saarthi",
            "description": "Platform Renewal Fee",
            "handler": function (response){
                const newTrial = new Date();
                newTrial.setDate(newTrial.getDate() + 30);
                const newLockout = new Date();
                newLockout.setDate(newLockout.getDate() + 60);

                // Update database using the phone number we found
                firebase.database().ref(`shops/${shopPhone}`).update({
                    paymentStatus: "PAID",
                    trialEndsAt: newTrial.toISOString(),
                    lockoutEndsAt: newLockout.toISOString(),
                    paymentId: response.razorpay_payment_id
                }).then(() => {
                    firebase.database().ref(`users/${shopPhone}`).update({ portalStatus: "active" })
                    .then(() => { 
                        alert("Payment successful! Redirecting to dashboard...");
                        window.location.href = "dashboard.html"; 
                    });
                });
            },
            "prefill": { "contact": shopPhone }
        };
        var rzp1 = new Razorpay(options);
        rzp1.open();
    }
</script>
</body>
</html>
