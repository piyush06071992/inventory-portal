<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Restricted - Business Saarthi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; color: #333333; }
        .billing-container { max-width: 500px; margin: 80px auto; }
        .card-billing { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05); background: #ffffff; overflow: hidden; }
        .accent-bar { height: 6px; background: linear-gradient(90deg, #dc3545, #fd7e14); }
        .rent-badge { font-size: 2.5rem; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
        .status-tracker { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container billing-container px-3">
    <div class="card card-billing">
        <div class="accent-bar"></div>
        <div class="card-body p-4 p-md-5 text-center">
            
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill text-danger" style="font-size: 3.5rem;"></i>
                <h2 class="fw-bold mt-2">Workspace Locked</h2>
                <p class="text-muted">Your utility features are restricted due to outstanding dues.</p>
            </div>

            <div class="bg-light rounded-3 p-3 mb-4">
                <span class="text-uppercase text-muted fw-semibold small d-block mb-1">Platform Renewal Fee</span>
                <div class="rent-badge">₹50.00</div>
                
                <div class="razorpay-embed-btn" data-url="https://pages.razorpay.com/pl_Ssq5QPjhHhrkxX/view" data-text="Pay ₹50 Now" data-color="#FF0000" data-size="large">
                    <script>
                        (function(){
                            var d=document; var x=!d.getElementById('razorpay-embed-btn-js')
                            if(x){ var s=d.createElement('script'); s.defer=!0;s.id='razorpay-embed-btn-js';
                            s.src='https://cdn.razorpay.com/static/embed_btn/bundle.js';d.body.appendChild(s);} else{var rzp=window['__rzp__'];
                            rzp && rzp.init && rzp.init()}})();
                    </script>
                </div>
            </div>

            <div class="status-tracker text-start">
                <div class="d-flex align-items-center gap-3">
                    <div class="spinner-border spinner-border-sm text-warning" role="status"></div>
                    <div>
                        <strong class="d-block text-dark small">Automated Sync Active</strong>
                        <span class="text-muted x-small d-block" style="font-size: 0.78rem;">Upon successful payment, your workspace will unlock automatically within seconds.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuyDgbmychMjHGupeoZV21vv_Z0n7WyoY",
        authDomain: "business-saarthi.firebaseapp.com",
        databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
        projectId: "business-saarthi",
        storageBucket: "business-saarthi.firebasestorage.app",
        messagingSenderId: "556256084111",
        appId: "1:556256084111:web:b06208d94c5f5cae3170fa"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

    window.onload = function() {
        const shopPhone = localStorage.getItem("activeUserPhone");
        if (!shopPhone) return;

        // Watch for payment status change in database
        firebase.database().ref(`shops/${shopPhone}/paymentStatus`).on('value', (snapshot) => {
            if (snapshot.val() === "PAID") {
                firebase.database().ref(`users/${shopPhone}`).update({ portalStatus: "active" })
                .then(() => { window.location.href = "dashboard.html"; });
            }
        });
    };
</script>
</body>
</html>
