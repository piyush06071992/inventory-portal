<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Details - Business Saarthi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .wrapper { display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; padding: 20px 12px; box-sizing: border-box; }
        .header-section { width: 100%; max-width: 700px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-section h1 { font-size: 22px; font-weight: 700; color: #1e3a8a; margin: 0; }
        .form-card { width: 100%; max-width: 700px; background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); box-sizing: border-box; margin-bottom: 20px; border: 1px solid #e2e8f0; position: relative; }
        
        /* Professional Serial Number Badges */
        .card-serial { position: absolute; top: -15px; left: 20px; background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: #ffffff; width: 32px; height: 32px; border-radius: 50px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; box-shadow: 0 4px 10px rgba(30, 58, 138, 0.3); }
        
        .card-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-top: 5px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .form-control-custom { width: 100%; padding: 12px 14px; font-size: 15px; border: 2px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; transition: all 0.2s ease; background-color: #fff; color: #0f172a; font-weight: 500; }
        .form-control-custom:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        /* Dynamic Multi-Input Elements Layout */
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .btn-remove { background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-add-more { background-color: #f1f5f9; color: #1e3a8a; border: 2px dashed #cbd5e1; padding: 10px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px; }
        .btn-add-more:hover { background-color: #e2e8f0; }
        
        /* Action Bar Buttons */
        .action-row { width: 100%; max-width: 700px; display: flex; gap: 12px; margin-top: 10px; }
        .btn-save { flex: 2; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 18px rgba(16, 185, 129, 0.2); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back { flex: 1; background-color: #ffffff; color: #475569; border: 2px solid #cbd5e1; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; gap: 0; } }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="header-section">
        <h1><i class="bi bi-gear-wide-connected text-primary"></i> PROFILE CONFIGURATION</h1>
    </div>

    <div class="form-card">
        <div class="card-serial">1</div>
        <div class="card-title"><i class="bi bi-shop text-primary"></i> Company & Identity Details</div>
        
        <div class="form-group">
            <label>Registered Business Name</label>
            <input type="text" id="biz-name" class="form-control-custom" placeholder="e.g., MINERVA STUDY CIRCLE">
        </div>
        
        <div class="form-group">
            <label>Invoice Tagline / Sub-Heading</label>
            <input type="text" id="biz-tagline" class="form-control-custom" placeholder="e.g., Deals in Fancy Stationery & Personalized Gifts">
        </div>

        <div class="form-group">
            <label>Registered Owner Names</label>
            <div id="owners-container">
                </div>
            <button type="button" class="btn-add-more" onclick="addOwnerField('')">
                <i class="bi bi-plus-circle-fill"></i> Add New Owner Name
            </button>
        </div>
    </div>

    <div class="form-card">
        <div class="card-serial">2</div>
        <div class="card-title"><i class="bi bi-geo-alt-fill text-danger"></i> Contact & Local Address</div>
        
        <div class="form-group">
            <label>Registered Phone Numbers</label>
            <div id="phones-container">
                </div>
            <button type="button" class="btn-add-more" onclick="addPhoneField('')">
                <i class="bi bi-telephone-plus-fill"></i> Add New Phone Number
            </button>
        </div>

        <div class="form-group">
            <label>Detailed Business Address</label>
            <input type="text" id="biz-address" class="form-control-custom" placeholder="Building, Street, Area Landmark Address">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Indian State / UT</label>
                <select id="biz-state" class="form-control-custom">
                    <option value="">SELECT STATE</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="West Bengal">West Bengal</option>
                    <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                    <option value="Chandigarh">Chandigarh</option>
                    <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                    <option value="Ladakh">Ladakh</option>
                    <option value="Lakshadweep">Lakshadweep</option>
                    <option value="Puducherry">Puducherry</option>
                </select>
            </div>
            <div class="form-group">
                <label>PIN Code</label>
                <input type="number" id="biz-pin" class="form-control-custom" placeholder="6-Digit PIN Code" inputmode="numeric" oninput="limitDigitLength(this, 6)">
            </div>
        </div>
    </div>

    <div class="form-card">
        <div class="card-serial">3</div>
        <div class="card-title"><i class="bi bi-currency-rupee text-success"></i> Tax & Digital UPI Wallets</div>
        
        <div class="grid-2">
            <div class="form-group">
                <label>GST Number (GSTIN)</label>
                <input type="text" id="tax-gst" class="form-control-custom" placeholder="15-Digit GSTIN" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label>TAN Number</label>
                <input type="text" id="tax-tan" class="form-control-custom" placeholder="10-Digit TAN" style="text-transform: uppercase;">
            </div>
        </div>

        <div class="form-group">
            <label>Registered Billing UPI IDs</label>
            <div id="upi-container">
                </div>
            <button type="button" class="btn-add-more" onclick="addUpiField('')">
                <i class="bi bi-qr-code"></i> Link Another UPI ID
            </button>
        </div>

        <div class="form-group">
            <label>Invoice Terms & Footers</label>
            <input type="text" id="invoice-terms" class="form-control-custom" placeholder="e.g., Thank you for shopping! Goods once sold are non-refundable.">
        </div>
    </div>

    <div class="action-row">
        <a href="/dashboard.html" class="btn-back">Cancel</a>
        <button class="btn-save" onclick="handleSaveBusinessDetails()">
            <i class="bi bi-cloud-arrow-up-fill"></i> Save Details
        </button>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuyDgbmychMjHGupeoZV21vv_Z0n7WyoY",
        authDomain: "business-saarthi.firebaseapp.com",
        databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
        projectId: "business-saarthi",
        storageBucket: "business-saarthi.firebasestorage.app",
        messagingSenderId: "556256084111",
        appId: "1:556256084111:web:b06208d94c5f5cae3170fa"
    };
    firebase.initializeApp(firebaseConfig);

    // Strict numerical input limits watcher logic
    function limitDigitLength(element, maxDigits) {
        if (element.value.length > maxDigits) {
            element.value = element.value.slice(0, maxDigits);
        }
    }

    // Dynamic Multi-Input Node Adders
    function addOwnerField(value) {
        const container = document.getElementById('owners-container');
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `
            <input type="text" class="form-control-custom owner-input-item" placeholder="ENTER OWNER NAME" value="${value}">
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()"><i class="bi bi-trash3-fill"></i></button>
        `;
        container.appendChild(div);
    }

    function addUpiField(value) {
        const container = document.getElementById('upi-container');
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `
            <input type="text" class="form-control-custom upi-input-item" placeholder="username@upi / mobile@ybl" value="${value}">
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()"><i class="bi bi-trash3-fill"></i></button>
        `;
        container.appendChild(div);
    }

    function addPhoneField(value) {
        const container = document.getElementById('phones-container');
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `
            <input type="number" class="form-control-custom phone-input-item" placeholder="ENTER 10-DIGIT MOBILE" value="${value}" inputmode="numeric" oninput="limitDigitLength(this, 10)">
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()"><i class="bi bi-trash3-fill"></i></button>
        `;
        container.appendChild(div);
    }

    window.onload = function() {
        const activeUserPhone = sessionStorage.getItem("activeUserPhone") || "9999999999";

        // Query existing layout fields from database profile path node to pre-fill layout values
        firebase.database().ref('business_profiles/' + activeUserPhone).once('value')
            .then((snapshot) => {
                const profile = snapshot.val();
                if (profile) {
                    document.getElementById('biz-name').value = profile.businessName || '';
                    document.getElementById('biz-tagline').value = profile.tagline || '';
                    document.getElementById('biz-address').value = profile.address || '';
                    document.getElementById('biz-state').value = profile.state || '';
                    document.getElementById('biz-pin').value = profile.pinCode || '';
                    document.getElementById('tax-gst').value = profile.gstNumber || '';
                    document.getElementById('tax-tan').value = profile.tanNumber || '';
                    document.getElementById('invoice-terms').value = profile.invoiceTerms || '';
                    
                    if (profile.owners) {
                        profile.owners.forEach(owner => addOwnerField(owner));
                    } else { addOwnerField(''); }
                    
                    if (profile.phoneNumbers && profile.phoneNumbers.length > 0) {
                        profile.phoneNumbers.forEach(num => addPhoneField(num));
                    } else if (profile.primaryPhone) {
                        addPhoneField(profile.primaryPhone);
                        if (profile.secondaryPhone) addPhoneField(profile.secondaryPhone);
                    } else {
                        addPhoneField('');
                    }

                    if (profile.upiIds) {
                        profile.upiIds.forEach(upi => addUpiField(upi));
                    } else { addUpiField(''); }
                } else {
                    addOwnerField('');
                    addPhoneField('');
                    addUpiField('');
                }
            });
    };

    function handleSaveBusinessDetails() {
        const activeUserPhone = sessionStorage.getItem("activeUserPhone") || "9999999999";

        // Aggregate Dynamic Values into Array Frameworks
        const ownersArray = [];
        document.querySelectorAll('.owner-input-item').forEach(input => {
            if(input.value.trim()) ownersArray.push(input.value.trim().toUpperCase());
        });

        const upiArray = [];
        document.querySelectorAll('.upi-input-item').forEach(input => {
            if(input.value.trim()) upiArray.push(input.value.trim().toLowerCase());
        });

        const phonesArray = [];
        document.querySelectorAll('.phone-input-item').forEach(input => {
            if(input.value.trim()) phonesArray.push(input.value.trim());
        });

        const updatedProfileData = {
            businessName: document.getElementById('biz-name').value.trim().toUpperCase(),
            tagline: document.getElementById('biz-tagline').value.trim(),
            owners: ownersArray,
            phoneNumbers: phonesArray,
            address: document.getElementById('biz-address').value.trim(),
            state: document.getElementById('biz-state').value,
            pinCode: document.getElementById('biz-pin').value,
            gstNumber: document.getElementById('tax-gst').value.trim().toUpperCase(),
            tanNumber: document.getElementById('tax-tan').value.trim().toUpperCase(),
            upiIds: upiArray,
            invoiceTerms: document.getElementById('invoice-terms').value.trim(),
            lastSavedAt: new Date().toISOString()
        };

        // Complete input validation schema check
        if (!updatedProfileData.businessName || updatedProfileData.phoneNumbers.length === 0 || !updatedProfileData.address || !updatedProfileData.state || !updatedProfileData.pinCode) {
            alert("ERROR: Please completely fill out all basic contact details fields and include at least one phone number before saving.");
            return;
        }

        // Save straight up to custom path storage nodes in Firebase
        firebase.database().ref('business_profiles/' + activeUserPhone).set(updatedProfileData, (error) => {
            if (error) {
                alert("Database Synchronization Error: " + error.message);
            } else {
                alert("SUCCESS! Business details saved successfully. Your invoices will look amazing.");
                window.location.href = '/dashboard.html';
            }
        });
    }
</script>
</body>
</html>
