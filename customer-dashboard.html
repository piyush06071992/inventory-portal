<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ledger - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --navy: #0f172a; --primary: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard-card { max-width: 500px; margin: 0 auto; }
        .balance-box { background: var(--navy); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .balance-box h1 { font-size: 36px; margin: 0; }
        .filter-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .bill-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>

<div class="dashboard-card">
    <div class="balance-box">
        <p style="margin:0; font-size: 12px; opacity: 0.8; text-transform: uppercase;">Total Balance Due</p>
        <h1 id="total-due">₹0.00</h1>
        <button style="margin-top:15px; background:#10b981; border:none; color:white; padding:10px 20px; border-radius:8px; font-weight:900;">Pay via UPI</button>
    </div>

    <div class="filter-section">
        <input type="text" id="search-items" placeholder="🔍 Search Items..." oninput="filterData()">
        <input type="date" id="filter-date" onchange="filterData()">
    </div>

    <div id="bill-list">
        </div>
</div>

<script>
    // 1. Initialize Firebase (Use your standard config)
    const firebaseConfig = { /* ... your config ... */ };
    firebase.initializeApp(firebaseConfig);

    let allBills = []; // This holds everything locally

    async function loadDashboard() {
        const phone = localStorage.getItem("activeCustomerPhone");
        if(!phone) window.location.href = "/customer-login.html";

        const db = firebase.firestore();
        // Replace with your Master Company Phone ID
        const companyId = "9882644123"; 

        try {
            // SINGLE READ: Fetch all sales for this customer
            const snap = await db.collection('companies').doc(companyId)
                                 .collection('branches').doc("branch_01") // You can make this dynamic
                                 .collection('sales').where('customerPhone', '==', phone).get();
            
            allBills = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            localStorage.setItem('cust_history', JSON.stringify(allBills));
            render(allBills);
        } catch(e) { alert("Error loading history: " + e.message); }
    }

    function render(data) {
        const list = document.getElementById('bill-list');
        list.innerHTML = "";
        let total = 0;
        data.forEach(b => {
            total += (b.udhaarAdded || 0); // Logic depends on how you store balances
            list.innerHTML += `
                <div class="bill-card">
                    <div><div style="font-weight:900;">${b.billNumber}</div><div style="font-size:12px; color:gray;">${b.timestamp.toDate().toLocaleDateString()}</div></div>
                    <div style="font-weight:900;">₹${b.totalAmount}</div>
                </div>
            `;
        });
        document.getElementById('total-due').innerText = `₹${total.toFixed(2)}`;
    }

    function filterData() {
        const sQuery = document.getElementById('search-items').value.toLowerCase();
        const dQuery = document.getElementById('filter-date').value;

        const filtered = allBills.filter(b => {
            const matchesItem = b.items.some(i => i.name.toLowerCase().includes(sQuery));
            const matchesDate = !dQuery || b.timestamp.toDate().toLocaleDateString() === new Date(dQuery).toLocaleDateString();
            return matchesItem && matchesDate;
        });
        render(filtered);
    }

    loadDashboard();
</script>
</body>
</html>
