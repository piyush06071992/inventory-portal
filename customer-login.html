<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Portal - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --navy: #0f172a; --primary: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; width: 100%; max-width: 360px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 5px 0; font-size: 22px; font-weight: 900; color: var(--navy); }
        p { margin: 0 0 25px 0; font-size: 14px; font-weight: 700; color: #64748b; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 800; color: var(--navy); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-weight: 900; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 16px; background: var(--navy); color: white; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Customer Portal</h2>
    <p>Access your Khata & Bills</p>
    
    <div class="input-group">
        <label>Mobile Number</label>
        <input type="tel" id="cust-phone" placeholder="98XXXXXXXX" maxlength="10">
    </div>
    <div class="input-group">
        <label>Khata Number</label>
        <input type="number" id="cust-khata" placeholder="XXXX">
    </div>
    
    <button onclick="verifyCustomer()"><i class="bi bi-box-arrow-in-right"></i> Login</button>
</div>

<script>
    // Initialize Firebase (Paste your config from your other files here)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        projectId: "business-saarthi",
        // ... add the rest of your config object
    };
    firebase.initializeApp(firebaseConfig);

    async function verifyCustomer() {
        const phone = document.getElementById('cust-phone').value.trim();
        const khata = document.getElementById('cust-khata').value.trim();
        
        if (phone.length !== 10 || !khata) {
            alert("Please enter a valid 10-digit mobile number and Khata number.");
            return;
        }

        const db = firebase.firestore();
        // Assuming your customer records are stored at company level
        // You might need to add a "Company Phone" input if you manage multiple shops
        const companyPhone = "9882644123"; // Replace with your master company identifier

        try {
            const doc = await db.collection('companies').doc(companyPhone).collection('customers').doc(phone).get();
            
            if (doc.exists && doc.data().khataNumber == khata) {
                // Success: Redirect to their personal dashboard
                localStorage.setItem("activeCustomerPhone", phone);
                window.location.href = "/customer-dashboard.html";
            } else {
                alert("Customer not found or Khata number mismatch.");
            }
        } catch(e) {
            alert("Login error: " + e.message);
        }
    }
</script>

</body>
</html>
