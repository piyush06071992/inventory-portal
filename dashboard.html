<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Business Saarthi</title>
    
    <script src="/auth.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .dashboard-layout { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 10px; }
        .shop-header-card { width: 100%; max-width: 650px; background: linear-gradient(135deg, #1e3a8a, #0f172a); color: #ffffff; padding: 25px; border-radius: 16px; text-align: center; margin-bottom: 20px; }
        .menu-grid-container { width: 100%; max-width: 650px; background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .btn-pos-huge { width: 100%; background: #10b981; color: #ffffff; border: none; border-radius: 14px; padding: 22px; font-size: 20px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
        .grid-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
        .btn-dashboard-item { border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 600; cursor: pointer; color: #ffffff; }
        .color-blue { background: #3b82f6; } .color-indigo { background: #6366f1; } .color-purple { background: #a855f7; } .color-orange { background: #f97316; }
        .btn-logout-panel { width: 100%; background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <div class="shop-header-card">
        <h1 id="display-shop-name">Loading Workspace...</h1>
    </div>

    <div class="menu-grid-container">
        <button class="btn-pos-huge" onclick="window.location.href='/sale-point.html'">SALE POINT</button>
        <div class="grid-row">
            <button class="btn-dashboard-item color-blue" onclick="window.location.href='/enter-stock.html'">Enter Stock</button>
            <button class="btn-dashboard-item color-indigo" onclick="window.location.href='/manage-stock.html'">Manage Stock</button>
            <button class="btn-dashboard-item color-purple" onclick="window.location.href='/suppliers.html'">Suppliers</button>
            <button class="btn-dashboard-item color-orange" onclick="window.location.href='/business-details.html'">Details</button>
        </div>
        <button class="btn-logout-panel" onclick="handleLogout()">Logout</button>
    </div>
</div>

<script>
    // 1. FORCE CLEANUP
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let reg of registrations) reg.unregister();
        });
    }

    // 2. DIAGNOSTIC LOG (Open F12 Console to see this)
    console.log("Dashboard Loaded. Checking Session...");
    if (typeof verifySingleSession === 'function') {
        verifySingleSession();
    } else {
        console.error("CRITICAL: auth.js is NOT loaded properly!");
    }

    window.onload = function() {
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        if(activeUserPhone) {
            firebase.database().ref('shops/' + activeUserPhone).once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    document.getElementById("display-shop-name").innerText = data ? data.businessName : "DASHBOARD";
                });
        }
    };

    function handleLogout() {
        localStorage.clear();
        sessionStorage.clear();
        firebase.auth().signOut().then(() => {
            window.location.href = '/login.html';
        });
    }
</script>
</body>
</html>
