<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Taxonomy DB - Developer Desk</title>
    
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { 
            --navy: #0f172a; --primary: #3b82f6; 
            --emerald: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-light: #64748b; --border: #e2e8f0; --bg: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--navy); margin: 0; padding: 20px; color: var(--navy); }
        
        .dashboard-container { background: white; border-radius: 16px; padding: 20px; max-width: 1200px; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); min-height: 80vh; display: flex; flex-direction: column; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .header-bar h1 { margin: 0; font-size: 24px; font-weight: 900; color: var(--navy); display: flex; align-items: center; gap: 10px; text-transform: uppercase;}
        
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; text-transform: uppercase; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--emerald); color: white; }
        .btn-danger { background: #fee2e2; color: var(--danger); padding: 8px; }
        .btn-exit { background: var(--border); color: var(--navy); }

        /* Excel-Like Table Styles */
        .table-container { flex-grow: 1; overflow-x: auto; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--navy); color: white; text-align: left; padding: 12px 15px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; z-index: 10;}
        td { padding: 0; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); background: white; position: relative;}
        td:last-child { border-right: none; }
        
        /* Input styling inside table */
        td input { width: 100%; height: 100%; padding: 12px 15px; border: none; outline: none; box-sizing: border-box; font-size: 13px; font-weight: 700; color: var(--navy); background: transparent; font-family: 'Inter', sans-serif;}
        td input:focus { background: #e0f2fe; box-shadow: inset 0 0 0 2px var(--primary); }
        
        /* Placeholder styling */
        td input::placeholder { color: #94a3b8; font-weight: 600; }
        
        .action-cell { display: flex; align-items: center; justify-content: center; padding: 8px; }

        .translating { animation: pulse 1s infinite; color: var(--warning); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-bar">
            <h1><i class="bi bi-database-fill-gear"></i> Master Taxonomy Engine</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-exit" onclick="window.location.href='/developer.html'"><i class="bi bi-arrow-left"></i> Exit</button>
                <button class="btn btn-primary" onclick="loadFromCloud()"><i class="bi bi-cloud-arrow-down-fill"></i> Load DB</button>
                <button class="btn btn-success" onclick="saveToCloud()"><i class="bi bi-cloud-arrow-up-fill"></i> Save to Cloud</button>
            </div>
        </div>

        <div style="background: #e0f2fe; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: 700; color: #0284c7; display: flex; align-items: center; gap: 8px;">
            <i class="bi bi-info-circle-fill" style="font-size: 16px;"></i>
            Type the Sub-Category (e.g., HALDI) and click away. The system will automatically fetch the Hindi translation. All text is forced to UPPERCASE.
        </div>

        <div class="table-container">
            <table id="taxonomy-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Department (Shop Type)</th>
                        <th style="width: 20%;">Category</th>
                        <th style="width: 30%;">Sub-Category / Item (Hindi)</th>
                        <th style="width: 25%;">Smart Parameters (Comma separated)</th>
                        <th style="width: 5%; text-align: center;">X</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Check Developer Auth
        if (sessionStorage.getItem("devAccessGranted") !== "true") {
            window.location.href = "/developer.html";
        }

        // Master Data Array
        let tableData = [
            { id: Date.now().toString(), dept: "PANSARI", cat: "SPICES", subcat: "HALDI (हल्दी)", params: "BRAND, WEIGHT, QUALITY" }
        ];

        // Ensure text is always uppercase as they type
        function forceUpper(inputElem) {
            let cursor = inputElem.selectionStart;
            inputElem.value = inputElem.value.toUpperCase();
            inputElem.setSelectionRange(cursor, cursor);
        }

        // Real-time Hindi Transliteration using Google Input Tools API
        async function applyHindi(inputElem, rowId) {
            let val = inputElem.value.trim().toUpperCase();
            
            // If empty, or already contains a bracket (translation done), skip it.
            if(!val || val.includes('(')) return;

            // Optional: Show loading state
            inputElem.classList.add('translating');

            try {
                // Fetch transliteration
                let res = await fetch(`https://inputtools.google.com/request?text=${val.toLowerCase()}&itc=hi-t-i0-und&num=1`);
                let data = await res.json();
                
                if(data[0] === 'SUCCESS' && data[1][0][1][0]) {
                    let hindiText = data[1][0][1][0];
                    inputElem.value = `${val} (${hindiText})`;
                }
            } catch(e) {
                console.error("Translation API failed", e);
            } finally {
                inputElem.classList.remove('translating');
                updateData(rowId, 'subcat', inputElem.value);
            }
        }

        // Update main data array when an input changes
        function updateData(id, field, value) {
            const index = tableData.findIndex(row => row.id === id);
            if(index !== -1) {
                tableData[index][field] = value.toUpperCase();
            }
        }

        // Add a blank row to the bottom
        function addBlankRow() {
            // Check if last row is empty to prevent infinite blank rows
            if(tableData.length > 0) {
                let last = tableData[tableData.length - 1];
                if(!last.dept && !last.cat && !last.subcat) return;
            }
            
            tableData.push({
                id: Date.now().toString(),
                dept: "", cat: "", subcat: "", params: ""
            });
            renderTable();
        }

        // Delete a specific row
        function deleteRow(id) {
            tableData = tableData.filter(row => row.id !== id);
            if(tableData.length === 0) addBlankRow(); // Keep at least one row
            renderTable();
        }

        // Render the HTML table based on the array
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";

            tableData.forEach((row, index) => {
                const tr = document.createElement('tr');
                
                // Add event listener to auto-add row when typing in the last row
                const isLast = index === tableData.length - 1;
                const onInputTrigger = isLast ? `oninput="forceUpper(this); addBlankRow();"` : `oninput="forceUpper(this)"`;

                tr.innerHTML = `
                    <td><input type="text" placeholder="e.g. PANSARI" value="${row.dept}" ${onInputTrigger} onchange="updateData('${row.id}', 'dept', this.value)"></td>
                    <td><input type="text" placeholder="e.g. SPICES" value="${row.cat}" ${onInputTrigger} onchange="updateData('${row.id}', 'cat', this.value)"></td>
                    <td><input type="text" placeholder="e.g. HALDI" value="${row.subcat}" ${onInputTrigger} onchange="updateData('${row.id}', 'subcat', this.value)" onblur="applyHindi(this, '${row.id}')"></td>
                    <td><input type="text" placeholder="BRAND, WEIGHT..." value="${row.params}" ${onInputTrigger} onchange="updateData('${row.id}', 'params', this.value)"></td>
                    <td class="action-cell">
                        <button class="btn btn-danger" onclick="deleteRow('${row.id}')" title="Delete Row"><i class="bi bi-trash-fill"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            // Always ensure an empty row exists at the bottom for quick typing
            const lastRow = tableData[tableData.length - 1];
            if(lastRow.dept || lastRow.cat || lastRow.subcat) {
                addBlankRow();
            }
        }

        // Firebase Operations (Developer Database)
        async function saveToCloud() {
            const db = firebase.firestore();
            const btn = document.querySelector('.btn-success');
            
            // Filter out completely empty rows
            const cleanData = tableData.filter(r => r.dept || r.cat || r.subcat);
            
            btn.innerHTML = `<i class="bi bi-hourglass-split"></i> SAVING...`;
            btn.disabled = true;

            try {
                // Save to a central admin settings collection
                await db.collection('admin_settings').doc('master_taxonomy').set({
                    dictionary: cleanData,
                    lastUpdated: new Date().toISOString()
                });
                alert("Master Taxonomy Saved to Cloud Successfully!");
            } catch(e) {
                alert("Cloud Save Error: " + e.message);
            }
            
            btn.innerHTML = `<i class="bi bi-cloud-arrow-up-fill"></i> Save to Cloud`;
            btn.disabled = false;
        }

        async function loadFromCloud() {
            const db = firebase.firestore();
            const btn = document.querySelector('.btn-primary');
            
            btn.innerHTML = `<i class="bi bi-hourglass-split"></i> LOADING...`;
            btn.disabled = true;

            try {
                const doc = await db.collection('admin_settings').doc('master_taxonomy').get();
                if(doc.exists && doc.data().dictionary) {
                    tableData = doc.data().dictionary;
                    renderTable();
                } else {
                    alert("No taxonomy data found in cloud. Start typing below.");
                }
            } catch(e) {
                alert("Cloud Load Error: " + e.message);
            }
            
            btn.innerHTML = `<i class="bi bi-cloud-arrow-down-fill"></i> Load DB`;
            btn.disabled = false;
        }

        // Initialize table on load
        window.onload = function() {
            if (sessionStorage.getItem("devAccessGranted") === "true") {
                renderTable();
                // Optionally auto-load from cloud here: loadFromCloud();
            }
        };
    </script>
</body>
</html>
