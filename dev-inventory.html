<html lang="en">
<head>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { 
            --navy: #0f172a; --primary: #3b82f6; 
            --emerald: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-light: #64748b; --border: #e2e8f0; --bg: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--navy); margin: 0; padding: 20px; color: var(--navy); }
        
        .dashboard-container { background: white; border-radius: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); min-height: 85vh; display: flex; flex-direction: column; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .header-bar h1 { margin: 0; font-size: 24px; font-weight: 900; color: var(--navy); display: flex; align-items: center; gap: 10px; text-transform: uppercase;}
        
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; text-transform: uppercase; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--emerald); color: white; }
        .btn-exit { background: var(--border); color: var(--navy); }

        /* Structural Grid Spreadsheet UI */
        .table-container { flex-grow: 1; overflow-x: auto; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: var(--navy); color: white; text-align: left; padding: 12px 15px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; z-index: 10;}
        td { padding: 0; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); background: white; position: relative;}
        td:last-child { border-right: none; }
        
        /* Spread Sheet Inputs */
        td input { width: 100%; height: 100%; padding: 12px 15px; border: none; outline: none; box-sizing: border-box; font-size: 13px; font-weight: 700; color: var(--navy); background: transparent; font-family: 'Inter', sans-serif;}
        td input:focus { background: #e0f2fe; box-shadow: inset 0 0 0 2px var(--primary); }
        
        .action-cell { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px; background: #f8fafc;}
        .btn-action { border: none; border-radius: 6px; padding: 8px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .btn-action:active { transform: scale(0.9); }
        .btn-add { background: var(--primary); }
        .btn-delete { background: var(--danger); }
        
        .translating { animation: pulse 1s infinite; background: #fef3c7 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-bar">
            <h1><i class="bi bi-database-fill-gear"></i> Master Taxonomy Engine</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-exit" onclick="window.location.href='/developer.html'"><i class="bi bi-arrow-left"></i> Exit</button>
                <button class="btn btn-primary" onclick="loadFromCloud()"><i class="bi bi-cloud-arrow-down-fill"></i> Load DB</button>
                <button class="btn btn-success" onclick="saveToCloud()"><i class="bi bi-cloud-arrow-up-fill"></i> Save to Cloud</button>
            </div>
        </div>

        <div style="background: #e0f2fe; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: 700; color: #0284c7; display: flex; align-items: center; gap: 8px;">
            <i class="bi bi-info-circle-fill" style="font-size: 16px;"></i>
            Type text in English and click out. Dept, Category, and Sub-Category auto-translate to Hindi. Everything updates in strict UPPERCASE. Use the Blue '+' to insert rows.
        </div>

        <div class="table-container">
            <table id="taxonomy-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Department (Shop Type)</th>
                        <th style="width: 20%;">Category</th>
                        <th style="width: 20%;">Sub-Category / Item</th>
                        <th style="width: 20%;">Specific Parameter Name</th>
                        <th style="width: 12%;">Measurement Unit</th>
                        <th style="width: 8%; text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Enforce Developer Session Guard
        if (sessionStorage.getItem("devAccessGranted") !== "true") {
            window.location.href = "/developer.html";
        }

        // Complete Row-By-Row Schema
        let tableData = [
            { id: "row_1", dept: "PANSARI (पंसारी)", cat: "SPICES (मसाले)", subcat: "HALDI (हल्दी)", param: "BRAND", unit: "KG" }
        ];

        function forceUpper(inputElem) {
            let start = inputElem.selectionStart;
            inputElem.value = inputElem.value.toUpperCase().replace(/\s{2,}/g, ' ');
            inputElem.setSelectionRange(start, start);
        }

        // Global Hindi Transliteration Engine
        async function runAutoTransliterate(inputElem, rowId, fieldKey) {
            let val = inputElem.value.trim().toUpperCase();
            if(!val || val.includes('(')) return; // Don't re-translate if brackets exist

            inputElem.classList.add('translating');

            try {
                let response = await fetch(`https://inputtools.google.com/request?text=${val.toLowerCase()}&itc=hi-t-i0-und&num=1`);
                let parsed = await response.json();
                
                if(parsed[0] === 'SUCCESS' && parsed[1][0][1][0]) {
                    let hindiTranslation = parsed[1][0][1][0].toUpperCase();
                    inputElem.value = `${val} (${hindiTranslation})`;
                }
            } catch(error) {
                console.error("Transliteration service error:", error);
            } finally {
                inputElem.classList.remove('translating');
                updateDataFields(rowId, fieldKey, inputElem.value);
            }
        }

        function updateDataFields(id, field, value) {
            const idx = tableData.findIndex(r => r.id === id);
            if(idx !== -1) {
                tableData[idx][field] = value.toUpperCase();
            }
        }

        // Insert a new blank row directly below the clicked row
        function insertRowBelow(id) {
            const idx = tableData.findIndex(r => r.id === id);
            const newRow = {
                id: "row_" + Date.now() + Math.floor(Math.random() * 1000),
                dept: "", cat: "", subcat: "", param: "", unit: ""
            };
            
            if (idx !== -1) {
                tableData.splice(idx + 1, 0, newRow);
            } else {
                tableData.push(newRow); // Fallback if id not found
            }
            renderTableSpreadsheet();
        }

        function executeRowDeletion(id) {
            tableData = tableData.filter(r => r.id !== id);
            if(tableData.length === 0) {
                tableData.push({ id: "row_" + Date.now(), dept: "", cat: "", subcat: "", param: "", unit: "" });
            }
            renderTableSpreadsheet();
        }

        function renderTableSpreadsheet() {
            const container = document.getElementById('table-body');
            container.innerHTML = "";

            tableData.forEach((row) => {
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td><input type="text" placeholder="e.g. PANSARI" value="${row.dept}" oninput="forceUpper(this)" onchange="updateDataFields('${row.id}', 'dept', this.value)" onblur="runAutoTransliterate(this, '${row.id}', 'dept')"></td>
                    <td><input type="text" placeholder="e.g. SPICES" value="${row.cat}" oninput="forceUpper(this)" onchange="updateDataFields('${row.id}', 'cat', this.value)" onblur="runAutoTransliterate(this, '${row.id}', 'cat')"></td>
                    <td><input type="text" placeholder="e.g. HALDI" value="${row.subcat}" oninput="forceUpper(this)" onchange="updateDataFields('${row.id}', 'subcat', this.value)" onblur="runAutoTransliterate(this, '${row.id}', 'subcat')"></td>
                    <td><input type="text" placeholder="e.g. BRAND" value="${row.param}" oninput="forceUpper(this)" onchange="updateDataFields('${row.id}', 'param', this.value)"></td>
                    <td><input type="text" placeholder="e.g. KG" value="${row.unit}" oninput="forceUpper(this)" onchange="updateDataFields('${row.id}', 'unit', this.value)"></td>
                    <td class="action-cell">
                        <button class="btn-action btn-add" onclick="insertRowBelow('${row.id}')" title="Insert Row Below"><i class="bi bi-plus-lg"></i></button>
                        <button class="btn-action btn-delete" onclick="executeRowDeletion('${row.id}')" title="Delete Row"><i class="bi bi-trash3-fill"></i></button>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        // Firestore Synchronizations
        async function saveToCloud() {
            const db = firebase.firestore();
            const saveBtn = document.querySelector('.btn-success');
            
            const sanitizedData = tableData.filter(r => r.dept || r.cat || r.subcat || r.param || r.unit);
            
            saveBtn.innerHTML = `<i class="bi bi-hourglass-split"></i> STORING...`;
            saveBtn.disabled = true;

            try {
                await db.collection('admin_settings').doc('master_taxonomy').set({
                    dictionary: sanitizedData,
                    totalCount: sanitizedData.length,
                    lastCompiled: new Date().toISOString()
                });
                alert("Master Database Registry deployed to Cloud successfully!");
            } catch(err) {
                alert("Firestore Error: " + err.message);
            } finally {
                saveBtn.innerHTML = `<i class="bi bi-cloud-arrow-up-fill"></i> Save to Cloud`;
                saveBtn.disabled = false;
            }
        }

        async function loadFromCloud() {
            const db = firebase.firestore();
            const loadBtn = document.querySelector('.btn-primary');
            
            loadBtn.innerHTML = `<i class="bi bi-hourglass-split"></i> FETCHING...`;
            loadBtn.disabled = true;

            try {
                const snapshot = await db.collection('admin_settings').doc('master_taxonomy').get();
                if(snapshot.exists && snapshot.data().dictionary) {
                    tableData = snapshot.data().dictionary;
                    renderTableSpreadsheet();
                } else {
                    alert("No cloud runtime found. Start entering fields manually.");
                }
            } catch(err) {
                alert("Firestore Load Error: " + err.message);
            } finally {
                loadBtn.innerHTML = `<i class="bi bi-cloud-arrow-down-fill"></i> Load DB`;
                loadBtn.disabled = false;
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem("devAccessGranted") === "true") {
                renderTableSpreadsheet();
                loadFromCloud(); // Safely pulls existing configurations on mount
            }
        };
    </script>
</body>
</html>
