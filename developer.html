<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Developer Desk - Business Saarthi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
    
    <style>
        :root { 
            --navy: #0f172a; --primary: #3b82f6; 
            --emerald: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-light: #64748b; --border: #e2e8f0; --bg: #f1f5f9;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--navy); margin: 0; padding: 0; color: var(--navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .card { background: white; padding: 30px 25px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; border: 4px solid #475569; position: relative; overflow: hidden; }
        
        /* Top Hazard Stripe to denote Developer Area */
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: repeating-linear-gradient( 45deg, #f59e0b, #f59e0b 10px, #1e293b 10px, #1e293b 20px ); }

        .card h2 { color: var(--navy); margin-top: 10px; margin-bottom: 5px; font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: 0.5px;}
        .subtitle { font-size: 11px; font-weight: 800; color: var(--text-light); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-light); text-transform: uppercase; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--navy); outline: none; box-sizing: border-box; background: var(--bg); transition: 0.2s;}
        .input-group input:focus { border-color: #475569; background: white; }

        .pin-wrapper { position: relative; width: 100%; }
        .view-btn-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #475569; cursor: pointer; font-size: 13px; font-weight: 900; }
        .pin-wrapper input { padding-right: 70px; }

        .btn-main { width: 100%; padding: 16px; background: #475569; color: white; border: none; border-radius: 12px; font-weight: 900; font-size: 15px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; box-shadow: 0 4px 6px rgba(15, 23, 42, 0.3); margin-top: 10px;}
        .btn-main:active { transform: scale(0.98); }
        .btn-main:hover { background: #334155; }

        .msg-box { margin-top: 15px; font-size: 13px; font-weight: 800; min-height: 20px; }
        .back-link { margin-top: 20px; font-size: 12px; font-weight: 700; color: var(--text-light); cursor: pointer; text-decoration: none; display: inline-block; }
        .back-link:hover { color: var(--navy); }

        /* Dashboard View specific styling */
        .dash-btn { background: var(--primary); font-size: 16px; box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-logout { background: transparent; color: var(--danger); border: 2px solid var(--danger); box-shadow: none; }
    </style>
</head>
<body>

    <div class="card" id="dev-login-section">
        <h2><i class="bi bi-terminal"></i> Dev Desk</h2>
        <p class="subtitle">System Administration Access</p>

        <div class="input-group">
            <label>Master Email ID</label>
            <input type="email" id="dev-email" placeholder="developer@domain.com" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Registered Mobile Number</label>
            <input type="text" id="dev-mobile" placeholder="10-Digit Mobile" maxlength="10" inputmode="numeric" autocomplete="off">
        </div>

        <div class="input-group">
            <label>System Password</label>
            <div class="pin-wrapper">
                <input type="password" id="dev-pass" placeholder="Enter Secure Password">
                <span id="toggle-txt" class="view-btn-toggle" onclick="togglePassword()">SHOW</span>
            </div>
        </div>

        <button class="btn-main" id="auth-btn" onclick="authenticateDeveloper()">Authorize Access</button>
        
        <div id="msg" class="msg-box" style="color: var(--danger);"></div>
        
        <a href="/index.html" class="back-link">← Return to Welcome Gateway</a>
    </div>

    <div class="card" id="dev-dashboard-section" style="display: none; border-color: var(--primary);">
        <h2 style="color: var(--primary);"><i class="bi bi-cpu"></i> System Active</h2>
        <p class="subtitle" style="margin-bottom: 30px;">Developer Workspace Authenticated</p>
        
        <div style="background: var(--bg); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px dashed var(--border);">
            <p style="margin: 0; font-size: 13px; font-weight: 700; color: var(--navy);">Welcome back, Piyush Rana.</p>
            <p style="margin: 4px 0 0 0; font-size: 11px; color: var(--text-light);">Root Access Granted.</p>
        </div>

        <button class="btn-main dash-btn" onclick="window.location.href='/dev-inventory.html'">
            <i class="bi bi-database-fill-gear"></i> Manage Inventory Database
        </button>

        <button class="btn-main btn-logout" onclick="logoutDeveloper()">
            <i class="bi bi-box-arrow-right"></i> Secure Logout
        </button>
    </div>

    <script>
        // Check session on load to see if developer is already logged in
        window.onload = function() {
            if (sessionStorage.getItem("devAccessGranted") === "true") {
                showDashboard();
            }
        };

        function togglePassword() {
            const field = document.getElementById('dev-pass');
            const txt = document.getElementById('toggle-txt');
            if (field.type === 'password') {
                field.type = 'text';
                txt.innerText = 'HIDE';
            } else {
                field.type = 'password';
                txt.innerText = 'SHOW';
            }
        }

        function authenticateDeveloper() {
            const email = document.getElementById('dev-email').value.trim();
            const mobile = document.getElementById('dev-mobile').value.trim();
            const pass = document.getElementById('dev-pass').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('auth-btn');

            msg.innerText = "";

            if (!email || !mobile || !pass) {
                msg.innerText = "ALL 3 CREDENTIALS ARE REQUIRED.";
                return;
            }

            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            // Artificial delay to prevent brute-force feeling and simulate secure verification
            setTimeout(() => {
                if (
                    email === "rana.rpiyush.piyush826@gmail.com" &&
                    mobile === "9882644123" &&
                    pass === "9817138521Ps$"
                ) {
                    // Success
                    sessionStorage.setItem("devAccessGranted", "true");
                    document.getElementById('dev-email').value = "";
                    document.getElementById('dev-mobile').value = "";
                    document.getElementById('dev-pass').value = "";
                    showDashboard();
                } else {
                    // Failed
                    msg.innerText = "ACCESS DENIED. INVALID CREDENTIALS.";
                }
                
                btn.innerText = "AUTHORIZE ACCESS";
                btn.disabled = false;
            }, 800);
        }

        function showDashboard() {
            document.getElementById('dev-login-section').style.display = 'none';
            document.getElementById('dev-dashboard-section').style.display = 'block';
            document.getElementById('msg').innerText = "";
        }

        function logoutDeveloper() {
            sessionStorage.removeItem("devAccessGranted");
            document.getElementById('dev-dashboard-section').style.display = 'none';
            document.getElementById('dev-login-section').style.display = 'block';
        }
    </script>
</body>
</html>
