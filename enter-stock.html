<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enter Stock - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script> 
    <script src="/auth.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --navy: #1e3a8a; --emerald: #059669; --slate: #f8fafc; --text: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; color: var(--text); }
        .wrapper { padding: 16px; max-width: 700px; margin: auto; padding-bottom: 50px; }
        
        .card { background: white; padding: 18px; border-radius: 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        h2 { font-size: 18px; margin: 0 0 15px 0; color: var(--navy); display: flex; align-items: center; gap: 8px;}
        
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; background: white; font-weight: 600; color: var(--text);}
        input:focus, select:focus { border-color: var(--navy); outline: none; }
        input[disabled], select[disabled] { background-color: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-emerald { background: var(--emerald); }
        .btn-navy { background: var(--navy); }
        .btn-outline { background: white; color: var(--navy); border: 2px solid var(--navy); }
        
        #scanner-container { display: none; margin-bottom: 15px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 3px solid var(--navy); }
        
        .item-list { margin-top: 15px; border-top: 2px dashed #e2e8f0; padding-top: 15px; }
        .cart-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .cart-item h4 { margin: 0 0 4px 0; font-size: 15px; color: var(--navy); }
        .cart-item p { margin: 0; font-size: 12px; color: #64748b; line-height: 1.4;}
        .btn-remove { background: #fee2e2; color: #ef4444; border: none; padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .tax-split-box { background: #e0f2fe; border: 1px dashed #7dd3fc; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #0369a1; text-align: center; margin-bottom: 12px; display: none;}
        .param-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2><i class="bi bi-receipt"></i> 1. Bill Details</h2>
        <label>Select Branch</label>
        <select id="branch-select"><option value="">Loading branches...</option></select>
        
        <label>Supplier</label>
        <select id="supplier-select"><option value="">Loading suppliers...</option></select>
        
        <div class="grid-2">
            <div><label>Bill Number</label><input type="text" id="bill-num" placeholder="Enter Bill #"></div>
            <div><label>Upload Bill Photo</label><input type="file" id="bill-image" accept="image/*" style="padding: 10px;"></div>
        </div>
    </div>

    <div class="card">
        <h2><i class="bi bi-box-seam"></i> 2. Add Products</h2>
        
        <div id="scanner-container">
            <div id="reader"></div>
            <div class="grid-2" style="margin-top: 10px;">
                <button class="btn-main btn-outline" onclick="switchCamera()">
                    <i class="bi bi-camera-reverse"></i> SWITCH CAMERA
                </button>
                <button class="btn-main btn-outline" style="color: #ef4444; border-color: #fca5a5;" onclick="stopScanner()">
                    <i class="bi bi-x-circle"></i> STOP SCANNER
                </button>
            </div>
        </div>
        
        <button class="btn-main btn-navy" id="start-scan-btn" onclick="startScanner()">
            <i class="bi bi-qr-code-scan"></i> SCAN BARCODE
        </button>
        
        <label>Barcode / Product Code</label>
        <input type="text" id="barcode" placeholder="Enter or Scan Barcode" onchange="lookupProduct()">
        
        <label>Product Name</label>
        <input type="text" id="item-name" placeholder="Item Name">
        
        <div class="grid-2">
            <div>
                <label>Category</label>
                <select id="category" onchange="handleDropdownAdd('category')">
                    <option value="">Select...</option>
                    <option value="Grocery">Grocery</option>
                    <option value="Stationery">Stationery</option>
                    <option value="ADD_NEW">+ Add New</option>
                </select>
            </div>
            <div>
                <label>Unit</label>
                <select id="unit" onchange="handleDropdownAdd('unit')">
                    <option value="">Select...</option>
                    <option value="Pieces">Pieces</option>
                    <option value="Litres">Litres</option>
                    <option value="Box">Box</option>
                    <option value="ADD_NEW">+ Add New</option>
                </select>
            </div>
        </div>

        <div id="dynamic-params"></div>         <datalist id="saved-param-keys"></datalist>
        <button class="btn-main" style="background:#f1f5f9; color:#475569; border: 1px dashed #cbd5e1; margin-bottom: 15px;" onclick="addParam()">
            <i class="bi bi-node-plus"></i> Add Custom Parameter (Size, Color, etc.)
        </button>

        <div class="grid-2">
            <div><label>Qty</label><input type="number" id="qty" placeholder="0"></div>
            <div><label>Cost/Unit (₹)</label><input type="number" id="cost-per" placeholder="0.00"></div>
        </div>
        
        <div class="grid-2">
            <div><label>Total Cost (₹)</label><input type="number" id="total-cost" placeholder="0.00"></div>
            <div>
                <label>GST Config</label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="gst-rate" placeholder="0%" style="width: 50%;">
                    <select id="gst-type" style="width: 50%; padding: 12px; font-size: 14px;" onchange="triggerTaxUpdate()">
                        <option value="split">C+S</option>
                        <option value="single">IGST</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div id="tax-split" class="tax-split-box"></div>

        <div class="grid-2" style="background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 15px;">
            <div><label style="color:var(--emerald);">Target Profit %</label><input type="number" id="profit-pct" placeholder="e.g. 20"></div>
            <div><label style="color:var(--emerald);">Min Sale Price (₹)</label><input type="number" id="msp" placeholder="0.00"></div>
        </div>

        <button class="btn-main btn-outline" onclick="addItemToBill()">
            <i class="bi bi-plus-circle-fill"></i> SAVE ITEM TO BILL
        </button>
    </div>

    <div class="card">
        <h2><i class="bi bi-cart-check"></i> 3. Bill Summary</h2>
        <div id="item-list" class="item-list">
            <p style="text-align: center; color: #94a3b8; font-size: 14px;">No items added yet.</p>
        </div>
        <h3 id="grand-total" style="text-align: right; color: var(--navy);">Total: ₹0.00</h3>
        
        <button class="btn-main btn-emerald" onclick="saveWholeBill()" id="save-bill-btn" style="margin-top: 15px;">
            <i class="bi bi-cloud-arrow-up-fill"></i> SAVE WHOLE BILL
        </button>
    </div>
</div>

<script>
    const activeUserPhone = localStorage.getItem("activeUserPhone");
    const assignedBranch = localStorage.getItem("assignedBranch");
    let currentBillItems = [];
    
 let html5QrCode;
    let currentFacingMode = "environment"; 
    let isRetryingScanner = false; 
    let savedShopParams = {}; // Master memory for custom parameters

    async function loadShopSettings() {
        try {
            const doc = await firebase.firestore().collection('companies').doc(activeUserPhone).collection('settings').doc('params').get();
            if (doc.exists && doc.data().customParams) savedShopParams = doc.data().customParams;
        } catch (e) { console.error("Error loading params", e); }
    }

    document.addEventListener('DOMContentLoaded', () => {
    firebase.auth().onAuthStateChanged((user) => {
            if (user && activeUserPhone) {
                loadShopSettings(); loadBranches(); loadSuppliers(); setupCalculators();
            }
        });
    });

    // --- 1. SMART RESPONSIVE SCANNER ---
    function startScanner() {
        document.getElementById('start-scan-btn').style.display = 'none';
        document.getElementById('scanner-container').style.display = 'block';
        
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        const isMobile = window.innerWidth < 600;
        const boxWidth = isMobile ? 250 : 350;
        const boxHeight = isMobile ? 120 : 150;

        html5QrCode.start(
            { facingMode: currentFacingMode },
            { fps: 15, qrbox: { width: boxWidth, height: boxHeight } },
            (decodedText) => {
                document.getElementById('barcode').value = decodedText;
                stopScanner(); lookupProduct(); 
            },
            (errorMessage) => { /* Ignore standard stream noise */ }
        ).catch(err => {
            // LAPTOP FIX: If "environment" (Back camera) fails, auto-flip to "user" (Webcam)
            if (currentFacingMode === "environment" && !isRetryingScanner) {
                console.warn("Back camera failed, trying front/webcam...");
                currentFacingMode = "user";
                isRetryingScanner = true;
                startScanner();
            } else {
                alert("Camera Error: Ensure permissions are granted. " + err.name);
                stopScanner();
            }
        });
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                resetScannerUI();
            });
        } else { resetScannerUI(); }
    }
    
    function resetScannerUI() {
        document.getElementById('scanner-container').style.display = 'none';
        document.getElementById('start-scan-btn').style.display = 'flex';
        isRetryingScanner = false;
    }

    function switchCamera() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
                startScanner();
            });
        }
    }

    // --- 2. DYNAMIC PARAMETERS ---
  // --- 2. DYNAMIC PARAMETERS (UPGRADED TO SMART DROPDOWNS) ---
    function addParam(key = "", val = "") {
        const div = document.createElement('div');
        div.className = 'param-row';
        
        let keyOptions = `<option value="">Select Parameter...</option>`;
        for(let k in savedShopParams) { keyOptions += `<option value="${k}" ${k===key ? 'selected':''}>${k}</option>`; }
        if(key && !savedShopParams[key]) keyOptions += `<option value="${key}" selected>${key}</option>`;
        keyOptions += `<option value="ADD_NEW">+ Add New Parameter</option>`;

        let valOptions = `<option value="">Select Value...</option>`;
        if(key && savedShopParams[key]) {
            savedShopParams[key].forEach(v => { valOptions += `<option value="${v}" ${v===val ? 'selected':''}>${v}</option>`; });
        }
        if(val && (!savedShopParams[key] || !savedShopParams[key].includes(val))) valOptions += `<option value="${val}" selected>${val}</option>`;
        valOptions += `<option value="ADD_NEW">+ Add New Value</option>`;

        div.innerHTML = `
            <select class="param-name" onchange="handleParamNameChange(this)" style="margin-bottom:0; flex:1; padding:12px; font-size:14px;">${keyOptions}</select>
            <select class="param-val" onchange="handleParamValChange(this)" style="margin-bottom:0; flex:1; padding:12px; font-size:14px;">${valOptions}</select>
            <button onclick="this.parentElement.remove()" style="background:#fee2e2; color:#ef4444; border:none; padding:12px; border-radius:10px; cursor:pointer;"><i class="bi bi-trash"></i></button>
        `;
        document.getElementById('dynamic-params').appendChild(div);
    }

    function handleParamNameChange(selectElem) {
        if(selectElem.value === 'ADD_NEW') {
            const newVal = prompt("Enter new parameter name (e.g., Company, Size):");
            if(newVal && newVal.trim() !== "") {
                selectElem.add(new Option(newVal, newVal), selectElem.options.length - 1);
                selectElem.value = newVal;
                if(!savedShopParams[newVal]) savedShopParams[newVal] = [];
            } else { selectElem.selectedIndex = 0; }
        }
        const valSelect = selectElem.parentElement.querySelector('.param-val');
        valSelect.innerHTML = '<option value="">Select Value...</option>';
        const selectedKey = selectElem.value;
        if(savedShopParams[selectedKey]) {
            savedShopParams[selectedKey].forEach(v => valSelect.add(new Option(v, v)));
        }
        valSelect.add(new Option("+ Add New Value", "ADD_NEW"));
    }

    function handleParamValChange(selectElem) {
        if(selectElem.value === 'ADD_NEW') {
            const newVal = prompt("Enter new value:");
            if(newVal && newVal.trim() !== "") {
                selectElem.add(new Option(newVal, newVal), selectElem.options.length - 1);
                selectElem.value = newVal;
                const key = selectElem.parentElement.querySelector('.param-name').value;
                if(key && savedShopParams[key] && !savedShopParams[key].includes(newVal)) savedShopParams[key].push(newVal);
            } else { selectElem.selectedIndex = 0; }
        }
    }

    // --- 3. LOADERS & MEMORY ---
    async function loadBranches() {
        const db = firebase.firestore();
        const select = document.getElementById('branch-select');
        select.innerHTML = '<option value="">Select Branch</option>';
        const snap = await db.collection('companies').doc(activeUserPhone).collection('branches').get();
        snap.forEach(doc => select.innerHTML += `<option value="${doc.data().branchId}">${doc.data().branchName}</option>`);
        if (assignedBranch && assignedBranch !== "admin") { select.value = assignedBranch; select.disabled = true; }
    }

    async function loadSuppliers() {
        const db = firebase.firestore();
        const select = document.getElementById('supplier-select');
        select.innerHTML = '<option value="">Select Supplier</option>';
        const snap = await db.collection('companies').doc(activeUserPhone).collection('suppliers').get();
        snap.forEach(doc => select.innerHTML += `<option value="${doc.data().id}">${doc.data().businessName}</option>`);
    }

    function handleDropdownAdd(elemId) {
        const el = document.getElementById(elemId);
        if(el.value === 'ADD_NEW') {
            const newVal = prompt(`Enter new ${elemId}:`);
            if(newVal && newVal.trim() !== "") {
                el.add(new Option(newVal, newVal), el.options[1]);
                el.value = newVal;
            } else { el.selectedIndex = 0; }
        }
    }

async function lookupProduct() {
        const barcode = document.getElementById('barcode').value.trim();
        if (!barcode) return;
        
        // Auto-clear UI for new scan
        document.getElementById('item-name').value = "";
        document.getElementById('category').selectedIndex = 0;
        document.getElementById('unit').selectedIndex = 0;
        document.getElementById('qty').value = "";
        document.getElementById('cost-per').value = "";
        document.getElementById('total-cost').value = "";
        document.getElementById('msp').value = "";
        document.getElementById('dynamic-params').innerHTML = "";
        document.getElementById('tax-split').style.display = 'none';
        
        try {
            const doc = await firebase.firestore().collection('companies').doc(activeUserPhone).collection('products_master').doc(barcode).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('item-name').value = data.name || "";
                ['category', 'unit'].forEach(id => {
                    const el = document.getElementById(id);
                    if(data[id] && !Array.from(el.options).some(opt => opt.value === data[id])) {
                        el.add(new Option(data[id], data[id]), el.options[1]);
                    }
                    el.value = data[id] || "";
                });
                if (data.customParams) {
                    document.getElementById('dynamic-params').innerHTML = "";
                    for (const [key, val] of Object.entries(data.customParams)) { addParam(key, val); }
                }
            }
        } catch (e) { console.error(e); }
    }

    // --- 4. CALCULATORS & GST TOGGLE ---
    function triggerTaxUpdate() {
        const t = parseFloat(document.getElementById('total-cost').value) || 0; 
        const g = parseFloat(document.getElementById('gst-rate').value) || 0;
        const type = document.getElementById('gst-type').value;
        const taxSplit = document.getElementById('tax-split');

        if(t > 0 && g > 0) {
            const base = t / (1 + (g/100));
            const taxAmt = t - base;
            taxSplit.style.display = 'block';
            if(type === 'split') {
                taxSplit.innerHTML = `Base: ₹${base.toFixed(2)} | CGST (${g/2}%): ₹${(taxAmt/2).toFixed(2)} | SGST (${g/2}%): ₹${(taxAmt/2).toFixed(2)}`;
            } else {
                taxSplit.innerHTML = `Base Value: ₹${base.toFixed(2)} | IGST (${g}%): ₹${taxAmt.toFixed(2)}`;
            }
        } else { taxSplit.style.display = 'none'; }
    }

    function setupCalculators() {
        const qty = document.getElementById('qty'), costPer = document.getElementById('cost-per'), 
              total = document.getElementById('total-cost'), gst = document.getElementById('gst-rate');
        const profitPct = document.getElementById('profit-pct'), msp = document.getElementById('msp');

        costPer.addEventListener('input', () => {
            if(qty.value) { total.value = (parseFloat(qty.value) * parseFloat(costPer.value)).toFixed(2); triggerTaxUpdate(); }
            triggerMspCalc();
        });
        total.addEventListener('input', () => {
            if(qty.value && qty.value > 0) { costPer.value = (parseFloat(total.value) / parseFloat(qty.value)).toFixed(2); triggerTaxUpdate(); }
            triggerMspCalc();
        });
        qty.addEventListener('input', () => { 
            if(costPer.value) { total.value = (parseFloat(qty.value) * parseFloat(costPer.value)).toFixed(2); } 
            triggerTaxUpdate(); triggerMspCalc();
        });
        gst.addEventListener('input', triggerTaxUpdate);

        profitPct.addEventListener('input', () => {
            const cp = parseFloat(costPer.value); const pct = parseFloat(profitPct.value);
            if(cp && pct) msp.value = (cp + (cp * (pct/100))).toFixed(2);
        });
        msp.addEventListener('input', () => {
            const cp = parseFloat(costPer.value); const m = parseFloat(msp.value);
            if(cp && m) profitPct.value = (((m - cp) / cp) * 100).toFixed(2);
        });

        function triggerMspCalc() {
            if(profitPct.value && costPer.value) { msp.value = (parseFloat(costPer.value) * (1 + parseFloat(profitPct.value)/100)).toFixed(2); }
        }
    }

    // --- 5. CART & FIREBASE SAVING ---
    function addItemToBill() {
        // Collect Dynamic Parameters
     let customData = {};
        document.querySelectorAll('.param-row').forEach(row => {
            let key = row.querySelector('.param-name').value.trim();
            let val = row.querySelector('.param-val').value.trim();
            if(key && val) {
                customData[key] = val;
                // Add key to dropdown memory if it doesn't exist yet
                const datalist = document.getElementById('saved-param-keys');
                if (!datalist.querySelector(`option[value="${key}"]`)) {
                    datalist.innerHTML += `<option value="${key}">`;
                }
            }
        });

        const item = {
            id: Date.now().toString(), 
            barcode: document.getElementById('barcode').value.trim(),
            name: document.getElementById('item-name').value.trim(), 
            category: document.getElementById('category').value,
            unit: document.getElementById('unit').value, 
            qty: parseFloat(document.getElementById('qty').value) || 0,
            costPer: parseFloat(document.getElementById('cost-per').value) || 0, 
            totalCost: parseFloat(document.getElementById('total-cost').value) || 0,
            gstRate: parseFloat(document.getElementById('gst-rate').value) || 0, 
            gstType: document.getElementById('gst-type').value,
            msp: parseFloat(document.getElementById('msp').value) || 0,
            customParams: customData
        };

        if(!item.name || item.qty <= 0 || item.totalCost <= 0) {
            return alert("Product Name, valid Qty, and Total Cost are mandatory!");
        }

        currentBillItems.push(item); renderCart(); clearItemForm();
    }

    function renderCart() {
        const list = document.getElementById('item-list'); 
        list.innerHTML = ""; let grandTotal = 0;
        
        currentBillItems.forEach(item => {
            grandTotal += item.totalCost;
            
            // Format custom parameters nicely for the UI
            let paramString = "";
            for (const [key, value] of Object.entries(item.customParams)) {
                paramString += `<span style="background:#e2e8f0; padding:2px 6px; border-radius:4px; font-size:10px; margin-right:4px;">${key}: ${value}</span>`;
            }

            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <h4>${item.name}</h4>
                        <p>Qty: ${item.qty} ${item.unit} | Cost: ₹${item.costPer}/u | Tax: ${item.gstRate}% (${item.gstType})</p>
                        <div style="margin-top:5px;">${paramString}</div>
                    </div>
                    <div style="text-align:right;">
                        <span style="font-weight: 700; color: var(--navy); display:block; margin-bottom:8px;">₹${item.totalCost.toFixed(2)}</span>
                        <button class="btn-remove" onclick="removeItem('${item.id}')"><i class="bi bi-trash"></i></button>
                    </div>
                </div>`;
        });
        document.getElementById('grand-total').innerText = `Total: ₹${grandTotal.toFixed(2)}`;
        if(currentBillItems.length === 0) list.innerHTML = '<p style="text-align: center; color: #94a3b8; font-size: 14px;">No items added yet.</p>';
    }

    function removeItem(id) { currentBillItems = currentBillItems.filter(i => i.id !== id); renderCart(); }
    
    function clearItemForm() {
        ['barcode', 'item-name', 'qty', 'cost-per', 'total-cost', 'profit-pct', 'msp'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('dynamic-params').innerHTML = ""; // Clear parameters
        document.getElementById('tax-split').style.display = 'none';
        document.getElementById('barcode').focus();
    }

    async function saveWholeBill() {
        if (currentBillItems.length === 0) return alert("Add items to the bill first.");
        const branchId = document.getElementById('branch-select').value;
        const supplierId = document.getElementById('supplier-select').value;
        const billNum = document.getElementById('bill-num').value.trim();
        
        if (!branchId || !supplierId || !billNum) return alert("Branch, Supplier, and Bill Number are mandatory!");

        const btn = document.getElementById('save-bill-btn'); 
        btn.innerHTML = "SAVING..."; btn.disabled = true;

        try {
            const db = firebase.firestore();
            let imageUrl = "";
            const fileInput = document.getElementById('bill-image').files[0];

            if (fileInput) {
                try {
                    const storageRef = firebase.storage().ref(`bills/${activeUserPhone}/${Date.now()}_${fileInput.name}`);
                    await storageRef.put(fileInput);
                    imageUrl = await storageRef.getDownloadURL();
                } catch (imgErr) {
                    console.error("Image upload failed:", imgErr);
                    alert("Image upload failed, saving text data only.");
                }
            }

            const grandTotal = currentBillItems.reduce((sum, item) => sum + item.totalCost, 0);

            // Save to Supplier Transactions
            await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(supplierId).collection('transactions').add({
                billNum: billNum, amount: grandTotal, type: 'Purchase', billImageUrl: imageUrl, date: new Date().toISOString()
            });

           const batch = db.batch();
            
            // Save newly learned custom parameters to shop settings
            const settingsRef = db.collection('companies').doc(activeUserPhone).collection('settings').doc('params');
            batch.set(settingsRef, { customParams: savedShopParams }, { merge: true });
            
            // Save Inventory to Branch
            for (const item of currentBillItems) {
                const invRef = db.collection('companies').doc(activeUserPhone).collection('branches').doc(branchId).collection('inventory').doc();
                batch.set(invRef, { ...item, supplierId, billNum, timestamp: new Date().toISOString() });
                
                // Save/Merge Master Product Data
                if (item.barcode && item.barcode !== "") {
                    const masterRef = db.collection('companies').doc(activeUserPhone).collection('products_master').doc(item.barcode);
                    batch.set(masterRef, { 
                        name: item.name, category: item.category, unit: item.unit, 
                        lastCostPrice: item.costPer, currentMsp: item.msp, 
                        customParams: item.customParams, lastUpdated: new Date().toISOString() 
                    }, { merge: true });
                }
            }
            await batch.commit();
            alert("Success! Bill Saved.");
            window.location.reload();
        } catch (e) { 
            console.error(e); alert("Database Error: " + e.message); 
            btn.innerHTML = "SAVE WHOLE BILL"; btn.disabled = false;
        }
    }
</script>
</body>
</html>
