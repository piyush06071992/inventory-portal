<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enter Stock - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script> <script src="/auth.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --navy: #1e3a8a; --emerald: #059669; --slate: #f8fafc; --text: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; color: var(--text); }
        .wrapper { padding: 16px; max-width: 700px; margin: auto; padding-bottom: 50px; }
        
        .card { background: white; padding: 18px; border-radius: 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        h2 { font-size: 18px; margin: 0 0 15px 0; color: var(--navy); display: flex; align-items: center; gap: 8px;}
        
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; background: white; font-weight: 600;}
        input:focus, select:focus { border-color: var(--navy); outline: none; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-emerald { background: var(--emerald); }
        .btn-outline { background: white; color: var(--navy); border: 2px solid var(--navy); }
        
        /* Scanner UI */
        #reader { width: 100%; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: none !important;}
        #reader button { background: var(--navy); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin: 5px; font-family: 'Inter'; font-weight: bold;}
        #reader select { padding: 8px; border-radius: 8px; font-family: 'Inter'; margin-bottom: 10px;}
        
        .item-list { margin-top: 15px; border-top: 2px dashed #e2e8f0; padding-top: 15px; }
        .cart-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .cart-item h4 { margin: 0 0 4px 0; font-size: 15px; color: var(--navy); }
        .cart-item p { margin: 0; font-size: 12px; color: #64748b; }
        .btn-remove { background: #fee2e2; color: #ef4444; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .tax-split-box { background: #e0f2fe; border: 1px dashed #7dd3fc; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #0369a1; text-align: center; margin-bottom: 12px; display: none;}
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2><i class="bi bi-receipt"></i> 1. Bill Details</h2>
        <label>Select Branch</label><select id="branch-select"></select>
        <label>Supplier</label><select id="supplier-select"></select>
        <div class="grid-2">
            <div><label>Bill Number</label><input type="text" id="bill-num" placeholder="Enter Bill #"></div>
            <div><label>Upload Bill Photo</label><input type="file" id="bill-image" accept="image/*" style="padding: 10px;"></div>
        </div>
    </div>

    <div class="card">
        <h2><i class="bi bi-box-seam"></i> 2. Add Products</h2>
        
        <div id="reader"></div>
        
        <label>Barcode / Product Code (Manual)</label>
        <input type="text" id="barcode" placeholder="Enter or Scan Barcode" onchange="lookupProduct()">
        
        <label>Product Name</label>
        <input type="text" id="item-name" placeholder="Item Name">
        
        <div class="grid-2">
            <div>
                <label>Category</label>
                <select id="category" onchange="handleDropdownAdd('category')">
                    <option value="">Select...</option><option value="Grocery">Grocery</option><option value="ADD_NEW">+ Add New</option>
                </select>
            </div>
            <div>
                <label>Unit</label>
                <select id="unit" onchange="handleDropdownAdd('unit')">
                    <option value="">Select...</option><option value="Pieces">Pieces</option><option value="Litres">Litres</option><option value="Box">Box</option><option value="ADD_NEW">+ Add New</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div><label>Qty</label><input type="number" id="qty" placeholder="0"></div>
            <div><label>Cost/Unit (₹)</label><input type="number" id="cost-per" placeholder="0.00"></div>
        </div>
        
        <div class="grid-2">
            <div><label>Total Cost (₹)</label><input type="number" id="total-cost" placeholder="0.00"></div>
            <div><label>Total GST %</label><input type="number" id="gst-rate" placeholder="0" value="0"></div>
        </div>
        
        <div id="tax-split" class="tax-split-box"></div>

        <div class="grid-2" style="background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 12px;">
            <div><label style="color:var(--emerald);">Target Profit %</label><input type="number" id="profit-pct" placeholder="20%"></div>
            <div><label style="color:var(--emerald);">Min Sale Price (₹)</label><input type="number" id="msp" placeholder="0.00"></div>
        </div>

        <button class="btn-main btn-outline" onclick="addItemToBill()">
            <i class="bi bi-plus-circle-fill"></i> SAVE ITEM TO BILL
        </button>
    </div>

    <div class="card">
        <h2><i class="bi bi-cart-check"></i> 3. Bill Summary</h2>
        <div id="item-list" class="item-list"><p style="text-align: center; color: #94a3b8; font-size: 14px;">No items added yet.</p></div>
        <h3 id="grand-total" style="text-align: right; color: var(--navy);">Total: ₹0.00</h3>
        
        <button class="btn-main btn-emerald" onclick="saveWholeBill()" id="save-bill-btn" style="margin-top: 15px;">
            <i class="bi bi-cloud-arrow-up-fill"></i> SAVE WHOLE BILL
        </button>
    </div>
</div>

<script>
    const activeUserPhone = localStorage.getItem("activeUserPhone");
    const assignedBranch = localStorage.getItem("assignedBranch");
    let currentBillItems = [];
    let html5QrcodeScanner;

    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged((user) => {
            if (user && activeUserPhone) {
                loadBranches(); loadSuppliers(); setupCalculators(); initScanner();
            }
        });
    });

    // --- 1. SCANNER INITIALIZATION ---
    function initScanner() {
        // This uses the full UI provided by the library. It handles cameras automatically.
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250}, rememberLastUsedCamera: true });
        html5QrcodeScanner.render(onScanSuccess);
    }
    
    function onScanSuccess(decodedText) {
        document.getElementById('barcode').value = decodedText;
        lookupProduct();
        // Optional: you can clear the scanner here if you want it to stop after one scan
        // html5QrcodeScanner.clear();
    }

    // --- 2. LOADERS & DROPDOWNS ---
    async function loadBranches() {
        const db = firebase.firestore();
        const select = document.getElementById('branch-select');
        const snap = await db.collection('companies').doc(activeUserPhone).collection('branches').get();
        snap.forEach(doc => select.innerHTML += `<option value="${doc.data().branchId}">${doc.data().branchName}</option>`);
        if (assignedBranch && assignedBranch !== "admin") { select.value = assignedBranch; select.disabled = true; }
    }

    async function loadSuppliers() {
        const db = firebase.firestore();
        const select = document.getElementById('supplier-select');
        const snap = await db.collection('companies').doc(activeUserPhone).collection('suppliers').get();
        snap.forEach(doc => select.innerHTML += `<option value="${doc.data().id}">${doc.data().businessName}</option>`);
    }

    function handleDropdownAdd(elemId) {
        const el = document.getElementById(elemId);
        if(el.value === 'ADD_NEW') {
            const newVal = prompt(`Enter new ${elemId}:`);
            if(newVal && newVal.trim() !== "") {
                el.add(new Option(newVal, newVal), el.options[1]);
                el.value = newVal;
            } else { el.selectedIndex = 0; }
        }
    }

    async function lookupProduct() {
        const barcode = document.getElementById('barcode').value.trim();
        if (!barcode) return;
        try {
            const doc = await firebase.firestore().collection('companies').doc(activeUserPhone).collection('products_master').doc(barcode).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('item-name').value = data.name || "";
                
                ['category', 'unit'].forEach(id => {
                    const el = document.getElementById(id);
                    if(data[id] && !Array.from(el.options).some(opt => opt.value === data[id])) {
                        el.add(new Option(data[id], data[id]), el.options[1]);
                    }
                    el.value = data[id] || "";
                });
            }
        } catch (e) { console.error("Lookup failed", e); }
    }

    // --- 3. BI-DIRECTIONAL MATH & GST SPLIT ---
    function setupCalculators() {
        const qty = document.getElementById('qty'), costPer = document.getElementById('cost-per'), 
              total = document.getElementById('total-cost'), gst = document.getElementById('gst-rate');
        const profitPct = document.getElementById('profit-pct'), msp = document.getElementById('msp');
        const taxSplit = document.getElementById('tax-split');

        const updateTaxSplit = () => {
            const t = parseFloat(total.value) || 0; const g = parseFloat(gst.value) || 0;
            if(t > 0 && g > 0) {
                // Assuming Total Cost INCLUDES GST. Base = Total / (1 + GST%)
                const base = t / (1 + (g/100));
                const taxAmt = t - base;
                taxSplit.style.display = 'block';
                taxSplit.innerHTML = `Base Value: ₹${base.toFixed(2)} | CGST (${g/2}%): ₹${(taxAmt/2).toFixed(2)} | SGST (${g/2}%): ₹${(taxAmt/2).toFixed(2)}`;
            } else { taxSplit.style.display = 'none'; }
        };

        // Total vs Unit Cost
        costPer.addEventListener('input', () => {
            if(qty.value) { total.value = (parseFloat(qty.value) * parseFloat(costPer.value)).toFixed(2); updateTaxSplit(); }
            triggerMspCalc();
        });
        total.addEventListener('input', () => {
            if(qty.value && qty.value > 0) { costPer.value = (parseFloat(total.value) / parseFloat(qty.value)).toFixed(2); updateTaxSplit(); }
            triggerMspCalc();
        });
        qty.addEventListener('input', () => { if(costPer.value) { total.value = (parseFloat(qty.value) * parseFloat(costPer.value)).toFixed(2); } updateTaxSplit(); triggerMspCalc();});
        gst.addEventListener('input', updateTaxSplit);

        // Profit vs MSP
        profitPct.addEventListener('input', () => {
            const cp = parseFloat(costPer.value); const pct = parseFloat(profitPct.value);
            if(cp && pct) msp.value = (cp + (cp * (pct/100))).toFixed(2);
        });
        msp.addEventListener('input', () => {
            const cp = parseFloat(costPer.value); const m = parseFloat(msp.value);
            if(cp && m) profitPct.value = (((m - cp) / cp) * 100).toFixed(2);
        });

        function triggerMspCalc() {
            if(profitPct.value && costPer.value) { msp.value = (parseFloat(costPer.value) * (1 + parseFloat(profitPct.value)/100)).toFixed(2); }
        }
    }

    // --- 4. CART & SAVING ---
    function addItemToBill() {
        const item = {
            id: Date.now().toString(), barcode: document.getElementById('barcode').value.trim(),
            name: document.getElementById('item-name').value.trim(), category: document.getElementById('category').value,
            unit: document.getElementById('unit').value, qty: parseFloat(document.getElementById('qty').value),
            costPer: parseFloat(document.getElementById('cost-per').value), totalCost: parseFloat(document.getElementById('total-cost').value),
            gst: parseFloat(document.getElementById('gst-rate').value) || 0, msp: parseFloat(document.getElementById('msp').value) || 0
        };
        if(!item.name || !item.qty || !item.totalCost) return alert("Name, Qty, and Total Cost are required!");
        currentBillItems.push(item); renderCart(); clearItemForm();
    }

    function renderCart() {
        const list = document.getElementById('item-list'); list.innerHTML = ""; let grandTotal = 0;
        currentBillItems.forEach(item => {
            grandTotal += item.totalCost;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <h4>${item.name}</h4>
                        <p>Qty: ${item.qty} ${item.unit} | Cost: ₹${item.costPer}/unit | MSP: ₹${item.msp}</p>
                    </div>
                    <div style="text-align:right;">
                        <span style="font-weight: 700; color: var(--navy); display:block; margin-bottom:5px;">₹${item.totalCost.toFixed(2)}</span>
                        <button class="btn-remove" onclick="removeItem('${item.id}')"><i class="bi bi-trash"></i></button>
                    </div>
                </div>`;
        });
        document.getElementById('grand-total').innerText = `Total: ₹${grandTotal.toFixed(2)}`;
    }

    function removeItem(id) { currentBillItems = currentBillItems.filter(i => i.id !== id); renderCart(); }
    
    function clearItemForm() {
        ['barcode', 'item-name', 'qty', 'cost-per', 'total-cost', 'profit-pct', 'msp'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('tax-split').style.display = 'none';
        document.getElementById('barcode').focus();
    }

    async function saveWholeBill() {
        if (currentBillItems.length === 0) return alert("Add items to the bill first.");
        const branchId = document.getElementById('branch-select').value, supplierId = document.getElementById('supplier-select').value, billNum = document.getElementById('bill-num').value.trim();
        if (!branchId || !supplierId || !billNum) return alert("Branch, Supplier, and Bill Number are required!");

        const btn = document.getElementById('save-bill-btn'); btn.innerHTML = "UPLOADING & SAVING..."; btn.disabled = true;

        try {
            const db = firebase.firestore(); let imageUrl = "";
            const fileInput = document.getElementById('bill-image').files[0];
            if (fileInput) {
                const storageRef = firebase.storage().ref(`bills/${activeUserPhone}/${Date.now()}_${fileInput.name}`);
                await storageRef.put(fileInput); imageUrl = await storageRef.getDownloadURL();
            }

            const grandTotal = currentBillItems.reduce((sum, item) => sum + item.totalCost, 0);
            
            // Save to Supplier
            await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(supplierId).collection('transactions').add({
                billNum, amount: grandTotal, type: 'Purchase', billImageUrl: imageUrl, date: new Date().toISOString()
            });

            // Save Inventory & Master
            const batch = db.batch();
            for (const item of currentBillItems) {
                const invRef = db.collection('companies').doc(activeUserPhone).collection('branches').doc(branchId).collection('inventory').doc();
                batch.set(invRef, { ...item, supplierId, billNum, timestamp: new Date().toISOString() });
                if (item.barcode) {
                    const masterRef = db.collection('companies').doc(activeUserPhone).collection('products_master').doc(item.barcode);
                    batch.set(masterRef, { name: item.name, category: item.category, unit: item.unit, lastCostPrice: item.costPer, currentMsp: item.msp, lastUpdated: new Date().toISOString() }, { merge: true });
                }
            }
            await batch.commit();
            alert("Bill Saved Successfully!");
            document.getElementById('bill-num').value = ""; document.getElementById('bill-image').value = ""; currentBillItems = []; renderCart();
        } catch (e) { alert("Database Error: " + e.message); } 
        finally { btn.innerHTML = `<i class="bi bi-cloud-arrow-up-fill"></i> SAVE WHOLE BILL`; btn.disabled = false; }
    }
</script>
</body>
</html>
