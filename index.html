<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Saarthi</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E3A8A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="main-container">
        <div class="header-frame">
            <h1>BUSINESS SAARTHI</h1>
        </div>

        <div class="form-content">
            <h2 id="portal-title">SECURE GATEWAY</h2>
            
            <input type="password" id="pin" placeholder="ENTER 6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">

            <button onclick="goToLogin()" id="action-login-btn">GO TO LOGIN</button>
            
            <button onclick="goToRegister()" id="action-reg-btn" style="background: transparent; color: var(--navy-blue); border: 4px solid var(--navy-blue); box-shadow: 5px 5px 0px var(--navy-blue);">
                GO TO REGISTER
            </button>
            
            <div id="msg" class="message"></div>
        </div>
    </div>

    <script>
        // Simple routing verification script
        function getPin() {
            return document.getElementById('pin').value;
        }

        function goToLogin() {
            const pinVal = getPin();
            if (pinVal.length !== 6) {
                const msg = document.getElementById('msg');
                msg.style.color = "var(--accent)";
                msg.innerText = "PLEASE ENTER 6-DIGIT PIN FIRST!";
                return;
            }
            // Passes the PIN over to the standalone login page query string
            window.location.href = `./login.html?pin=${pinVal}`;
        }

        function goToRegister() {
            const pinVal = getPin();
            if (pinVal.length !== 6) {
                const msg = document.getElementById('msg');
                msg.style.color = "var(--accent)";
                msg.innerText = "PLEASE ENTER 6-DIGIT PIN FIRST!";
                return;
            }
            // Passes the PIN over to the standalone registration page query string
            window.location.href = `./register.html?pin=${pinVal}`;
        }
    </script>
</body>
</html>
