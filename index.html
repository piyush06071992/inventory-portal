<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Saarthi</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1E3A8A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .install-card-overlay { background: #FFFFFF; border: 5px solid var(--navy-blue); box-shadow: 6px 6px 0px var(--accent); border-radius: 20px; padding: 20px; margin: 15px auto; width: 95%; max-width: 420px; box-sizing: border-box; text-align: center; display: none; animation: slideDown 0.4s ease-out; }
        .install-card-overlay p { color: var(--navy-blue); margin: 0 0 15px 0; font-size: 16px; letter-spacing: 0.5px; }
        .install-card-overlay button { margin-top: 0; padding: 14px; font-size: 16px; width: 100%; }
        .pin-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        .view-btn-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); cursor: pointer; font-size: 16px; user-select: none; -webkit-user-select: none; }
        .pin-wrapper input { margin-bottom: 0; padding-right: 85px; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

       /* Welcome Portal Elements (Dashboard Tile Grid) */
        .welcome-motto { font-size: 13px; font-weight: 700; color: #64748b; line-height: 1.5; text-align: center; margin-bottom: 25px; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .hub-menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; box-sizing: border-box; }
        
        .btn-portal { border: none; border-radius: 16px; cursor: pointer; display: flex; color: white; transition: transform 0.1s, box-shadow 0.1s; box-sizing: border-box; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'Inter', sans-serif; position: relative;}
        
        /* Realistic physical button press effect */
        .btn-portal:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px transparent !important; }

        /* Banner Style (Top Button) */
        .tile-full { grid-column: span 2; padding: 20px; flex-direction: row; align-items: center; justify-content: flex-start; gap: 15px; font-size: 16px; font-weight: 900; }
        .tile-full i { font-size: 32px; }

        /* Square Tile Style (Bottom 4 Buttons) */
        .tile-half { padding: 22px 10px; flex-direction: column; align-items: center; justify-content: center; gap: 10px; font-size: 13px; font-weight: 800; text-align: center; }
        .tile-half i { font-size: 36px; display: block; margin-bottom: 2px; }

        /* Colors & 3D Shadows */
        .color-reg { background: #10B981; box-shadow: 4px 4px 0px #064e3b; }
        .color-shop { background: #1E3A8A; box-shadow: 4px 4px 0px #172554; }
        .color-staff { background: #6366F1; box-shadow: 4px 4px 0px #312e81; }
        .color-cust { background: #D97706; box-shadow: 4px 4px 0px #78350f; }
        .color-dev { background: #475569; box-shadow: 4px 4px 0px #0f172a; }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%;">

        <div id="install-banner" class="install-card-overlay">
            <p>INSTALL SAARTHI FOR A FASTER & BETTER EXPERIENCE!</p>
            <button id="install-button" style="background-color: #10B981; box-shadow: 3px 3px 0px var(--navy-blue);">INSTALL NOW</button>
        </div>

        <div class="main-container">
            <div class="header-frame">
                <h1>BUSINESS SAARTHI</h1>
            </div>

            <div class="form-content">
                <h2 id="form-title">WELCOME GATEWAY</h2>
                
                <div id="welcome-portal-block">
                    <p class="welcome-motto">
                        Empowering Local Indian Retailers to Scale Digital, Manage Smart, and Grow Unlimited!
                    </p>
                    
          <div class="hub-menu-grid">
                        <!-- Top Full-Width Banner -->
                        <button class="btn-portal tile-full color-reg" onclick="showRegistrationForm()">
                            <i class="bi bi-rocket-takeoff-fill"></i>
                            <div style="text-align: left; line-height: 1.2;">
                                <span style="display: block; font-size: 11px; opacity: 0.85; font-weight: 700; margin-bottom: 2px;">NEW HERE?</span>
                                Register Business
                            </div>
                        </button>
                        
                        <!-- 2x2 Square Tiles -->
                        <button class="btn-portal tile-half color-shop" onclick="window.location.href='/login.html'">
                            <i class="bi bi-shop"></i>
                            Owner Login
                        </button>
                        
                        <button class="btn-portal tile-half color-staff" onclick="window.location.href='/staff-login.html'">
                            <i class="bi bi-person-vcard-fill"></i>
                            Staff Portal
                        </button>
                        
                        <button class="btn-portal tile-half color-cust" onclick="window.location.href='/customer-login.html'">
                            <i class="bi bi-bag-heart-fill"></i>
                            Customers
                        </button>
                        
                        <button class="btn-portal tile-half color-dev" onclick="window.location.href='/developer.html'">
                            <i class="bi bi-terminal-dash"></i>
                            Developer
                        </button>
                    </div>
                </div>

                <div id="registration-fields" style="display: none;">
                    <input type="text" id="biz-name" placeholder="ENTER BUSINESS NAME">
                    <input type="email" id="email-id" placeholder="ENTER EMAIL ID">
                    <input type="text" id="phone-num" placeholder="ENTER PHONE NUMBER" inputmode="numeric" maxlength="10">
                    
                    <div class="pin-wrapper">
                        <input type="password" id="pin" placeholder="CREATE 6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">
                        <span id="toggle-txt" class="view-btn-toggle" onclick="handleToggleView()">SHOW</span>
                    </div>

                    <button onclick="handleRegistration()" id="register-btn">REGISTER</button>
                    
                    <div class="toggle-link" onclick="showWelcomePortal()">
                        ← BACK TO HUB OPTIONS
                    </div>
                    
                    <div class="text-center mt-3" style="text-align: center; margin-top: 15px;">
                        <a href="admin.html" class="text-decoration-none" style="text-decoration: none; color: #64748b; font-size: 13px; opacity: 0.6; letter-spacing: 0.5px;">
                            <i class="bi bi-shield-lock-fill"></i> SYSTEM ADMINISTRATION
                        </a>
                    </div>
                </div>

                <div id="otp-fields" style="display: none;">
                    <p style="text-align: center; color: var(--navy-blue); font-size: 16px; margin-bottom: 15px;">
                        ENTER THE 6-DIGIT OTP SENT TO YOUR MOBILE
                    </p>
                    <input type="text" id="otp-code" placeholder="ENTER OTP CODE" inputmode="numeric" maxlength="6">
                    
                    <button onclick="verifyOtpCode()" id="otp-btn" style="background-color: #10B981;">VERIFY & CONFIRM</button>
                    
                    <div class="toggle-link" onclick="cancelOtpView()">
                        ← BACK TO DETAILS
                    </div>
                </div>
                
                <div id="recaptcha-container"></div>
                
                <div id="msg" class="message" style="color: var(--accent); margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script src="/auth.js"></script>
    
    <script>
        // PWA Service Worker Loader
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installButton = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                installBanner.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // VIEW STATE TRIGGERS
        稳定: function showRegistrationForm() {
            document.getElementById('welcome-portal-block').style.display = 'none';
            document.getElementById('otp-fields').style.display = 'none';
            document.getElementById('registration-fields').style.display = 'block';
            document.getElementById('form-title').innerText = "SHOP REGISTRATION";
            document.getElementById('msg').innerText = "";
        }

        function showWelcomePortal() {
            document.getElementById('registration-fields').style.display = 'none';
            document.getElementById('otp-fields').style.display = 'none';
            document.getElementById('welcome-portal-block').style.display = 'block';
            document.getElementById('form-title').innerText = "WELCOME GATEWAY";
            document.getElementById('msg').innerText = "";
        }

        function handleToggleView() {
            const field = document.getElementById('pin');
            const txt = document.getElementById('toggle-txt');
            if (field.type === 'password') {
                field.type = 'text';
                txt.innerText = 'HIDE';
            } else {
                field.type = 'password';
                txt.innerText = 'SHOW';
            }
        }

        let confirmationResultObj = null;

        window.onload = function() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'invisible',
                'callback': (response) => {}
            });
        };

        function handleRegistration() {
            const bizName = document.getElementById('biz-name').value.trim();
            const email = document.getElementById('email-id').value.trim();
            const phone = document.getElementById('phone-num').value.trim();
            const pin = document.getElementById('pin').value;
            const msg = document.getElementById('msg');
            const regBtn = document.getElementById('register-btn');
            
            msg.innerText = "";

            if (!bizName || !email || !phone || !pin) {
                msg.style.color = "var(--accent)"; msg.innerText = "ALL FIELDS ARE MANDATORY!"; return;
            }
            if (phone.length !== 10) {
                msg.style.color = "var(--accent)"; msg.innerText = "PHONE NUMBER MUST BE 10 DIGITS!"; return;
            }
            if (pin.length !== 6) {
                msg.style.color = "var(--accent)"; msg.innerText = "PIN MUST BE EXACTLY 6 DIGITS!"; return;
            }

            regBtn.innerText = "SENDING OTP SMS...";
            regBtn.disabled = true;

            const formattedPhoneNumber = "+91" + phone;
            const appVerifier = window.recaptchaVerifier;

            firebase.auth().signInWithPhoneNumber(formattedPhoneNumber, appVerifier)
                .then((confirmationResult) => {
                    confirmationResultObj = confirmationResult;
                    document.getElementById('registration-fields').style.display = 'none';
                    document.getElementById('welcome-portal-block').style.display = 'none';
                    document.getElementById('otp-fields').style.display = 'block';
                    document.getElementById('form-title').innerText = "VERIFY OTP";
                    msg.style.color = "green";
                    msg.innerText = "OTP SMS DISPATCHED SUCCESSFULLY!";
                })
                .catch((error) => {
                    console.error("SMS Delivery Failed:", error);
                    msg.style.color = "var(--accent)";
                    msg.innerText = "SMS ERROR: " + error.message;
                })
                .finally(() => {
                    regBtn.innerText = "REGISTER";
                    regBtn.disabled = false;
                });
        }

        async function verifyOtpCode() {
            const bizName = document.getElementById('biz-name').value.trim();
            const email = document.getElementById('email-id').value.trim();
            const phone = document.getElementById('phone-num').value.trim();
            const pin = document.getElementById('pin').value;
            
            const code = document.getElementById('otp-code').value.trim();
            const msg = document.getElementById('msg');
            const otpBtn = document.getElementById('otp-btn');
            msg.innerText = "";

            if (code.length !== 6) {
                msg.style.color = "var(--accent)"; msg.innerText = "PLEASE ENTER VALID 6-DIGIT CODE!"; return;
            }

            otpBtn.innerText = "VERIFYING OTP...";
            otpBtn.disabled = true;

            try {
                await confirmationResultObj.confirm(code);
                msg.style.color = "green";
                msg.innerText = "PHONE VERIFIED! CREATING ERP WORKSPACE...";

                const authEmail = phone + "@businesssaarthi.com";
                const masterKey = phone + "@SAARTHI";
                await firebase.auth().createUserWithEmailAndPassword(authEmail, masterKey);

                const now = new Date();
                const trialEnd = new Date();
                trialEnd.setDate(now.getDate() + 30);
                const lockoutEnd = new Date();
                lockoutEnd.setDate(now.getDate() + 60); 
                
                const db = firebase.firestore();
                
                await db.collection('companies').doc(phone).set({
                    businessName: bizName,
                    emailId: email,
                    ownerPhone: phone,
                    securePin: pin,
                    registeredAt: now.toISOString(),
                    trialEndsAt: trialEnd.toISOString(),
                    lockoutEndsAt: lockoutEnd.toISOString(),
                    paymentStatus: "TRIAL"
                });

                await db.collection('companies').doc(phone).collection('branches').doc('branch_01').set({
                    branchName: "Main Branch",
                    branchId: "branch_01",
                    createdAt: now.toISOString(),
                    status: "active"
                });

                msg.innerText = "WORKSPACE CREATED! REDIRECTING...";
                alert("ERP Workspace Registered Successfully! Enjoy your 1-Month Free Trial.");
                window.location.href = '/dashboard.html';

            } catch (error) {
                console.error(error);
                msg.style.color = "var(--accent)";
                if (error.code === 'auth/email-already-in-use') {
                    msg.innerText = "THIS PHONE NUMBER IS ALREADY REGISTERED. PLEASE LOGIN.";
                } else {
                    msg.innerText = "ERROR: " + error.message;
                }
                otpBtn.innerText = "VERIFY & CONFIRM";
                otpBtn.disabled = false;
            }
        }

        function cancelOtpView() {
            document.getElementById('otp-fields').style.display = 'none';
            document.getElementById('welcome-portal-block').style.display = 'none';
            document.getElementById('registration-fields').style.display = 'block';
            document.getElementById('form-title').innerText = "SHOP REGISTRATION";
            document.getElementById('msg').innerText = "";
        }
    </script>
</body>
</html>
