<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Saarthi</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E3A8A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
    
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Special container to position the view text inside/beside the input */
        .pin-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }
        .view-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Make sure text doesn't overlap the view button */
        .pin-container input {
            margin-bottom: 0;
            padding-right: 70px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-frame">
            <h1>BUSINESS SAARTHI</h1>
        </div>

        <div class="form-content">
            <h2 id="portal-title">SECURE GATEWAY</h2>
            
            <div class="pin-container">
                <input type="password" id="pin" placeholder="6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">
                <span id="toggle-view-btn" class="view-toggle" onclick="togglePinVisibility()">SHOW</span>
            </div>

            <button onclick="goToLogin()" id="action-login-btn">GO TO LOGIN</button>
            
            <button onclick="goToRegister()" id="action-reg-btn" style="background: transparent; color: var(--navy-blue); border: 4px solid var(--navy-blue); box-shadow: 5px 5px 0px var(--navy-blue);">
                GO TO REGISTER
            </button>
            
            <div id="msg" class="message"></div>
        </div>
    </div>

    <script>
        // Toggles between password type and text type
        function togglePinVisibility() {
            const pinInput = document.getElementById('pin');
            const toggleBtn = document.getElementById('toggle-view-btn');
            
            if (pinInput.type === 'password') {
                pinInput.type = 'text';
                toggleBtn.innerText = 'HIDE';
            } else {
                pinInput.type = 'password';
                toggleBtn.innerText = 'SHOW';
            }
        }

        function getPin() {
            return document.getElementById('pin').value;
        }

        function goToLogin() {
            const pinVal = getPin();
            if (pinVal.length !== 6) {
                const msg = document.getElementById('msg');
                msg.style.color = "var(--accent)";
                msg.innerText = "PLEASE ENTER 6-DIGIT PIN FIRST!";
                return;
            }
            window.location.href = `./login.html?pin=${pinVal}`;
        }

        function goToRegister() {
            const pinVal = getPin();
            if (pinVal.length !== 6) {
                const msg = document.getElementById('msg');
                msg.style.color = "var(--accent)";
                msg.innerText = "PLEASE ENTER 6-DIGIT PIN FIRST!";
                return;
            }
            window.location.href = `./register.html?pin=${pinVal}`;
        }
    </script>
</body>
</html>
