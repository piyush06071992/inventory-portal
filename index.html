<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Saarthi</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E3A8A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="install-banner" style="display: none; background: #1E3A8A; color: white; padding: 15px; text-align: center; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <span id="install-text">Install Saarthi for a better experience!</span>
        <button id="install-button" style="background: #fbbf24; color: #1e3a8a; border: none; padding: 8px 15px; margin-left: 10px; font-weight: bold; border-radius: 5px; cursor: pointer;">
            INSTALL NOW
        </button>
        <span id="close-banner" style="margin-left: 15px; cursor: pointer; font-weight: bold; padding: 5px;">✕</span>
    </div>

    <div class="main-container">
        <div class="header-frame">
            <h1>BUSINESS SAARTHI</h1>
        </div>

        <div class="form-content">
            <h2 id="form-title">SHOP LOGIN</h2>
            
            <div id="register-fields" style="display: none;">
                <input type="text" id="shop-name" placeholder="SHOP NAME (e.g., Sarandipity)">
                <input type="email" id="reg-email" placeholder="EMAIL ID (REQUIRED)">
                <input type="tel" id="reg-mobile" placeholder="MOBILE NUMBER (10 DIGITS)" inputmode="numeric" maxlength="10">
            </div>

            <div id="login-fields">
                <input type="text" id="login-id" placeholder="EMAIL OR MOBILE NUMBER">
            </div>

            <input type="password" id="pin" placeholder="6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">

            <button id="main-btn">LOGIN TO PORTAL</button>
            
            <div class="options-row">
                <span id="forgot-pin">FORGOT PIN?</span>
            </div>

            <div class="toggle-link" id="toggle-mode">NEW SHOP? CREATE ACCOUNT</div>
            <div id="msg" class="message"></div>
        </div>
    </div>

    <script>
        // 1. Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Active'))
                    .catch(err => console.log('Service Worker Error', err));
            });
        }

        // 2. Installation Logic
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installButton = document.getElementById('install-button');
        const installText = document.getElementById('install-text');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                installBanner.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // iPhone Detection
        const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        if (isIos && !isStandalone) {
            installBanner.style.display = 'block';
            installText.innerText = "To Install: Tap 'Share' then 'Add to Home Screen' ↓";
            installButton.style.display = 'none';
        }

        document.getElementById('close-banner').addEventListener('click', () => {
            installBanner.style.display = 'none';
        });
    </script>

    <script type="module" src="./auth.js"></script>
</body>
</html>
