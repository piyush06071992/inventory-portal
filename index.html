<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Saarthi</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1E3A8A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
    
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Modernized Responsive Install Banner Overlay */
        .install-card-overlay {
            background: #FFFFFF;
            border: 5px solid var(--navy-blue);
            box-shadow: 6px 6px 0px var(--accent);
            border-radius: 20px;
            padding: 20px;
            margin: 15px auto;
            width: 95%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
            display: none; /* Controlled by PWA handler */
            animation: slideDown 0.4s ease-out;
        }

        .install-card-overlay p {
            color: var(--navy-blue);
            margin: 0 0 15px 0;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .install-card-overlay button {
            margin-top: 0;
            padding: 14px;
            font-size: 16px;
            width: 100%; /* Spans full width now */
        }

        /* View PIN Input Wrapper */
        .pin-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }
        .view-btn-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            -webkit-user-select: none;
        }
        .pin-wrapper input {
            margin-bottom: 0;
            padding-right: 85px;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%;">

        <div id="install-banner" class="install-card-overlay">
            <p>INSTALL SAARTHI FOR A FASTER & BETTER EXPERIENCE!</p>
            <button id="install-button" style="background-color: #10B981; box-shadow: 3px 3px 0px var(--navy-blue);">INSTALL NOW</button>
        </div>

        <div class="main-container">
            <div class="header-frame">
                <h1>BUSINESS SAARTHI</h1>
            </div>

            <div class="form-content">
                <h2>SHOP REGISTRATION</h2>
                
                <input type="text" id="biz-name" placeholder="ENTER BUSINESS NAME">
                <input type="email" id="email-id" placeholder="ENTER EMAIL ID">
                <input type="text" id="phone-num" placeholder="ENTER PHONE NUMBER" inputmode="numeric" maxlength="10">
                
                <div class="pin-wrapper">
                    <input type="password" id="pin" placeholder="CREATE 6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">
                    <span id="toggle-txt" class="view-btn-toggle" onclick="handleToggleView()">SHOW</span>
                </div>

                <button onclick="handleRegistration()" id="register-btn">REGISTER</button>
                
                <div class="toggle-link" onclick="window.location.href='./login.html'">
                    ALREADY REGISTERED? LOGIN
                </div>
                
                <div id="msg" class="message" style="color: var(--accent); margin-top: 15px;"></div>
            </div>
        </div>

    </div>

    <script>
        // PWA Service Worker Onboarding Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        // Dedicated Mobile PWA Installation Hook
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installButton = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                installBanner.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // Toggle Password Visibility Component
        function handleToggleView() {
            const field = document.getElementById('pin');
            const txt = document.getElementById('toggle-txt');
            if (field.type === 'password') {
                field.type = 'text';
                txt.innerText = 'HIDE';
            } else {
                field.type = 'password';
                txt.innerText = 'SHOW';
            }
        }

        // Basic Client Form Submission Guard
        function handleRegistration() {
            const bizName = document.getElementById('biz-name').value.trim();
            const email = document.getElementById('email-id').value.trim();
            const phone = document.getElementById('phone-num').value.trim();
            const pin = document.getElementById('pin').value;
            const msg = document.getElementById('msg');
            msg.innerText = "";

            if (!bizName || !email || !phone || !pin) {
                msg.innerText = "ALL FIELDS ARE MANDATORY!";
                return;
            }
            if (phone.length !== 10) {
                msg.innerText = "PHONE NUMBER MUST BE 10 DIGITS!";
                return;
            }
            if (pin.length !== 6) {
                msg.innerText = "PIN MUST BE EXACTLY 6 DIGITS!";
                return;
            }

            msg.style.color = "green";
            msg.innerText = "PROCESSING REGISTRATION SUBMISSION...";
        }
    </script>
</body>
</html>
