<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Saarthi</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .pin-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }
        /* Hidden layout overlay toggle button */
        .view-btn-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            -webkit-user-select: none;
            font-weight: 900;
        }
        .pin-wrapper input {
            margin-bottom: 0;
            padding-right: 85px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-frame">
            <h1>BUSINESS SAARTHI</h1>
        </div>

        <div class="form-content">
            <h2>SECURE GATEWAY</h2>
            
            <div class="pin-wrapper">
                <input type="password" id="pin" placeholder="6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">
                <span id="toggle-txt" class="view-btn-toggle" onclick="handleToggleView()">SHOW</span>
            </div>

            <button onclick="routeGateway('login')" id="login-gateway-btn">LOGIN TO PORTAL</button>
            
            <div class="toggle-link" onclick="routeGateway('register')" style="margin-top: 25px;">
                NEW SHOP? CREATE ACCOUNT
            </div>
            
            <div id="msg" class="message" style="color: var(--accent); margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        function handleToggleView() {
            const field = document.getElementById('pin');
            const txt = document.getElementById('toggle-txt');
            if (field.type === 'password') {
                field.type = 'text';
                txt.innerText = 'HIDE';
            } else {
                field.type = 'password';
                txt.innerText = 'SHOW';
            }
        }

        function routeGateway(destination) {
            const pinVal = document.getElementById('pin').value;
            const msg = document.getElementById('msg');
            msg.innerText = "";

            if (pinVal.length !== 6) {
                msg.innerText = "PLEASE ENTER 6-DIGIT PIN FIRST!";
                return;
            }
            
            // Forwards parameters straight to separate static pages
            window.location.href = `./${destination}.html?pin=${pinVal}`;
        }
    </script>
</body>
</html>
