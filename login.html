<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop Login - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <script src="/auth.js"></script>
    
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .pin-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        .view-btn-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); cursor: pointer; font-size: 16px; user-select: none; font-weight: 900; }
        .pin-wrapper input { margin-bottom: 0; padding-right: 85px; }
        .forgot-link { text-align: right; font-size: 14px; color: var(--accent); font-weight: bold; cursor: pointer; margin-top: -5px; margin-bottom: 20px; text-decoration: underline; }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%;">
        <div class="main-container">
            <div class="header-frame">
                <h1>BUSINESS SAARTHI</h1>
            </div>

            <div class="form-content">
                <h2 id="login-title">SHOP PORTAL LOGIN</h2>
                
                <div id="login-fields-block">
                    <input type="text" id="login-identifier" placeholder="ENTER EMAIL OR PHONE NUMBER">
                    <div class="pin-wrapper">
                        <input type="password" id="login-pin" placeholder="ENTER 6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">
                        <span id="toggle-txt-1" class="view-btn-toggle" onclick="handleToggleView('login-pin', 'toggle-txt-1')">SHOW</span>
                    </div>
                    <div class="forgot-link" onclick="switchToForgotMode()">FORGOT PIN?</div>
                    <button onclick="handlePortalLogin()" id="login-submit-btn">LOGIN TO PORTAL</button>
                    <div class="toggle-link" onclick="window.location.href='/index.html'">NEW SHOP? CREATE ACCOUNT</div>
                </div>

                <div id="forgot-phone-block" style="display: none;">
                    <p style="text-align: center; color: var(--navy-blue); font-size: 15px; margin-bottom: 15px;">ENTER REGISTERED PHONE NUMBER TO RESET PIN</p>
                    <input type="text" id="forgot-phone" placeholder="ENTER PHONE NUMBER" inputmode="numeric" maxlength="10">
                    <button onclick="sendResetOtp()" id="send-otp-btn">SEND VERIFICATION OTP</button>
                    <div class="toggle-link" onclick="switchToLoginMode()" style="margin-top: 20px;">← BACK TO LOGIN</div>
                </div>

                <div id="forgot-otp-block" style="display: none;">
                    <p style="text-align: center; color: var(--navy-blue); font-size: 15px; margin-bottom: 15px;">ENTER OTP SENT TO YOUR MOBILE & CREATE NEW PIN</p>
                    <input type="text" id="reset-otp-code" placeholder="ENTER 6-DIGIT OTP" inputmode="numeric" maxlength="6">
                    <div class="pin-wrapper">
                        <input type="password" id="new-pin" placeholder="CREATE NEW 6-DIGIT PIN" inputmode="numeric" maxlength="6">
                        <span id="toggle-txt-2" class="view-btn-toggle" onclick="handleToggleView('new-pin', 'toggle-txt-2')">SHOW</span>
                    </div>
                    <button onclick="verifyAndResetPin()" id="reset-confirm-btn" style="background-color: #10B981;">UPDATE PIN & LOG IN</button>
                </div>
                
                <div id="recaptcha-container"></div>
                <div id="msg" class="message" style="color: var(--accent); margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script>
        let challengeListenerRef = null;
        let internalTimeoutId = null;

        function handleToggleView(fieldId, textId) {
            const field = document.getElementById(fieldId);
            const txt = document.getElementById(textId);
            field.type = (field.type === 'password') ? 'text' : 'password';
            txt.innerText = (field.type === 'password') ? 'SHOW' : 'HIDE';
        }

        function switchToForgotMode() {
            document.getElementById('login-fields-block').style.display = 'none';
            document.getElementById('forgot-phone-block').style.display = 'block';
            document.getElementById('login-title').innerText = "RESET PIN";
            document.getElementById('msg').innerText = "";
        }

        function switchToLoginMode() {
            document.getElementById('forgot-phone-block').style.display = 'none';
            document.getElementById('forgot-otp-block').style.display = 'none';
            document.getElementById('login-fields-block').style.display = 'block';
            document.getElementById('login-title').innerText = "SHOP PORTAL LOGIN";
            document.getElementById('msg').innerText = "";
        }

        window.onload = function() {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                    'size': 'invisible', 'callback': (response) => {}
                });
            }
        };

        let resetConfirmationResult = null;

        function sendResetOtp() {
            const phone = document.getElementById('forgot-phone').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('send-otp-btn');
            if (phone.length !== 10) { msg.innerText = "ENTER A VALID 10-DIGIT PHONE NUMBER!"; return; }

            btn.innerText = "SENDING OTP..."; btn.disabled = true;
            msg.innerText = "";

            firebase.auth().signInWithPhoneNumber("+91" + phone, window.recaptchaVerifier)
                .then((confirmationResult) => {
                    resetConfirmationResult = confirmationResult;
                    document.getElementById('forgot-phone-block').style.display = 'none';
                    document.getElementById('forgot-otp-block').style.display = 'block';
                    msg.style.color = "green"; msg.innerText = "RESET OTP SENT SUCCESSFULLY!";
                })
                .catch((error) => { msg.style.color = "var(--accent)"; msg.innerText = "ERROR: " + error.message; })
                .finally(() => { btn.innerText = "SEND VERIFICATION OTP"; btn.disabled = false; });
        }

        function verifyAndResetPin() {
            const phone = document.getElementById('forgot-phone').value.trim();
            const code = document.getElementById('reset-otp-code').value.trim();
            const newPin = document.getElementById('new-pin').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('reset-confirm-btn');

            if (code.length !== 6 || newPin.length !== 6) { msg.innerText = "OTP AND NEW PIN MUST BE 6 DIGITS!"; return; }
            btn.innerText = "UPDATING PIN..."; btn.disabled = true;

            resetConfirmationResult.confirm(code)
                .then(() => {
                    firebase.database().ref('shops/' + phone).update({ securePin: newPin }, (error) => {
                        if (error) { msg.innerText = "DATABASE UPDATE FAILED: " + error.message; btn.disabled = false; } 
                        else { alert("PIN Updated Successfully!"); window.location.href = '/dashboard.html'; }
                    });
                })
                .catch((error) => { msg.innerText = "INVALID OR EXPIRED OTP CODE!"; btn.disabled = false; });
        }

        function evaluateUserSubscriptionLifecycle(shopData, userKey, loginButtonReference) {
            const msg = document.getElementById('msg');
            const now = new Date();
            
            if (!shopData.trialEndsAt || !shopData.lockoutEndsAt || !shopData.paymentStatus) {
                const regDate = shopData.registeredAt ? new Date(shopData.registeredAt) : new Date();
                const tEnd = new Date(regDate); tEnd.setDate(tEnd.getDate() + 30);
                const lEnd = new Date(regDate); lEnd.setDate(lEnd.getDate() + 60);
                firebase.database().ref('shops/' + userKey).update({
                    trialEndsAt: tEnd.toISOString(), lockoutEndsAt: lEnd.toISOString(), paymentStatus: shopData.paymentStatus || "TRIAL"
                });
                shopData.trialEndsAt = tEnd.toISOString(); shopData.lockoutEndsAt = lEnd.toISOString(); shopData.paymentStatus = "TRIAL";
            }

            if (shopData.paymentStatus !== "PAID" && now > new Date(shopData.lockoutEndsAt)) {
                firebase.database().ref('shops/' + userKey).remove().then(() => { msg.innerText = "ACCOUNT EXPIRED AND DATA PURGED!"; })
                .finally(() => { loginButtonReference.innerText = "LOGIN TO PORTAL"; loginButtonReference.disabled = false; });
                return;
            }

            if (shopData.paymentStatus !== "PAID" && now > new Date(shopData.trialEndsAt)) {
                msg.innerText = "ACCOUNT LOCKED! PLEASE PAY RENT TO RESTORE ACCESS.";
                localStorage.setItem("lockedUserPhone", userKey);
                setTimeout(() => { window.location.href = '/billing.html'; }, 2500);
                return;
            }

            // SET THE TIMESTAMP FOR DEVICE SECURITY
            const loginTime = Date.now().toString();
            firebase.database().ref('shops/' + userKey).update({
                lastLoginTime: loginTime
            }).then(() => {
                localStorage.setItem("myLoginTime", loginTime);
                localStorage.setItem("activeUserPhone", userKey);
                
                document.getElementById('msg').style.color = "green";
                document.getElementById('msg').innerText = "ACCESS GRANTED! REDIRECTING...";
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
            });
        }

  async function handlePortalLogin() {
            const identifier = document.getElementById('login-identifier').value.trim();
            const pin = document.getElementById('login-pin').value;
            const msg = document.getElementById('msg');
            const loginBtn = document.getElementById('login-submit-btn');
            msg.innerText = "";

            if (!identifier || !pin) { msg.innerText = "BOTH FIELDS ARE MANDATORY!"; return; }
            if (pin.length !== 6) { msg.innerText = "PIN MUST BE EXACTLY 6 DIGITS!"; return; }

            loginBtn.innerText = "AUTHENTICATING..."; loginBtn.disabled = true;

            try {
                // 1. Determine the 'dummy email' for authentication
                let authEmail = identifier;
                let shopId = identifier;

                if (!/^\d{10}$/.test(identifier)) {
                    // It's an email, find the associated shopId (phone) first
                    const snap = await firebase.database().ref('shops').orderByChild('emailId').equalTo(identifier).once('value');
                    if (!snap.exists()) throw new Error("NO ACCOUNT FOUND WITH THIS EMAIL!");
                    
                    snap.forEach(child => {
                        shopId = child.key;
                        authEmail = child.key + "@businesssaarthi.com";
                    });
                } else {
                    authEmail = identifier + "@businesssaarthi.com";
                }

                // 2. Official Firebase Auth (This unlocks the security rules)
                await firebase.auth().signInWithEmailAndPassword(authEmail, pin);

                // 3. Now that we are authenticated, the database rules will allow us to read
                const shopSnap = await firebase.database().ref('shops/' + shopId).once('value');
                if (shopSnap.exists()) {
                    evaluateUserSubscriptionLifecycle(shopSnap.val(), shopId, loginBtn);
                } else {
                    throw new Error("SHOP DATA MISSING!");
                }

            } catch (err) {
                console.error(err);
                msg.style.color = "var(--accent)";
                msg.innerText = "LOGIN FAILED: " + err.message;
                loginBtn.innerText = "LOGIN TO PORTAL";
                loginBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
