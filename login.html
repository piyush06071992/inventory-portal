<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop Login - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <script src="/auth.js"></script>
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .pin-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }
        .view-btn-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            -webkit-user-select: none;
            font-weight: 900;
        }
        .pin-wrapper input {
            margin-bottom: 0;
            padding-right: 85px;
        }
        .forgot-link {
            text-align: right;
            font-size: 14px;
            color: var(--accent);
            font-weight: bold;
            cursor: pointer;
            margin-top: -5px;
            margin-bottom: 20px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%;">

        <div class="main-container">
            <div class="header-frame">
                <h1>BUSINESS SAARTHI</h1>
            </div>

            <div class="form-content">
                <h2 id="login-title">SHOP PORTAL LOGIN</h2>
                
                <div id="login-fields-block">
                    <input type="text" id="login-identifier" placeholder="ENTER EMAIL OR PHONE NUMBER">
                    
                    <div class="pin-wrapper">
                        <input type="password" id="login-pin" placeholder="ENTER 6-DIGIT SECURE PIN" inputmode="numeric" maxlength="6">
                        <span id="toggle-txt-1" class="view-btn-toggle" onclick="handleToggleView('login-pin', 'toggle-txt-1')">SHOW</span>
                    </div>

                    <div class="forgot-link" onclick="switchToForgotMode()">FORGOT PIN?</div>

                    <button onclick="handlePortalLogin()" id="login-submit-btn">LOGIN TO PORTAL</button>
                    
                    <div class="toggle-link" onclick="window.location.href='/index.html'">
                        NEW SHOP? CREATE ACCOUNT
                    </div>
                </div>

                <div id="forgot-phone-block" style="display: none;">
                    <p style="text-align: center; color: var(--navy-blue); font-size: 15px; margin-bottom: 15px;">
                        ENTER REGISTERED PHONE NUMBER TO RESET PIN
                    </p>
                    <input type="text" id="forgot-phone" placeholder="ENTER PHONE NUMBER" inputmode="numeric" maxlength="10">
                    
                    <button onclick="sendResetOtp()" id="send-otp-btn">SEND VERIFICATION OTP</button>
                    
                    <div class="toggle-link" onclick="switchToLoginMode()" style="margin-top: 20px;">
                        ← BACK TO LOGIN
                    </div>
                </div>

                <div id="forgot-otp-block" style="display: none;">
                    <p style="text-align: center; color: var(--navy-blue); font-size: 15px; margin-bottom: 15px;">
                        ENTER OTP SENT TO YOUR MOBILE & CREATE NEW PIN
                    </p>
                    <input type="text" id="reset-otp-code" placeholder="ENTER 6-DIGIT OTP" inputmode="numeric" maxlength="6">
                    
                    <div class="pin-wrapper">
                        <input type="password" id="new-pin" placeholder="CREATE NEW 6-DIGIT PIN" inputmode="numeric" maxlength="6">
                        <span id="toggle-txt-2" class="view-btn-toggle" onclick="handleToggleView('new-pin', 'toggle-txt-2')">SHOW</span>
                    </div>
                    
                    <button onclick="verifyAndResetPin()" id="reset-confirm-btn" style="background-color: #10B981;">UPDATE PIN & LOG IN</button>
                </div>
                
                <div id="recaptcha-container"></div>
                
                <div id="msg" class="message" style="color: var(--accent); margin-top: 15px;"></div>
            </div>
        </div>

    </div>

    <script>
        function handleToggleView(fieldId, textId) {
            const field = document.getElementById(fieldId);
            const txt = document.getElementById(textId);
            if (field.type === 'password') {
                field.type = 'text';
                txt.innerText = 'HIDE';
            } else {
                field.type = 'password';
                txt.innerText = 'SHOW';
            }
        }

        function switchToForgotMode() {
            document.getElementById('login-fields-block').style.display = 'none';
            document.getElementById('forgot-phone-block').style.display = 'block';
            document.getElementById('login-title').innerText = "RESET PIN";
            document.getElementById('msg').innerText = "";
        }

        function switchToLoginMode() {
            document.getElementById('forgot-phone-block').style.display = 'none';
            document.getElementById('forgot-otp-block').style.display = 'none';
            document.getElementById('login-fields-block').style.display = 'block';
            document.getElementById('login-title').innerText = "SHOP PORTAL LOGIN";
            document.getElementById('msg').innerText = "";
        }

        window.onload = function() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'invisible',
                'callback': (response) => {}
            });
        };

        let resetConfirmationResult = null;

        function sendResetOtp() {
            const phone = document.getElementById('forgot-phone').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('send-otp-btn');
            msg.innerText = "";

            if (phone.length !== 10) {
                msg.style.color = "var(--accent)";
                msg.innerText = "ENTER A VALID 10-DIGIT PHONE NUMBER!";
                return;
            }

            btn.innerText = "SENDING OTP...";
            btn.disabled = true;

            const formattedPhone = "+91" + phone;
            const appVerifier = window.recaptchaVerifier;

            firebase.auth().signInWithPhoneNumber(formattedPhone, appVerifier)
                .then((confirmationResult) => {
                    resetConfirmationResult = confirmationResult;
                    document.getElementById('forgot-phone-block').style.display = 'none';
                    document.getElementById('forgot-otp-block').style.display = 'block';
                    msg.style.color = "green";
                    msg.innerText = "RESET OTP SENT SUCCESSFULLY!";
                })
                .catch((error) => {
                    console.error(error);
                    msg.style.color = "var(--accent)";
                    msg.innerText = "ERROR: " + error.message;
                })
                .finally(() => {
                    btn.innerText = "SEND VERIFICATION OTP";
                    btn.disabled = false;
                });
        }

        function verifyAndResetPin() {
            const phone = document.getElementById('forgot-phone').value.trim();
            const code = document.getElementById('reset-otp-code').value.trim();
            const newPin = document.getElementById('new-pin').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('reset-confirm-btn');
            msg.innerText = "";

            if (code.length !== 6 || newPin.length !== 6) {
                msg.style.color = "var(--accent)";
                msg.innerText = "OTP AND NEW PIN MUST BE 6 DIGITS!";
                return;
            }

            btn.innerText = "UPDATING PIN...";
            btn.disabled = true;

            resetConfirmationResult.confirm(code)
                .then((result) => {
                    firebase.database().ref('shops/' + phone).update({
                        securePin: newPin
                    }, (error) => {
                        if (error) {
                            msg.style.color = "var(--accent)";
                            msg.innerText = "DATABASE UPDATE FAILED: " + error.message;
                            btn.innerText = "UPDATE PIN & LOG IN";
                            btn.disabled = false;
                        } else {
                            msg.style.color = "green";
                            msg.innerText = "PIN UPDATED! LOGGING IN...";
                            alert("PIN Updated Successfully!");
                            window.location.href = '/dashboard.html';
                        }
                    });
                })
                .catch((error) => {
                    console.error(error);
                    msg.style.color = "var(--accent)";
                    msg.innerText = "INVALID OR EXPIRED OTP CODE!";
                    btn.innerText = "UPDATE PIN & LOG IN";
                    btn.disabled = false;
                });
        }

        // Shared Evaluation Core Block to handle Lifecycle Checks
      // Shared Evaluation Core Block to handle Lifecycle Checks + Auto-Upgrade Old Accounts
        function evaluateUserSubscriptionLifecycle(shopData, userKey, loginButtonReference) {
            const msg = document.getElementById('msg');
            const now = new Date();
            
            // --- AUTOMATED ON-THE-FLY UPGRADE FOR OLD ACCOUNTS ---
            // If an older account logs in and is missing the lifecycle parameters, create them instantly!
            if (!shopData.trialEndsAt || !shopData.lockoutEndsAt || !shopData.paymentStatus) {
                console.log("Old account detected. Migrating data schema on-the-fly for key:", userKey);
                
                const registrationDate = shopData.registeredAt ? new Date(shopData.registeredAt) : new Date();
                
                const calculatedTrialEnd = new Date(registrationDate);
                calculatedTrialEnd.setDate(calculatedTrialEnd.getDate() + 30);
                
                const calculatedLockoutEnd = new Date(registrationDate);
                calculatedLockoutEnd.setDate(calculatedLockoutEnd.getDate() + 60);
                
                // Save the missing variables back to this user's specific folder in Firebase
                firebase.database().ref('shops/' + userKey).update({
                    trialEndsAt: calculatedTrialEnd.toISOString(),
                    lockoutEndsAt: calculatedLockoutEnd.toISOString(),
                    paymentStatus: shopData.paymentStatus || "TRIAL"
                });

                // Update our local variables in memory so the rest of the login checks work smoothly right now
                shopData.trialEndsAt = calculatedTrialEnd.toISOString();
                shopData.lockoutEndsAt = calculatedLockoutEnd.toISOString();
                shopData.paymentStatus = shopData.paymentStatus || "TRIAL";
            }
            // -----------------------------------------------------

            const trialEnd = new Date(shopData.trialEndsAt);
            const lockoutEnd = new Date(shopData.lockoutEndsAt);
            const status = shopData.paymentStatus;

            // Phase 4 Check: Exceeded 60 days total without paying -> AUTOMATIC DATA PURGE
            if (status !== "PAID" && now > lockoutEnd) {
                firebase.database().ref('shops/' + userKey).remove()
                    .then(() => {
                        msg.style.color = "var(--accent)";
                        msg.innerText = "ACCOUNT EXPIRED AND ALL DATA PERMANENTLY PURGED DUE TO NON-PAYMENT!";
                    })
                    .catch((err) => {
                        msg.innerText = "PURGE ACTION FAILED: " + err.message;
                    })
                    .finally(() => {
                        loginButtonReference.innerText = "LOGIN TO PORTAL";
                        loginButtonReference.disabled = false;
                    });
                return;
            }

            // Phase 3 Check: Past 30-day trial but inside the 60-day grace period window -> BLOCK ACCESS
            if (status !== "PAID" && now > trialEnd) {
                msg.style.color = "var(--accent)";
                msg.innerText = "ACCOUNT LOCKED! PLEASE PAY RENT TO RESTORE ACCESS.";
                sessionStorage.setItem("lockedUserPhone", userKey);
                setTimeout(() => {
                    window.location.href = '/billing.html';
                }, 2500);
                return;
            }

            // Phase 1 & 2 Check: Inside active Trial or marked as Paid -> SUCCESSFUL ENTRY
            msg.style.color = "green";
            msg.innerText = "ACCESS GRANTED! REDIRECTING...";
            sessionStorage.setItem("activeUserPhone", userKey);
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 1000);
        }

        // Standard Database Login (SMS Cost = ₹0)
        function handlePortalLogin() {
            const identifier = document.getElementById('login-identifier').value.trim();
            const pin = document.getElementById('login-pin').value;
            const msg = document.getElementById('msg');
            const loginBtn = document.getElementById('login-submit-btn');
            
            msg.innerText = "";

            if (!identifier || !pin) {
                msg.style.color = "var(--accent)";
                msg.innerText = "BOTH FIELDS ARE MANDATORY!";
                return;
            }
            if (pin.length !== 6) {
                msg.style.color = "var(--accent)";
                msg.innerText = "PIN MUST BE EXACTLY 6 DIGITS!";
                return;
            }

            loginBtn.innerText = "AUTHENTICATING...";
            loginBtn.disabled = true;

            // Option A: Phone Number Identifier Login Match
            if (/^\d{10}$/.test(identifier)) {
                firebase.database().ref('shops/' + identifier).once('value')
                    .then((snapshot) => {
                        const shopData = snapshot.val();
                        if (shopData && shopData.securePin === pin) {
                            evaluateUserSubscriptionLifecycle(shopData, identifier, loginBtn);
                        } else {
                            msg.style.color = "var(--accent)";
                            msg.innerText = "INVALID PHONE NUMBER OR SECURE PIN!";
                            loginBtn.innerText = "LOGIN TO PORTAL";
                            loginBtn.disabled = false;
                        }
                    }).catch(err => {
                        msg.innerText = "SERVER ERROR: " + err.message;
                        loginBtn.disabled = false;
                    });
            } else {
                // Option B: Email Identifier Login Search Match
                firebase.database().ref('shops').orderByChild('emailId').equalTo(identifier).once('value')
                    .then((snapshot) => {
                        if (snapshot.exists()) {
                            let matchFound = false;
                            let matchedKey = "";
                            let matchedData = null;

                            snapshot.forEach((childSnapshot) => {
                                const data = childSnapshot.val();
                                if (data.securePin === pin) {
                                    matchFound = true;
                                    matchedKey = childSnapshot.key;
                                    matchedData = data;
                                }
                            });

                            if (matchFound) {
                                evaluateUserSubscriptionLifecycle(matchedData, matchedKey, loginBtn);
                            } else {
                                msg.style.color = "var(--accent)";
                                msg.innerText = "INVALID SECURE PIN!";
                                loginBtn.innerText = "LOGIN TO PORTAL";
                                loginBtn.disabled = false;
                            }
                        } else {
                            msg.style.color = "var(--accent)";
                            msg.innerText = "NO ACCOUNT FOUND WITH THIS EMAIL ID!";
                            loginBtn.innerText = "LOGIN TO PORTAL";
                            loginBtn.disabled = false;
                        }
                    }).catch(err => {
                        msg.innerText = "SERVER ERROR: " + err.message;
                        loginBtn.disabled = false;
                    });
            }
        }
    </script>
</body>
</html>
