<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Branches - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .wrapper { display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; padding: 20px 12px; box-sizing: border-box; }
        .header-section { width: 100%; max-width: 700px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-section h1 { font-size: 22px; font-weight: 700; color: #1e3a8a; margin: 0; }
        
        .form-card { width: 100%; max-width: 700px; background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); box-sizing: border-box; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        /* Updated Card Title for Flex Layout */
        .card-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .title-left { display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .form-control-custom { width: 100%; padding: 12px 14px; font-size: 15px; border: 2px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; transition: all 0.2s ease; background-color: #fff; color: #0f172a; font-weight: 500; }
        .form-control-custom:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        .btn-add { width: 100%; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 18px rgba(16, 185, 129, 0.2); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back { display: block; width: 100%; max-width: 700px; background-color: #ffffff; color: #475569; border: 2px solid #cbd5e1; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin-top: 10px; box-sizing: border-box;}
        
        /* Toggle Link Styling */
        .toggle-inactive-btn { font-size: 12px; font-weight: 600; color: #3b82f6; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
        .toggle-inactive-btn:hover { color: #1e3a8a; }

        /* Branch List Styling */
        .branch-item { display: flex; flex-direction: column; background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 12px; gap: 10px;}
        .branch-item.inactive-item { background: #f1f5f9; border-color: #cbd5e1; opacity: 0.8; }
        .branch-top-row { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .branch-info h3 { margin: 0 0 4px 0; font-size: 16px; color: #1e3a8a; }
        .inactive-item .branch-info h3 { color: #475569; text-decoration: line-through; }
        .branch-info p { margin: 0; font-size: 12px; color: #64748b; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-active { background: #d1fae5; color: #059669; }
        .badge-inactive { background: #e2e8f0; color: #475569; }

        /* Action Buttons */
        .branch-actions { display: flex; justify-content: flex-end; border-top: 1px dashed #cbd5e1; padding-top: 10px; }
        .action-btn { background: none; border: 1px solid; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-deactivate { color: #ef4444; border-color: #fca5a5; background: #fef2f2; }
        .btn-deactivate:hover { background: #fee2e2; }
        .btn-activate { color: #10b981; border-color: #6ee7b7; background: #ecfdf5; }
        .btn-activate:hover { background: #d1fae5; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-section">
        <h1><i class="bi bi-diagram-3-fill text-primary"></i> MANAGE BRANCHES</h1>
    </div>

    <div class="form-card">
        <div class="card-title">
            <div class="title-left"><i class="bi bi-shop-window text-primary"></i> Current Branches</div>
            <button class="toggle-inactive-btn" onclick="toggleInactiveView()" id="toggle-view-btn">Show Inactive</button>
        </div>
        
        <div id="branch-list-container">
            <p style="text-align: center; color: #64748b; font-size: 14px;">Loading your branches...</p>
        </div>
    </div>

    <div class="form-card">
        <div class="card-title"><i class="bi bi-plus-circle-fill text-success"></i> Add New Branch</div>
        
        <div class="form-group">
            <label>Branch Name</label>
            <input type="text" id="new-branch-name" class="form-control-custom" placeholder="e.g., Mall Road Branch">
        </div>

       <div class="form-group">
            <label>Branch Location / City</label>
            <input type="text" id="new-branch-location" class="form-control-custom" placeholder="e.g., Shimla">
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 18px;">
            <div style="flex: 1;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase;">Bill Prefix</label>
                <input type="text" id="new-branch-prefix" class="form-control-custom" placeholder="e.g., GST/26-27/">
            </div>
            <div style="flex: 1;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase;">Start Number</label>
                <input type="number" id="new-branch-start-num" class="form-control-custom" placeholder="e.g., 100">
            </div>
        </div>

        <button class="btn-add" onclick="createNewBranch()" id="btn-create">
            <i class="bi bi-building-add"></i> Create Branch
        </button>
    </div>

    <a href="/dashboard.html" class="btn-back">← Back to Dashboard</a>
</div>

<script src="/auth.js"></script>

<script>
    const activeUserPhone = localStorage.getItem("activeUserPhone");
    
    // State Management for the UI
    let allBranches = [];
    let showingInactive = false;

    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged((user) => {
            if (user && activeUserPhone) {
                loadBranchesRealtime();
            }
        });
    });

    // Toggle View State
    function toggleInactiveView() {
        showingInactive = !showingInactive;
        document.getElementById('toggle-view-btn').innerText = showingInactive ? "Hide Inactive" : "Show Inactive";
        renderBranchesToScreen(); // Re-render the array without re-fetching from the database
    }

    // 1. Real-time Listener for Branches
    function loadBranchesRealtime() {
        const db = firebase.firestore();

        db.collection('companies').doc(activeUserPhone).collection('branches')
          .orderBy('createdAt', 'asc')
          .onSnapshot((querySnapshot) => {
            
            // Empty the local array and repopulate it with fresh data
            allBranches = [];
            querySnapshot.forEach((doc) => {
                allBranches.push(doc.data());
            });

            // Draw to screen
            renderBranchesToScreen();
            
        }, (error) => {
            console.error("Error loading branches: ", error);
            document.getElementById('branch-list-container').innerHTML = `<p style="text-align: center; color: #ef4444;">Failed to load branches.</p>`;
        });
    }

    // 2. Client-Side Rendering Logic
    function renderBranchesToScreen() {
        const container = document.getElementById('branch-list-container');
        container.innerHTML = ""; 

        let visibleCount = 0;

        allBranches.forEach((branch) => {
            // Filter out inactive branches if the toggle is off
            if (branch.status === 'inactive' && !showingInactive) return;

            visibleCount++;
            const isInactive = branch.status === 'inactive';
            const badgeClass = isInactive ? 'badge-inactive' : 'badge-active';
            
            // Main Branch Safety Check (Disable deactivate for branch_01)
            let actionHtml = "";
            if (branch.branchId === "branch_01") {
                actionHtml = `<span style="font-size: 11px; color: #94a3b8;"><i class="bi bi-shield-lock-fill"></i> Main HQ (Cannot be deactivated)</span>`;
            } else if (isInactive) {
                actionHtml = `<button class="action-btn btn-activate" onclick="updateBranchStatus('${branch.branchId}', 'active')"><i class="bi bi-check-circle"></i> Reactivate Branch</button>`;
            } else {
                actionHtml = `<button class="action-btn btn-deactivate" onclick="updateBranchStatus('${branch.branchId}', 'inactive')"><i class="bi bi-x-circle"></i> Deactivate Branch</button>`;
            }

            const branchHTML = `
                <div class="branch-item ${isInactive ? 'inactive-item' : ''}">
                    <div class="branch-top-row">
                       <div class="branch-info">
                            <h3>${branch.branchName}</h3>
                            <p style="margin-bottom:4px;">ID: ${branch.branchId} | Loc: ${branch.location || 'HQ'}</p>
                            <p style="font-weight:700; color:#3b82f6;"><i class="bi bi-receipt"></i> Bill Format: ${branch.billPrefix || 'BILL-'}${branch.lastBillNumber !== undefined ? branch.lastBillNumber + 1 : '1'}</p>
                        </div>
                        <div class="status-badge ${badgeClass}">${branch.status}</div>
                    </div>
                    <div class="branch-actions">
                        ${actionHtml}
                    </div>
                </div>
            `;
            container.innerHTML += branchHTML;
        });

        if (visibleCount === 0) {
            container.innerHTML = `<p style="text-align: center; color: #64748b; font-size: 14px; padding: 10px 0;">No branches to show in this view.</p>`;
        }
    }

    // 3. Status Update Function (Deactivate / Reactivate)
    async function updateBranchStatus(branchId, newStatus) {
        if (!activeUserPhone) return;
        
        // Confirm action before deactivating
        if (newStatus === 'inactive') {
            const confirmDeactivate = confirm("Are you sure you want to deactivate this branch? It will be hidden from the POS screen.");
            if (!confirmDeactivate) return;
        }

        try {
            const db = firebase.firestore();
            await db.collection('companies').doc(activeUserPhone).collection('branches').doc(branchId).update({
                status: newStatus
            });
            // The onSnapshot listener will automatically detect this change and redraw the screen instantly!
        } catch (error) {
            console.error("Error updating status:", error);
            alert("Database Error: Could not change branch status.");
        }
    }

    // 4. Add New Branch to Firestore
    async function createNewBranch() {
        if (!activeUserPhone) return;
        
      const branchName = document.getElementById('new-branch-name').value.trim();
        const branchLocation = document.getElementById('new-branch-location').value.trim();
        const billPrefix = document.getElementById('new-branch-prefix').value.trim() || "BILL-";
        const startNumRaw = parseInt(document.getElementById('new-branch-start-num').value);
        const startNum = isNaN(startNumRaw) || startNumRaw < 1 ? 1 : startNumRaw;
        const btn = document.getElementById('btn-create');

        if (!branchName) {
            alert("Please enter a Branch Name.");
            return;
        }

        btn.innerText = "Creating...";
        btn.disabled = true;

        try {
            const db = firebase.firestore();
            
            // Generate a unique ID
            const uniqueTimestamp = Date.now();
            const newBranchId = 'branch_' + uniqueTimestamp;

           const newBranchData = {
                branchName: branchName,
                location: branchLocation,
                branchId: newBranchId,
                billPrefix: billPrefix,
                lastBillNumber: startNum - 1, // Subtract 1 because the POS increments before generating
                createdAt: new Date().toISOString(),
                status: "active"
            };

            await db.collection('companies').doc(activeUserPhone).collection('branches').doc(newBranchId).set(newBranchData);

            document.getElementById('new-branch-name').value = "";
            document.getElementById('new-branch-location').value = "";
            document.getElementById('new-branch-prefix').value = "";
            document.getElementById('new-branch-start-num').value = "";
            
            // Briefly show inactive branches if they just added a new one to make sure they see everything
            if(showingInactive === false && allBranches.some(b => b.status === 'inactive')) {
                toggleInactiveView();
            }

        } catch (error) {
            console.error("Error creating branch:", error);
            alert("Database Error: Could not create branch.");
        } finally {
            btn.innerHTML = `<i class="bi bi-building-add"></i> Create Branch`;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
