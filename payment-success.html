<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Processing - Business Saarthi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
        }
        .status-container {
            max-width: 500px;
            margin: 80px auto;
        }
        .card-status {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            background: #ffffff;
        }
        .spinner-pulse {
            width: 3.5rem;
            height: 3.5rem;
            color: #fd7e14;
        }
    </style>
</head>
<body>

<div class="container status-container px-3">
    <div class="card card-status text-center p-4 p-md-5">
        <div class="card-body">
            
            <div class="mb-4">
                <div class="spinner-border spinner-pulse mb-3" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <h3 class="fw-bold text-dark" id="status-title">Verifying Payment Link</h3>
                <p class="text-muted" id="status-desc">We are validating your submitted UTR log against our incoming bank account statement. This workspace will auto-refresh once confirmed.</p>
            </div>

            <div class="text-start bg-light rounded-3 p-3 mb-4 small">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Account Workspace:</span>
                    <span class="fw-semibold text-dark" id="log-phone">--</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span class="text-muted">Logged UTR Reference:</span>
                    <span class="fw-semibold text-dark text-monospace" id="log-utr">--</span>
                </div>
            </div>

            <div class="border-top pt-3">
                <a href="tel:+919999999999" class="btn btn-link btn-sm text-decoration-none text-secondary fw-medium">
                    <i class="bi bi-telephone-outbound"></i> Contact Admin Support
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "business-saarthi.firebaseapp.com",
        databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
        projectId: "business-saarthi",
        storageBucket: "business-saarthi.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    window.onload = function() {
        const shopPhone = sessionStorage.getItem("lockedUserPhone") || "unknown";
        document.getElementById("log-phone").innerText = shopPhone;

        if (shopPhone === "unknown") {
            window.location.href = "login.html";
            return;
        }

        // Attach a continuous snapshot stream listener to user's database record node
        firebase.database().ref(`users/${shopPhone}`).on('value', (snapshot) => {
            const userData = snapshot.val();
            
            if (userData) {
                // If an active status field switch is received, clear session states and bypass gateway roadblock straight into system dashboard
                if (userData.portalStatus === "active") {
                    document.getElementById("status-title").innerText = "Payment Confirmed!";
                    document.getElementById("status-title").classList.replace("text-dark", "text-success");
                    document.getElementById("status-desc").innerText = "Success! Access granted. Initializing active core configurations...";
                    
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 2000);
                } 
                // Display text adjustments if the request node is securely sitting inside the review tables
                else if (userData.portalStatus === "pending_verification") {
                    document.getElementById("status-title").innerText = "Verification Pending";
                    // Display an obscured layout of the recorded UTR parameter key
                    if(userData.lastSubmittedUtr) {
                        document.getElementById("log-utr").innerText = userData.lastSubmittedUtr;
                    }
                }
            }
        });
    };
</script>
</body>
</html>
