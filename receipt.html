<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Receipt</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --navy: #0f172a; --primary: #3b82f6; --text-light: #64748b; --border: #e2e8f0; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: #cbd5e1; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; color: var(--navy); }
        
        .receipt-card { background: white; width: 100%; max-width: 400px; border-radius: 16px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .receipt-card::after { content: ""; position: absolute; bottom: -8px; left: 0; right: 0; height: 16px; background-size: 16px 16px; background-image: radial-gradient(circle at 8px 16px, transparent 10px, white 11px); }

        .loader { text-align: center; padding: 40px 0; font-weight: 800; color: var(--primary); }
        .r-header { text-align: center; margin-bottom: 20px; border-bottom: 2px dashed var(--border); padding-bottom: 15px; }
        .r-shop-name { font-size: 24px; font-weight: 900; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        .r-date { font-size: 12px; font-weight: 700; color: var(--text-light); margin: 0; }
        .r-bill-no { margin: 8px 0 0 0; font-size: 14px; font-weight: 900; color: var(--navy); padding: 4px 8px; background: #f1f5f9; border-radius: 6px; display: inline-block; border: 1px solid var(--border); }
        
        .r-customer { background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .r-customer p { margin: 2px 0; font-size: 13px; font-weight: 700; }
        
        .r-items { margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: 700; }
        .item-name { flex: 1; padding-right: 10px; }
        .item-qty { width: 40px; text-align: center; color: var(--text-light); }
        .item-total { width: 70px; text-align: right; }
        
        .r-summary { border-top: 2px dashed var(--border); padding-top: 15px; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: var(--text-light); }
        .summary-total { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 20px; font-weight: 900; color: var(--navy); }
        
        .r-khata { background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .r-khata-title { font-size: 12px; font-weight: 900; color: #d97706; text-transform: uppercase; margin: 0 0 10px 0; letter-spacing: 0.5px; }
        
        .btn-print { display: block; width: 100%; padding: 15px; background: var(--navy); color: white; text-align: center; border: none; border-radius: 10px; font-size: 16px; font-weight: 900; cursor: pointer; text-decoration: none; margin-top: 20px; }
        
        .error-msg { text-align: center; color: #ef4444; font-weight: 800; padding: 40px 20px; }

        @media print {
            body { background: white; padding: 0; align-items: flex-start; }
            .receipt-card { box-shadow: none; max-width: 100%; padding: 0; }
            .receipt-card::after { display: none; }
            .btn-print { display: none; }
        }
    </style>
</head>
<body>

<div class="receipt-card" id="receipt-container">
    <div class="loader" id="loader">
        <i class="bi bi-arrow-repeat bi-spin" style="font-size: 40px;"></i>
        <p style="margin-top: 10px;">Finding your bill...</p>
    </div>
</div>

<script>
    // Your exact Firebase keys injected for independent public access
    const firebaseConfig = {
        apiKey: "AIzaSyBuYDgbmycHMjHGupeoZV2lvv_Z0n7WyoY",
        authDomain: "business-saarthi.firebaseapp.com",
        databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
        projectId: "business-saarthi",
        storageBucket: "business-saarthi.firebasestorage.app",
        messagingSenderId: "556256084111",
        appId: "1:556256084111:web:14e841b0e7bfff653170fa"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const receiptId = urlParams.get('id');
        const companyPhone = urlParams.get('phone');
        const branchId = urlParams.get('branch');

        const container = document.getElementById('receipt-container');

        if (!receiptId || !companyPhone || !branchId) {
            container.innerHTML = `<div class="error-msg"><i class="bi bi-exclamation-triangle" style="font-size:40px; display:block; margin-bottom:10px;"></i>Invalid Receipt Link.</div>`;
            return;
        }

        try {
            const db = firebase.firestore();

            // Fetch Shop Info
            const compDoc = await db.collection('companies').doc(companyPhone).get();
            let shopName = "Store";
            if (compDoc.exists && compDoc.data().businessName) {
                shopName = compDoc.data().businessName;
            }

            // Fetch Branch Info
            const branchDoc = await db.collection('companies').doc(companyPhone).collection('branches').doc(branchId).get();
            let branchName = "Main Branch";
            if (branchDoc.exists && branchDoc.data().branchName) {
                branchName = branchDoc.data().branchName;
            }

            // Fetch Sale Info
            const saleDoc = await db.collection('companies').doc(companyPhone).collection('branches').doc(branchId).collection('sales').doc(receiptId).get();
            
            if (!saleDoc.exists) {
                container.innerHTML = `<div class="error-msg"><i class="bi bi-search" style="font-size:40px; display:block; margin-bottom:10px;"></i>Receipt not found. It may have been deleted.</div>`;
                return;
            }

            const sale = saleDoc.data();
            const dateObj = sale.timestamp ? sale.timestamp.toDate() : new Date();
            const dateString = dateObj.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

            // Fetch Staff Name (Fallback to 'Admin' for older bills)
            let billedBy = sale.staffName || "Admin";

            // SMART BILL NUMBER COMPLIANCE
            const displayId = sale.billNumber || receiptId.substring(0,8).toUpperCase();
            const displayLabel = sale.billNumber ? "Invoice No:" : "Receipt ID:";

            // Build the HTML dynamically
            let html = `
                <div class="r-header">
                    <h1 class="r-shop-name">${shopName.toUpperCase()}</h1>
                    <p style="font-size:13px; font-weight:800; color:var(--text-light); margin:0 0 5px 0;">${branchName}</p>
                    <p class="r-date">${dateString}</p>
                    <p class="r-bill-no">${displayLabel} ${displayId}</p>
                    <p style="font-size:11px; font-weight:700; color:var(--text-light); margin:10px 0 0 0; text-transform:uppercase;">Billed By: <span style="color:var(--navy); font-weight:900;">${billedBy}</span></p>
                </div>
            `;

            if (sale.customerName || sale.customerPhone) {
                html += `<div class="r-customer">`;
                if (sale.customerName) html += `<p>👤 ${sale.customerName.toUpperCase()}</p>`;
                if (sale.customerPhone) html += `<p>📱 ${sale.customerPhone}</p>`;
                if (sale.khataNumber) html += `<p style="color:var(--primary);">🏷️ Khata #${sale.khataNumber}</p>`;
                html += `</div>`;
            }

            html += `<div class="r-items">`;
            sale.items.forEach(item => {
                let itemTot = item.msp * item.cartQty;
                html += `
                    <div class="item-row">
                        <div class="item-name">${item.name}</div>
                        <div class="item-qty">x${item.cartQty}</div>
                        <div class="item-total">₹${itemTot.toFixed(2)}</div>
                    </div>
                `;
            });
            html += `</div>`;

            let finalTot = sale.totalAmount || 0;
            let gstAmt = sale.totalGst || 0;
            let subtotal = finalTot - gstAmt;

            html += `
                <div class="r-summary">
                    <div class="summary-row"><span>Subtotal</span> <span>₹${subtotal.toFixed(2)}</span></div>
                    ${gstAmt > 0 ? `<div class="summary-row"><span>Tax/GST</span> <span>₹${gstAmt.toFixed(2)}</span></div>` : ''}
                    <div class="summary-row"><span>Payment Mode</span> <span style="color:var(--navy); background:#f1f5f9; padding:2px 6px; border-radius:4px;">${sale.paymentMode || 'N/A'}</span></div>
                    <div class="summary-total"><span>Total Paid</span> <span>₹${finalTot.toFixed(2)}</span></div>
                </div>
            `;

            if (sale.paymentMode === 'UDHAAR') {
                html += `
                    <div class="r-khata">
                        <h4 class="r-khata-title">Khata / Udhaar Details</h4>
                        <div class="summary-row"><span>Bill Amount:</span> <span>₹${finalTot.toFixed(2)}</span></div>
                        <div class="summary-row" style="color:var(--emerald);"><span>Cash Paid Now:</span> <span>₹${(sale.cashPaid || 0).toFixed(2)}</span></div>
                        <div class="summary-row" style="color:#d97706;"><span>Added to Khata:</span> <span>₹${(sale.udhaarAdded || 0).toFixed(2)}</span></div>
                        <div style="border-top:1px dashed #fcd34d; margin:8px 0;"></div>
                        <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:900; color:#b45309;">
                            <span>Total Khata Pending:</span>
                            <span>Check with Store</span>
                        </div>
                    </div>
                `;
            }

            // CLEAN QR URL: Remove the autoprint parameter so scanning the QR later doesn't trigger print loops
            const cleanUrl = window.location.href.replace('&autoprint=true', '');
            const encodedUrl = encodeURIComponent(cleanUrl);

            html += `
                <div style="text-align:center; margin-top:20px; padding-top: 15px; border-top: 1px dashed var(--border);">
                    <div style="display:inline-flex; align-items:center; gap:5px; background:#dcfce7; color:#166534; padding:6px 12px; border-radius:20px; font-size:11px; font-weight:900; margin-bottom:15px; border:1px solid #bbf7d0;">
                        <i class="bi bi-shield-fill-check"></i> VERIFIED SECURE RECEIPT
                    </div>
                    
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodedUrl}" style="width:100px; height:100px; border-radius:8px; margin:0 auto 10px auto; display:block; border: 2px solid var(--border); padding: 4px;">
                    <p style="font-size:11px; font-weight:700; color:var(--text-light); margin:0 0 20px 0;">Scan to verify or process return</p>
                    
                    <p style="font-size:14px; font-weight:900; color:var(--navy); margin-bottom:20px;">Thank you for shopping with us!</p>
                </div>
                <button class="btn-print" onclick="window.print()"><i class="bi bi-file-earmark-pdf"></i> Download PDF / Print</button>
            `;

            container.innerHTML = html;

            // --- AUTO PRINT LOGIC ---
            // If the POS sent the autoprint command, pop open the print dialog instantly
            if (urlParams.get('autoprint') === 'true') {
                setTimeout(() => {
                    window.print();
                }, 800); // We wait 800ms to ensure the fonts, CSS layout, and QR Code have fully rendered
            }

        } catch (error) {
            console.error("Error loading receipt:", error);
            container.innerHTML = `<div class="error-msg"><i class="bi bi-exclamation-triangle" style="font-size:40px; display:block; margin-bottom:10px;"></i>Could not load receipt. Permissions issue.</div>`;
        }
    });
</script>

</body>
</html>
