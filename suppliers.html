<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Suppliers - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="/auth.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .wrapper { display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; padding: 20px 12px; box-sizing: border-box; }
        
        .header-section { width: 100%; max-width: 700px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-section h1 { font-size: 22px; font-weight: 700; color: #1e3a8a; margin: 0; display: flex; align-items: center; gap: 8px;}
        
        .btn-top-action { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-top-action-back { background: #ffffff; color: #475569; border: 2px solid #cbd5e1; padding: 10px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px;}

        /* Form Container */
        .form-card { width: 100%; max-width: 700px; background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .form-control-custom { width: 100%; padding: 12px; font-size: 15px; border: 2px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; background-color: #fff; color: #0f172a; font-weight: 500; }
        .form-control-custom:focus { outline: none; border-color: #3b82f6; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        
        /* Dynamic Inputs */
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-remove { background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; }
        .btn-add-more { background-color: #f1f5f9; color: #1e3a8a; border: 2px dashed #cbd5e1; padding: 10px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; gap: 6px; }
        
        .action-row { display: flex; gap: 12px; margin-top: 20px; }
        .btn-save { flex: 2; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-cancel { flex: 1; background-color: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Supplier Cards with Accordion */
        .supplier-list-container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 16px; }
        .supplier-card { background: #ffffff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        
        /* Clickable Header */
        .sc-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sc-header-left { display: flex; flex-direction: column; }
        .sc-name { font-size: 18px; font-weight: 700; color: #1e3a8a; margin: 0; text-transform: uppercase; }
        .sc-owner { font-size: 14px; color: #64748b; margin: 4px 0 0 0; font-weight: 500;}
        .sc-toggle-icon { font-size: 20px; color: #94a3b8; transition: transform 0.3s; }
        
        /* Hidden Body */
        .sc-body { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9; }
        
        .sc-details { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 16px; font-size: 14px; color: #334155; }
        .sc-details i { color: #3b82f6; width: 20px; text-align: center; margin-right: 6px; }

        .sc-actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-sc { border: none; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; color: white; }
        .btn-call { background: #3b82f6; }
        .btn-wa { background: #25D366; }
        .btn-pay { background: #8b5cf6; }
        .btn-bills { background: #f59e0b; }
        .btn-print { grid-column: span 2; background: #64748b; margin-top: 5px; }
       /* Ledger UI & Balances */
        .ledger-container { display: none; margin-top: 15px; border-top: 2px dashed #cbd5e1; padding-top: 15px; }
        .ledger-balance-badge { background: #fee2e2; color: #ef4444; padding: 12px; border-radius: 10px; font-weight: 700; text-align: center; margin-bottom: 15px; font-size: 16px; border: 1px solid #fca5a5;}
        .ledger-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .ledger-item.payment { border-left: 5px solid #10b981; }
        .ledger-item.purchase { border-left: 5px solid #ef4444; }
        .ledger-item-left p { margin: 0 0 4px 0; font-size: 13px; color: #64748b; }
        .ledger-item-left h4 { margin: 0; font-size: 14px; color: #0f172a; text-transform: uppercase; }
        .ledger-amt { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .amt-pay { color: #10b981; }
        .amt-pur { color: #ef4444; }
        .btn-view-bill { background: #e0e7ff; color: #4f46e5; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-block;}

        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(4px);}
        .modal-card { background: white; width: 100%; max-width: 450px; border-radius: 16px; padding: 24px; position: relative; max-height: 90vh; overflow-y: auto;}
        .modal-close { position: absolute; top: 15px; right: 15px; background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: #475569;}
        #img-modal-content { max-width: 100%; max-height: 80vh; border-radius: 8px; display: block; margin: auto; cursor: grab; }

        /* Admin Actions */
        .admin-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
        .btn-edit { background: #f1f5f9; color: #475569; }
        .btn-delete { background: #fee2e2; color: #ef4444; }

        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; gap: 10px; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-section">
        <a href="/dashboard.html" class="btn-top-action-back"><i class="bi bi-arrow-left"></i> Back</a>
        <button class="btn-top-action" onclick="toggleSupplierForm()"><i class="bi bi-plus-lg"></i> Add Supplier</button>
    </div>
    <div class="header-section" style="margin-bottom: 10px;">
        <h1><i class="bi bi-truck text-primary"></i> SUPPLIER DIRECTORY</h1>
    </div>

    <div class="form-card" id="add-supplier-form">
        <h2 style="font-size: 18px; margin-top: 0; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Register New Supplier</h2>
        
        <div class="form-group">
            <label>Supplier Business Name *</label>
            <input type="text" id="sup-name" class="form-control-custom" placeholder="e.g., Wholesale Traders Ltd">
        </div>
        
        <div class="form-group">
            <label>Owner / Contact Person Name</label>
            <input type="text" id="sup-owner" class="form-control-custom" placeholder="Enter owner name">
        </div>

        <div class="form-group">
            <label>Contact Numbers *</label>
            <div id="sup-phones-container">
                <div class="dynamic-row">
                    <input type="number" class="form-control-custom phone-input" placeholder="10-Digit Mobile" inputmode="numeric">
                </div>
            </div>
            <button type="button" class="btn-add-more" onclick="addSupPhoneField()"><i class="bi bi-telephone-plus"></i> Add Another Number</button>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>GST Number (Optional)</label>
                <input type="text" id="sup-gst" class="form-control-custom" placeholder="15-Digit GSTIN" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label>Bank UPI ID / Details</label>
                <input type="text" id="sup-upi" class="form-control-custom" placeholder="username@upi">
            </div>
        </div>

        <div class="form-group">
            <label>Full Address</label>
            <textarea id="sup-address" class="form-control-custom" rows="2" placeholder="Complete shop or warehouse address"></textarea>
        </div>

        <div class="action-row">
            <button class="btn-cancel" onclick="toggleSupplierForm()">Cancel</button>
            <button class="btn-save" onclick="saveSupplier()"><i class="bi bi-cloud-arrow-up-fill"></i> Save Supplier</button>
        </div>
    </div>

 <div class="supplier-list-container" id="supplier-list">
        <p style="text-align: center; color: #64748b; width: 100%;">Loading suppliers...</p>
    </div>

 <!-- Modals -->
    <div class="modal-overlay" id="img-modal">
        <div class="modal-card" style="background: transparent; box-shadow: none; text-align: center; padding: 0; max-width: 95vw; height: 90vh; display: flex; flex-direction: column;">
            <button class="modal-close" style="top: 0px; right: 0px; background: white; z-index: 100;" onclick="closeModal('img-modal')"><i class="bi bi-x-lg"></i></button>
            
            <div id="img-pan-container" style="overflow: auto; flex-grow: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-top: 20px; padding-bottom: 50px;">
                <img id="img-modal-content" src="" alt="Bill Image" style="transition: transform 0.2s ease-out; transform-origin: center center;">
            </div>
            
            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 8px 20px; border-radius: 30px; display: flex; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100;">
                <button onclick="setZoom(-0.5)" style="border:none; background:none; font-size:24px; cursor:pointer; color:#1e3a8a;"><i class="bi bi-zoom-out"></i></button>
                <button onclick="setZoom(0)" style="border:none; background:none; font-size:20px; cursor:pointer; color:#64748b; margin-top: 2px;"><i class="bi bi-arrow-counterclockwise"></i></button>
                <button onclick="setZoom(0.5)" style="border:none; background:none; font-size:24px; cursor:pointer; color:#1e3a8a;"><i class="bi bi-zoom-in"></i></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="pay-modal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('pay-modal')"><i class="bi bi-x-lg"></i></button>
            <h2 style="margin-top:0; color:var(--navy); font-size:18px;"><i class="bi bi-wallet2"></i> Record Payment</h2>
            <h4 id="pay-sup-name" style="color:#64748b; margin-bottom:15px; margin-top:5px;"></h4>
            
            <div class="ledger-balance-badge" id="pay-current-balance">Total Pending: ₹0.00</div>
            
            <div class="form-group">
                <label>Payment Date</label>
                <input type="date" id="pay-date" class="form-control-custom">
            </div>
            
            <div class="form-group">
                <label>Amount Paid (₹)</label>
                <input type="number" id="pay-amt" class="form-control-custom" placeholder="0.00" oninput="calcRemaining()">
            </div>
            
            <div class="ledger-balance-badge" id="pay-remaining-balance" style="background:#e0f2fe; color:#0369a1; border-color:#7dd3fc; display:none; padding:8px; font-size:14px;">Remaining Balance: ₹0.00</div>
            
            <div class="form-group">
                <label>Mode of Payment</label>
                <select id="pay-mode" class="form-control-custom" onchange="toggleRefField()">
                    <option value="Cash">Cash</option>
                    <option value="UPI / Bank Transfer">UPI / Bank Transfer</option>
                    <option value="Cheque">Cheque</option>
                </select>
            </div>
            
            <div class="form-group" id="pay-ref-group" style="display:none;">
                <label>Transaction ID / Cheque No.</label>
                <input type="text" id="pay-ref" class="form-control-custom" placeholder="Enter Ref ID">
            </div>
            
            <button class="btn-main btn-emerald" onclick="submitPayment()" id="btn-submit-pay">
                <i class="bi bi-check-circle"></i> Save Payment & Notify
            </button>
        </div>
    </div>
</div>

<script>
    let currentEditingSupplierId = null;
    let globalSuppliersData = {}; 

    // Fetch existing data when the page loads securely
    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadSuppliersRealtime();
            }
        });
    });

    // --- FORM MANAGEMENT ---
    function toggleSupplierForm() {
        const form = document.getElementById('add-supplier-form');
        if (form.style.display === 'block') {
            form.style.display = 'none';
            resetForm();
        } else {
            form.style.display = 'block';
            document.querySelector('#add-supplier-form h2').innerText = "Register New Supplier";
        }
    }

    function resetForm() {
        currentEditingSupplierId = null;
        document.getElementById('sup-name').value = '';
        document.getElementById('sup-owner').value = '';
        document.getElementById('sup-gst').value = '';
        document.getElementById('sup-upi').value = '';
        document.getElementById('sup-address').value = '';
        document.getElementById('sup-phones-container').innerHTML = '<div class="dynamic-row"><input type="number" class="form-control-custom phone-input" placeholder="10-Digit Mobile" inputmode="numeric"></div>';
    }

    function addSupPhoneField(val = '') {
        const container = document.getElementById('sup-phones-container');
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `
            <input type="number" class="form-control-custom phone-input" placeholder="10-Digit Mobile" inputmode="numeric" value="${val}">
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()"><i class="bi bi-trash3-fill"></i></button>
        `;
        container.appendChild(div);
    }

    // --- DATABASE OPERATIONS (FIRESTORE) ---
    async function saveSupplier() {
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        if (!activeUserPhone) return alert("Session expired. Please login again.");

        const name = document.getElementById('sup-name').value.trim().toUpperCase();
        const owner = document.getElementById('sup-owner').value.trim();
        const gst = document.getElementById('sup-gst').value.trim().toUpperCase();
        const upi = document.getElementById('sup-upi').value.trim();
        const address = document.getElementById('sup-address').value.trim();
        
        const phones = [];
        document.querySelectorAll('.phone-input').forEach(input => {
            if(input.value.trim()) phones.push(input.value.trim());
        });

        if (!name || phones.length === 0) return alert("Business Name and at least one Phone Number are required!");

        const btn = document.querySelector('.btn-save');
        btn.innerText = "Saving...";
        btn.disabled = true;

        try {
            const db = firebase.firestore();
            const supplierId = currentEditingSupplierId ? currentEditingSupplierId : 'sup_' + Date.now();

            const supplierData = {
                id: supplierId,
                businessName: name,
                ownerName: owner,
                phoneNumbers: phones,
                gstNumber: gst,
                upiId: upi,
                address: address,
                addedAt: currentEditingSupplierId && globalSuppliersData[supplierId] ? globalSuppliersData[supplierId].addedAt : new Date().toISOString()
            };

            await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(supplierId).set(supplierData);
            
            alert(currentEditingSupplierId ? "Supplier Updated Successfully!" : "Supplier Added Successfully!");
            toggleSupplierForm(); 

        } catch (error) {
            console.error("Error saving supplier:", error);
            alert("Error saving: " + error.message);
        } finally {
            btn.innerHTML = `<i class="bi bi-cloud-arrow-up-fill"></i> Save Supplier`;
            btn.disabled = false;
        }
    }

    async function deleteSupplier(id, name) {
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        if (!activeUserPhone) return;

        if(confirm(`Are you absolutely sure you want to delete ${name}?\n\nThis will remove them from your directory permanently.`)) {
            try {
                const db = firebase.firestore();
                await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(id).delete();
                alert("Supplier deleted.");
            } catch (err) {
                console.error("Delete failed:", err);
                alert("Delete failed: " + err.message);
            }
        }
    }

    function editSupplier(id) {
        const data = globalSuppliersData[id];
        if(!data) return;

        currentEditingSupplierId = id;
        
        document.getElementById('sup-name').value = data.businessName || '';
        document.getElementById('sup-owner').value = data.ownerName || '';
        document.getElementById('sup-gst').value = data.gstNumber || '';
        document.getElementById('sup-upi').value = data.upiId || '';
        document.getElementById('sup-address').value = data.address || '';
        
        const phoneContainer = document.getElementById('sup-phones-container');
        phoneContainer.innerHTML = ''; 
        if (data.phoneNumbers && data.phoneNumbers.length > 0) {
            data.phoneNumbers.forEach((phone, index) => {
                if(index === 0) {
                    phoneContainer.innerHTML = `<div class="dynamic-row"><input type="number" class="form-control-custom phone-input" value="${phone}"></div>`;
                } else {
                    addSupPhoneField(phone);
                }
            });
        }

        document.getElementById('add-supplier-form').style.display = 'block';
        document.querySelector('#add-supplier-form h2').innerText = "Edit Supplier Details";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- UI INTERACTIONS ---
    function toggleAccordion(id) {
        const body = document.getElementById('sc-body-' + id);
        const icon = document.getElementById('sc-icon-' + id);
        if (body.style.display === 'block') {
            body.style.display = 'none';
            icon.style.transform = 'rotate(0deg)';
        } else {
            body.style.display = 'block';
            icon.style.transform = 'rotate(180deg)';
        }
    }

    function loadSuppliersRealtime() {
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        if (!activeUserPhone) return;

        const listContainer = document.getElementById('supplier-list');
        const db = firebase.firestore();

        db.collection('companies').doc(activeUserPhone).collection('suppliers')
          .orderBy('addedAt', 'desc')
          .onSnapshot((querySnapshot) => {
            
            listContainer.innerHTML = '';
            globalSuppliersData = {}; 

            if (querySnapshot.empty) {
                listContainer.innerHTML = '<p style="text-align: center; color: #64748b; background: #fff; padding: 20px; border-radius: 12px;">No suppliers added yet. Click "Add Supplier" to start.</p>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const sup = doc.data();
                globalSuppliersData[sup.id] = sup; // Save for editing
                
                const primaryPhone = sup.phoneNumbers && sup.phoneNumbers.length > 0 ? sup.phoneNumbers[0] : '';
                
                const card = document.createElement('div');
                card.className = 'supplier-card';
                card.innerHTML = `
                    <div class="sc-header" onclick="toggleAccordion('${sup.id}')">
                        <div class="sc-header-left">
                            <p class="sc-name">${sup.businessName}</p>
                            ${sup.ownerName ? `<p class="sc-owner">Rep: ${sup.ownerName}</p>` : ''}
                        </div>
                        <i class="bi bi-chevron-down sc-toggle-icon" id="sc-icon-${sup.id}"></i>
                    </div>

                    <div class="sc-body" id="sc-body-${sup.id}">
                        <div class="sc-details">
                            <div><i class="bi bi-telephone-fill"></i> ${sup.phoneNumbers ? sup.phoneNumbers.join(', ') : 'N/A'}</div>
                            ${sup.gstNumber ? `<div><i class="bi bi-receipt"></i> GST: ${sup.gstNumber}</div>` : ''}
                            ${sup.upiId ? `<div><i class="bi bi-bank2"></i> UPI: ${sup.upiId}</div>` : ''}
                            ${sup.address ? `<div><i class="bi bi-geo-alt-fill"></i> ${sup.address}</div>` : ''}
                        </div>
                        
                        <div class="sc-actions-grid">
                            <button class="btn-sc btn-call" onclick="window.open('tel:${primaryPhone}')"><i class="bi bi-telephone"></i> Call</button>
                            <button class="btn-sc btn-wa" onclick="window.open('https://wa.me/91${primaryPhone}', '_blank')"><i class="bi bi-whatsapp"></i> WhatsApp</button>
                            <button class="btn-sc btn-pay" onclick="openPaymentModal('${sup.id}', '${sup.businessName.replace(/'/g, "\'")}', '${primaryPhone}')"><i class="bi bi-currency-rupee"></i> Record Payment</button>
                            <button class="btn-sc btn-bills" onclick="toggleLedger('${sup.id}')"><i class="bi bi-receipt-cutoff"></i> View Bills</button>
                            <button class="btn-sc btn-print" onclick="printLedger('${sup.businessName}')"><i class="bi bi-printer-fill"></i> Print Ledger / PDF</button>
                        </div>

          <div class="admin-actions">
                            <button class="btn-sc btn-edit" onclick="editSupplier('${sup.id}')"><i class="bi bi-pencil-square"></i> Edit</button>
                            <button class="btn-sc btn-delete" onclick="deleteSupplier('${sup.id}', '${sup.businessName}')"><i class="bi bi-trash-fill"></i> Delete</button>
                        </div>

                        <!-- Bill Ledger Container -->
                        <div class="ledger-container" id="ledger-${sup.id}"></div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }, (error) => {
            console.error("Error loading suppliers: ", error);
            listContainer.innerHTML = '<p style="text-align: center; color: #ef4444;">Failed to load suppliers.</p>';
        });
    }

  async function toggleLedger(supplierId) {
        const ledgerDiv = document.getElementById('ledger-' + supplierId);
        if (ledgerDiv.style.display === 'block') { ledgerDiv.style.display = 'none'; return; }
        
        ledgerDiv.style.display = 'block';
        ledgerDiv.innerHTML = '<p style="text-align:center; font-size:13px; color:#64748b;"><i class="bi bi-hourglass-split"></i> Loading ledger...</p>';
        
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        const db = firebase.firestore();
        
        try {
            const snap = await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(supplierId).collection('transactions').orderBy('date', 'desc').get();
                                 
            if (snap.empty) { ledgerDiv.innerHTML = '<p style="text-align:center; font-size:13px; color:#64748b;">No transactions found.</p>'; return; }
            
            let html = ''; let totalPurchases = 0; let totalPayments = 0; let listHtml = '';
            
            snap.forEach(doc => {
                const data = doc.data();
                const amt = parseFloat(data.amount) || 0;
                const isPayment = data.type === 'Payment';
                
                if (isPayment) totalPayments += amt; else totalPurchases += amt;
                
                const dateStr = new Date(data.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                
                listHtml += `
                    <div class="ledger-item ${isPayment ? 'payment' : 'purchase'}">
                        <div class="ledger-item-left">
                            <p><i class="bi bi-calendar3"></i> ${dateStr} | ${isPayment ? data.mode : 'Bill'}</p>
                            <h4>${isPayment ? 'Payment Sent' : 'Bill #' + data.billNum}</h4>
                            ${data.refId ? `<p style="font-size:11px; margin-top:2px;">Ref: ${data.refId}</p>` : ''}
                        </div>
                        <div style="text-align: right;">
                            <div class="ledger-amt ${isPayment ? 'amt-pay' : 'amt-pur'}">${isPayment ? '-' : '+'} ₹${amt.toFixed(2)}</div>
                            ${data.billImageUrl ? `<button class="btn-view-bill" onclick="openImageModal('${data.billImageUrl}')"><i class="bi bi-image"></i> View</button>` : ''}
                        </div>
                    </div>
                `;
            });
            
            const pending = totalPurchases - totalPayments;
            html = `<div class="ledger-balance-badge" style="background:${pending <= 0 ? '#dcfce7' : '#fee2e2'}; color:${pending <= 0 ? '#166534' : '#ef4444'}; border-color:${pending <= 0 ? '#bbf7d0' : '#fca5a5'};">
                        Net Balance Pending: ₹${Math.max(0, pending).toFixed(2)}
                    </div>`;
            ledgerDiv.innerHTML = html + listHtml;
            
        } catch (error) { ledgerDiv.innerHTML = '<p style="text-align:center; color:#ef4444; font-size:13px;">Error loading ledger. Index required.</p>'; }
    }

// --- MODALS & PAYMENTS ---
    let currentZoom = 1;
    
    function setZoom(step) {
        const img = document.getElementById('img-modal-content');
        if (step === 0) {
            currentZoom = 1; // Reset to default
        } else {
            currentZoom += step;
            if (currentZoom < 0.5) currentZoom = 0.5; // Prevent zooming out too far
            if (currentZoom > 4) currentZoom = 4;     // Max 4x zoom
        }
        
        // Remove boundaries when zoomed in so user can scroll/pan around
        if (currentZoom > 1) {
            img.style.maxHeight = 'none';
            img.style.maxWidth = 'none';
        } else {
            img.style.maxHeight = '80vh';
            img.style.maxWidth = '100%';
        }
        
        img.style.transform = `scale(${currentZoom})`;
    }

    function openImageModal(url) {
        document.getElementById('img-modal-content').src = url;
        document.getElementById('img-modal').style.display = 'flex';
        setZoom(0); // Always reset zoom when opening a new image
    }
    
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        if(modalId === 'img-modal') setZoom(0); // Reset zoom on close
    }

    let currentPaySupplier = {};
    let currentPendingBalance = 0;

    async function openPaymentModal(supplierId, name, phone) {
        currentPaySupplier = { id: supplierId, name: name, phone: phone };
        document.getElementById('pay-sup-name').innerText = name;
        document.getElementById('pay-date').valueAsDate = new Date(); // Default to today
        document.getElementById('pay-amt').value = '';
        document.getElementById('pay-mode').value = 'Cash';
        document.getElementById('pay-ref').value = '';
        toggleRefField();
        
        document.getElementById('pay-current-balance').innerText = "Calculating...";
        document.getElementById('pay-remaining-balance').style.display = 'none';
        document.getElementById('pay-modal').style.display = 'flex';

        // Calculate current balance
        const db = firebase.firestore();
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        const snap = await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(supplierId).collection('transactions').get();
        let pur = 0; let pay = 0;
        snap.forEach(doc => {
            if(doc.data().type === 'Purchase') pur += parseFloat(doc.data().amount);
            if(doc.data().type === 'Payment') pay += parseFloat(doc.data().amount);
        });
        currentPendingBalance = pur - pay;
        document.getElementById('pay-current-balance').innerText = `Total Pending: ₹${Math.max(0, currentPendingBalance).toFixed(2)}`;
    }

    function toggleRefField() {
        const mode = document.getElementById('pay-mode').value;
        document.getElementById('pay-ref-group').style.display = (mode !== 'Cash') ? 'block' : 'none';
    }

    function calcRemaining() {
        const paying = parseFloat(document.getElementById('pay-amt').value) || 0;
        const remDiv = document.getElementById('pay-remaining-balance');
        if (paying > 0) {
            const rem = currentPendingBalance - paying;
            remDiv.innerText = `Remaining Balance: ₹${Math.max(0, rem).toFixed(2)}`;
            remDiv.style.display = 'block';
        } else { remDiv.style.display = 'none'; }
    }

    async function submitPayment() {
        const amt = parseFloat(document.getElementById('pay-amt').value);
        const date = document.getElementById('pay-date').value;
        const mode = document.getElementById('pay-mode').value;
        const ref = document.getElementById('pay-ref').value;

        if (!amt || amt <= 0 || !date) return alert("Please enter a valid amount and date.");
        if (mode !== 'Cash' && !ref.trim()) return alert("Please enter the Transaction ID / Cheque Number.");

        const btn = document.getElementById('btn-submit-pay');
        btn.disabled = true; btn.innerText = "Processing...";

        try {
            const db = firebase.firestore();
            const activeUserPhone = localStorage.getItem("activeUserPhone");
            
            // Save Payment
            await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(currentPaySupplier.id).collection('transactions').add({
                type: 'Payment',
                amount: amt,
                date: new Date(date).toISOString(),
                mode: mode,
                refId: ref,
                timestamp: new Date().toISOString()
            });

            const rem = Math.max(0, currentPendingBalance - amt);
            
            // Generate WhatsApp Msg
            let msg = `*Payment Confirmation*\n\nHello ${currentPaySupplier.name},\nWe have processed a payment of *₹${amt.toFixed(2)}* on ${new Date(date).toLocaleDateString('en-IN')}.\n\n*Mode:* ${mode}`;
            if(mode !== 'Cash') msg += `\n*Ref/Cheque No:* ${ref}`;
            msg += `\n*Updated Pending Balance:* ₹${rem.toFixed(2)}\n\nThank you!`;

            alert("Payment Recorded Successfully!");
            closeModal('pay-modal');
            
            // Trigger WhatsApp if phone exists
            if (currentPaySupplier.phone) {
                window.open(`https://wa.me/91${currentPaySupplier.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            }
            
            // Refresh ledger if open
            if(document.getElementById('ledger-' + currentPaySupplier.id).style.display === 'block') {
                toggleLedger(currentPaySupplier.id); toggleLedger(currentPaySupplier.id); // Close and reopen to refresh
            }

        } catch (e) {
            console.error(e); alert("Error saving payment.");
        } finally {
            btn.disabled = false; btn.innerHTML = `<i class="bi bi-check-circle"></i> Save Payment & Notify`;
        }
    }

    function printLedger(name) {
        if(confirm(`Generate Printable Ledger PDF for ${name}?`)) window.print();
    }
</script>
