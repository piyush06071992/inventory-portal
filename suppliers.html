<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Suppliers - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="/auth.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .wrapper { display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; padding: 20px 12px; box-sizing: border-box; }
        
        .header-section { width: 100%; max-width: 700px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-section h1 { font-size: 22px; font-weight: 700; color: #1e3a8a; margin: 0; display: flex; align-items: center; gap: 8px;}
        
        .btn-top-action { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-top-action-back { background: #ffffff; color: #475569; border: 2px solid #cbd5e1; padding: 10px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px;}

        /* Form Container */
        .form-card { width: 100%; max-width: 700px; background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .form-control-custom { width: 100%; padding: 12px; font-size: 15px; border: 2px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; background-color: #fff; color: #0f172a; font-weight: 500; }
        .form-control-custom:focus { outline: none; border-color: #3b82f6; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        
        /* Dynamic Inputs */
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-remove { background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; }
        .btn-add-more { background-color: #f1f5f9; color: #1e3a8a; border: 2px dashed #cbd5e1; padding: 10px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; gap: 6px; }
        
        .action-row { display: flex; gap: 12px; margin-top: 20px; }
        .btn-save { flex: 2; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-cancel { flex: 1; background-color: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Supplier Cards with Accordion */
        .supplier-list-container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 16px; }
        .supplier-card { background: #ffffff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        
        /* Clickable Header */
        .sc-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sc-header-left { display: flex; flex-direction: column; }
        .sc-name { font-size: 18px; font-weight: 700; color: #1e3a8a; margin: 0; text-transform: uppercase; }
        .sc-owner { font-size: 14px; color: #64748b; margin: 4px 0 0 0; font-weight: 500;}
        .sc-toggle-icon { font-size: 20px; color: #94a3b8; transition: transform 0.3s; }
        
        /* Hidden Body */
        .sc-body { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9; }
        
        .sc-details { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 16px; font-size: 14px; color: #334155; }
        .sc-details i { color: #3b82f6; width: 20px; text-align: center; margin-right: 6px; }

        .sc-actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-sc { border: none; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; color: white; }
        .btn-call { background: #3b82f6; }
        .btn-wa { background: #25D366; }
        .btn-pay { background: #8b5cf6; }
        .btn-bills { background: #f59e0b; }
        .btn-print { grid-column: span 2; background: #64748b; margin-top: 5px; }
        
        /* Admin Actions */
        .admin-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
        .btn-edit { background: #f1f5f9; color: #475569; }
        .btn-delete { background: #fee2e2; color: #ef4444; }

        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; gap: 10px; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-section">
        <a href="/dashboard.html" class="btn-top-action-back"><i class="bi bi-arrow-left"></i> Back</a>
        <button class="btn-top-action" onclick="toggleSupplierForm()"><i class="bi bi-plus-lg"></i> Add Supplier</button>
    </div>
    <div class="header-section" style="margin-bottom: 10px;">
        <h1><i class="bi bi-truck text-primary"></i> SUPPLIER DIRECTORY</h1>
    </div>

    <div class="form-card" id="add-supplier-form">
        <h2 style="font-size: 18px; margin-top: 0; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Register New Supplier</h2>
        
        <div class="form-group">
            <label>Supplier Business Name *</label>
            <input type="text" id="sup-name" class="form-control-custom" placeholder="e.g., Wholesale Traders Ltd">
        </div>
        
        <div class="form-group">
            <label>Owner / Contact Person Name</label>
            <input type="text" id="sup-owner" class="form-control-custom" placeholder="Enter owner name">
        </div>

        <div class="form-group">
            <label>Contact Numbers *</label>
            <div id="sup-phones-container">
                <div class="dynamic-row">
                    <input type="number" class="form-control-custom phone-input" placeholder="10-Digit Mobile" inputmode="numeric">
                </div>
            </div>
            <button type="button" class="btn-add-more" onclick="addSupPhoneField()"><i class="bi bi-telephone-plus"></i> Add Another Number</button>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>GST Number (Optional)</label>
                <input type="text" id="sup-gst" class="form-control-custom" placeholder="15-Digit GSTIN" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label>Bank UPI ID / Details</label>
                <input type="text" id="sup-upi" class="form-control-custom" placeholder="username@upi">
            </div>
        </div>

        <div class="form-group">
            <label>Full Address</label>
            <textarea id="sup-address" class="form-control-custom" rows="2" placeholder="Complete shop or warehouse address"></textarea>
        </div>

        <div class="action-row">
            <button class="btn-cancel" onclick="toggleSupplierForm()">Cancel</button>
            <button class="btn-save" onclick="saveSupplier()"><i class="bi bi-cloud-arrow-up-fill"></i> Save Supplier</button>
        </div>
    </div>

    <div class="supplier-list-container" id="supplier-list">
        <p style="text-align: center; color: #64748b; width: 100%;">Loading suppliers...</p>
    </div>

</div>

<script>
    let currentEditingSupplierId = null;
    let globalSuppliersData = {}; 

    // Fetch existing data when the page loads securely
    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadSuppliersRealtime();
            }
        });
    });

    // --- FORM MANAGEMENT ---
    function toggleSupplierForm() {
        const form = document.getElementById('add-supplier-form');
        if (form.style.display === 'block') {
            form.style.display = 'none';
            resetForm();
        } else {
            form.style.display = 'block';
            document.querySelector('#add-supplier-form h2').innerText = "Register New Supplier";
        }
    }

    function resetForm() {
        currentEditingSupplierId = null;
        document.getElementById('sup-name').value = '';
        document.getElementById('sup-owner').value = '';
        document.getElementById('sup-gst').value = '';
        document.getElementById('sup-upi').value = '';
        document.getElementById('sup-address').value = '';
        document.getElementById('sup-phones-container').innerHTML = '<div class="dynamic-row"><input type="number" class="form-control-custom phone-input" placeholder="10-Digit Mobile" inputmode="numeric"></div>';
    }

    function addSupPhoneField(val = '') {
        const container = document.getElementById('sup-phones-container');
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `
            <input type="number" class="form-control-custom phone-input" placeholder="10-Digit Mobile" inputmode="numeric" value="${val}">
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()"><i class="bi bi-trash3-fill"></i></button>
        `;
        container.appendChild(div);
    }

    // --- DATABASE OPERATIONS (FIRESTORE) ---
    async function saveSupplier() {
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        if (!activeUserPhone) return alert("Session expired. Please login again.");

        const name = document.getElementById('sup-name').value.trim().toUpperCase();
        const owner = document.getElementById('sup-owner').value.trim();
        const gst = document.getElementById('sup-gst').value.trim().toUpperCase();
        const upi = document.getElementById('sup-upi').value.trim();
        const address = document.getElementById('sup-address').value.trim();
        
        const phones = [];
        document.querySelectorAll('.phone-input').forEach(input => {
            if(input.value.trim()) phones.push(input.value.trim());
        });

        if (!name || phones.length === 0) return alert("Business Name and at least one Phone Number are required!");

        const btn = document.querySelector('.btn-save');
        btn.innerText = "Saving...";
        btn.disabled = true;

        try {
            const db = firebase.firestore();
            const supplierId = currentEditingSupplierId ? currentEditingSupplierId : 'sup_' + Date.now();

            const supplierData = {
                id: supplierId,
                businessName: name,
                ownerName: owner,
                phoneNumbers: phones,
                gstNumber: gst,
                upiId: upi,
                address: address,
                addedAt: currentEditingSupplierId && globalSuppliersData[supplierId] ? globalSuppliersData[supplierId].addedAt : new Date().toISOString()
            };

            await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(supplierId).set(supplierData);
            
            alert(currentEditingSupplierId ? "Supplier Updated Successfully!" : "Supplier Added Successfully!");
            toggleSupplierForm(); 

        } catch (error) {
            console.error("Error saving supplier:", error);
            alert("Error saving: " + error.message);
        } finally {
            btn.innerHTML = `<i class="bi bi-cloud-arrow-up-fill"></i> Save Supplier`;
            btn.disabled = false;
        }
    }

    async function deleteSupplier(id, name) {
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        if (!activeUserPhone) return;

        if(confirm(`Are you absolutely sure you want to delete ${name}?\n\nThis will remove them from your directory permanently.`)) {
            try {
                const db = firebase.firestore();
                await db.collection('companies').doc(activeUserPhone).collection('suppliers').doc(id).delete();
                alert("Supplier deleted.");
            } catch (err) {
                console.error("Delete failed:", err);
                alert("Delete failed: " + err.message);
            }
        }
    }

    function editSupplier(id) {
        const data = globalSuppliersData[id];
        if(!data) return;

        currentEditingSupplierId = id;
        
        document.getElementById('sup-name').value = data.businessName || '';
        document.getElementById('sup-owner').value = data.ownerName || '';
        document.getElementById('sup-gst').value = data.gstNumber || '';
        document.getElementById('sup-upi').value = data.upiId || '';
        document.getElementById('sup-address').value = data.address || '';
        
        const phoneContainer = document.getElementById('sup-phones-container');
        phoneContainer.innerHTML = ''; 
        if (data.phoneNumbers && data.phoneNumbers.length > 0) {
            data.phoneNumbers.forEach((phone, index) => {
                if(index === 0) {
                    phoneContainer.innerHTML = `<div class="dynamic-row"><input type="number" class="form-control-custom phone-input" value="${phone}"></div>`;
                } else {
                    addSupPhoneField(phone);
                }
            });
        }

        document.getElementById('add-supplier-form').style.display = 'block';
        document.querySelector('#add-supplier-form h2').innerText = "Edit Supplier Details";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- UI INTERACTIONS ---
    function toggleAccordion(id) {
        const body = document.getElementById('sc-body-' + id);
        const icon = document.getElementById('sc-icon-' + id);
        if (body.style.display === 'block') {
            body.style.display = 'none';
            icon.style.transform = 'rotate(0deg)';
        } else {
            body.style.display = 'block';
            icon.style.transform = 'rotate(180deg)';
        }
    }

    function loadSuppliersRealtime() {
        const activeUserPhone = localStorage.getItem("activeUserPhone");
        if (!activeUserPhone) return;

        const listContainer = document.getElementById('supplier-list');
        const db = firebase.firestore();

        db.collection('companies').doc(activeUserPhone).collection('suppliers')
          .orderBy('addedAt', 'desc')
          .onSnapshot((querySnapshot) => {
            
            listContainer.innerHTML = '';
            globalSuppliersData = {}; 

            if (querySnapshot.empty) {
                listContainer.innerHTML = '<p style="text-align: center; color: #64748b; background: #fff; padding: 20px; border-radius: 12px;">No suppliers added yet. Click "Add Supplier" to start.</p>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const sup = doc.data();
                globalSuppliersData[sup.id] = sup; // Save for editing
                
                const primaryPhone = sup.phoneNumbers && sup.phoneNumbers.length > 0 ? sup.phoneNumbers[0] : '';
                
                const card = document.createElement('div');
                card.className = 'supplier-card';
                card.innerHTML = `
                    <div class="sc-header" onclick="toggleAccordion('${sup.id}')">
                        <div class="sc-header-left">
                            <p class="sc-name">${sup.businessName}</p>
                            ${sup.ownerName ? `<p class="sc-owner">Rep: ${sup.ownerName}</p>` : ''}
                        </div>
                        <i class="bi bi-chevron-down sc-toggle-icon" id="sc-icon-${sup.id}"></i>
                    </div>

                    <div class="sc-body" id="sc-body-${sup.id}">
                        <div class="sc-details">
                            <div><i class="bi bi-telephone-fill"></i> ${sup.phoneNumbers ? sup.phoneNumbers.join(', ') : 'N/A'}</div>
                            ${sup.gstNumber ? `<div><i class="bi bi-receipt"></i> GST: ${sup.gstNumber}</div>` : ''}
                            ${sup.upiId ? `<div><i class="bi bi-bank2"></i> UPI: ${sup.upiId}</div>` : ''}
                            ${sup.address ? `<div><i class="bi bi-geo-alt-fill"></i> ${sup.address}</div>` : ''}
                        </div>
                        
                        <div class="sc-actions-grid">
                            <button class="btn-sc btn-call" onclick="window.open('tel:${primaryPhone}')"><i class="bi bi-telephone"></i> Call</button>
                            <button class="btn-sc btn-wa" onclick="window.open('https://wa.me/91${primaryPhone}', '_blank')"><i class="bi bi-whatsapp"></i> WhatsApp</button>
                            <button class="btn-sc btn-pay" onclick="paySupplier('${sup.upiId || ''}', '${sup.businessName}')"><i class="bi bi-currency-rupee"></i> Pay Now</button>
                            <button class="btn-sc btn-bills" onclick="alert('Viewing pending bills feature coming soon!')"><i class="bi bi-receipt-cutoff"></i> Pending Bills</button>
                            <button class="btn-sc btn-print" onclick="printLedger('${sup.businessName}')"><i class="bi bi-printer-fill"></i> Print Ledger / PDF</button>
                        </div>

                        <div class="admin-actions">
                            <button class="btn-sc btn-edit" onclick="editSupplier('${sup.id}')"><i class="bi bi-pencil-square"></i> Edit</button>
                            <button class="btn-sc btn-delete" onclick="deleteSupplier('${sup.id}', '${sup.businessName}')"><i class="bi bi-trash-fill"></i> Delete</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }, (error) => {
            console.error("Error loading suppliers: ", error);
            listContainer.innerHTML = '<p style="text-align: center; color: #ef4444;">Failed to load suppliers.</p>';
        });
    }

    function paySupplier(upi, name) {
        if(!upi) return alert("No UPI ID saved for this supplier. You can pay in Cash.");
        window.location.href = `upi://pay?pa=${upi}&pn=${encodeURIComponent(name)}&cu=INR`;
    }

    function printLedger(name) {
        if(confirm(`Generate Printable Ledger PDF for ${name}?`)) window.print();
    }
</script>
</body>
</html>
