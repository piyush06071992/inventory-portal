<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DEBUG VIEW STOCK</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body style="padding: 20px; font-family: sans-serif;">
    <h2 style="color: navy;">DEBUGGER: Check the Console (F12)</h2>
    <div id="debug-log" style="background: #eee; padding: 15px; border-radius: 8px; font-family: monospace;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuyDgbmycHMjHGupeoZV2lvv_Z0n7WyoY",
            authDomain: "business-saarthi.firebaseapp.com",
            databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
            projectId: "business-saarthi",
            storageBucket: "business-saarthi.firebasestorage.app",
            messagingSenderId: "556256084111",
            appId: "1:556256084111:web:14e841b0e7bfff653170fa"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const log = (msg) => {
            console.log(msg);
            document.getElementById('debug-log').innerHTML += msg + "<br>";
        };

        firebase.auth().onAuthStateChanged((user) => {
            log("1. Firebase Auth state checked...");
            
            if (user) {
                log("✅ User is logged in: " + user.email);
            } else {
                log("❌ User is NOT logged in.");
            }

            const phone = localStorage.getItem("activeUserPhone");
            if (phone) {
                log("✅ activeUserPhone found: " + phone);
            } else {
                log("❌ activeUserPhone is MISSING in localStorage!");
            }
        });
    </script>
</body>
</html>
