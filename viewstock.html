<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Manager - Business Saarthi</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="/auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --navy: #0f172a; --primary: #3b82f6; --emerald: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-light: #64748b; --border: #e2e8f0; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--navy); }
        .wrapper { padding: 20px; max-width: 1400px; margin: auto; padding-bottom: 80px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-bar h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: -0.5px;}
        .btn-action { background: white; border: 2px solid var(--border); padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 800; color: var(--navy); display: flex; align-items: center; gap: 8px; transition: 0.2s;}
        .btn-action:hover { background: #f8fafc; }
        .dashboard-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 24px; }
        .dash-pill { flex: 1; padding: 15px; border-radius: 12px; color: white; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .dash-pill h3 { margin: 0; font-size: 22px; font-weight: 900; }
        .dash-pill p { margin: 0; font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.9;}
        .pill-total { background: linear-gradient(135deg, #0ea5e9, #10b981); }
        .pill-danger { background: linear-gradient(135deg, #f43f5e, #f97316); }
        .pill-warning { background: linear-gradient(135deg, #8b5cf6, #d946ef); }
        .filter-row { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 12px; border-radius: 12px; border: 1px solid var(--border); align-items: center; flex-wrap: wrap;}
        .filter-input { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 700; background: #f8fafc; flex: 1; outline: none;}
        .category-accordion { background: white; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
        .cat-header { background: #f8fafc; padding: 14px 18px; font-size: 16px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .cat-count { background: var(--primary); color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .cat-content { display: none; } .cat-content.open { display: block; }
        .item-row { display: flex; align-items: center; padding: 10px 18px; border-bottom: 1px solid var(--border); gap: 15px; }
        .item-avatar { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: white; }
        .item-details { flex: 2; }
        .item-name { font-size: 14px; font-weight: 900; margin: 0; }
        .item-finance { flex: 1; font-size: 12px; font-weight: 700; }
        .item-stock { flex: 0.5; text-align: center; font-weight: 900; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; }
        .modal-card { background: white; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto;}
        .modal-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: var(--navy); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header-bar">
        <h1>Inventory Manager</h1>
        <div style="display: flex; gap: 10px;">
            <a href="javascript:history.back()" class="btn-action"><i class="bi bi-arrow-left"></i></a>
            <button class="btn-action" style="background:var(--warning); color:white;" onclick="document.getElementById('global-modal').style.display='flex'"><i class="bi bi-megaphone-fill"></i></button>
        </div>
    </div>
    <div id="main-content">
        <div class="dashboard-grid">
            <div class="dash-pill pill-total"><h3 id="dash-total">0</h3><p>Total</p></div>
            <div class="dash-pill pill-danger"><h3 id="dash-low">0</h3><p>Low</p></div>
            <div class="dash-pill pill-warning"><h3 id="dash-exp">0</h3><p>Expiring</p></div>
        </div>
        <div class="filter-row">
            <input type="text" id="search-input" class="filter-input" placeholder="Search..." oninput="renderInventory()">
            <select id="filter-branch" class="filter-input" onchange="fetchInventory(this.value)"></select>
            <select id="filter-category" class="filter-input" onchange="renderInventory()"><option value="ALL">All Cats</option></select>
            <button class="btn-action" style="background:var(--emerald); color:white;" onclick="exportToCSV()"><i class="bi bi-download"></i></button>
        </div>
        <div id="inventory-list"></div>
    </div>
    <div class="modal-overlay" id="promo-modal">
    <div class="modal-card">
        <button onclick="document.getElementById('promo-modal').style.display='none'"><i class="bi bi-x-lg"></i></button>
        <h2 id="promo-item-name"></h2>
        <select id="promo-type" class="modal-input" onchange="togglePromoFields()">
            <option value="">No Offer</option><option value="discount">Discount</option><option value="volume">Volume</option><option value="bogo">BOGO</option>
        </select>
        <div id="promo-dynamic-fields"></div>
        <button class="btn-save" onclick="savePromo()">Apply Offer</button>
    </div>
</div>

<div class="modal-overlay" id="move-modal">
    <div class="modal-card">
        <h2>🚚 Move Stock</h2>
        <p id="move-item-name"></p>
        <input type="number" id="move-qty" class="modal-input" placeholder="Qty">
        <select id="move-target-branch" class="modal-input"></select>
        <button class="btn-save" id="btn-save-move" onclick="saveMove()">Confirm Transfer</button>
    </div>
</div>

<script>
    let activeUserPhone = localStorage.getItem("activeUserPhone");
    let assignedBranch = localStorage.getItem("assignedBranch");
    const activeStaffId = localStorage.getItem("activeStaffId");
    let rawInventory = [], globalBranches = [], currentPromoDocId = null, currentMoveItem = null;

    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged(async () => {
            if (!activeUserPhone) return;
            try { if(assignedBranch && assignedBranch.startsWith('[')) assignedBranch = JSON.parse(assignedBranch); } catch(e){}
            await loadBranches();
        });
    });

    async function loadBranches() {
        const db = firebase.firestore();
        const bSelect = document.getElementById('filter-branch');
        try {
            const snap = await db.collection('companies').doc(activeUserPhone).collection('branches').get();
            globalBranches = [];
            snap.forEach(doc => {
                globalBranches.push({ id: doc.data().branchId, name: doc.data().branchName });
                if (!activeStaffId || assignedBranch === "admin" || assignedBranch === doc.data().branchId) {
                    bSelect.innerHTML += `<option value="${doc.data().branchId}">${doc.data().branchName}</option>`;
                }
            });
            if (bSelect.options.length > 0) fetchInventory(bSelect.value);
        } catch(e) { console.error(e); }
    }

    async function fetchInventory(branchId) {
        if (!branchId) return;
        const snap = await firebase.firestore().collection('companies').doc(activeUserPhone).collection('branches').doc(branchId).collection('inventory').get();
        rawInventory = []; snap.forEach(doc => rawInventory.push({ docId: doc.id, ...doc.data() }));
        renderInventory();
    }

    function renderInventory() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = "";
        const grouped = rawInventory.reduce((acc, item) => { (acc[item.category || "General"] = acc[item.category || "General"] || []).push(item); return acc; }, {});
        
        for (const [cat, items] of Object.entries(grouped)) {
            list.innerHTML += `
                <div class="category-accordion">
                    <div class="cat-header" onclick="this.nextElementSibling.classList.toggle('open')">${cat} <span class="cat-count">${items.length}</span></div>
                    <div id="cat-${cat}" class="cat-content open">${items.map(item => `
                        <div class="item-row">
                            <div class="item-avatar" style="background:#3b82f6">${item.name[0]}</div>
                            <div class="item-details"><h4 class="item-name">${item.name}</h4><span class="item-sku">${item.barcode}</span></div>
                            <div class="item-finance"><span style="font-weight:900;">₹${item.msp}</span></div>
                            <div class="item-actions">
                                <button class="btn-icon" onclick="openMoveModal('${item.docId}')"><i class="bi bi-truck"></i></button>
                                <button class="btn-icon" onclick="openPromoModal('${item.docId}')"><i class="bi bi-gift"></i></button>
                            </div>
                        </div>
                    `).join('')}</div>
                </div>`;
        }
        document.getElementById('dash-total').innerText = rawInventory.length;
    }

    function openMoveModal(docId) { 
        currentMoveItem = rawInventory.find(i => i.docId === docId);
        document.getElementById('move-modal').style.display = 'flex'; 
    }
    function openPromoModal(docId) { currentPromoDocId = docId; document.getElementById('promo-modal').style.display = 'flex'; }
    async function saveMove() { /* Batch update logic here */ alert("Moved!"); }
    async function savePromo() { /* Update offer logic here */ alert("Saved!"); }
    function exportToCSV() { /* CSV Logic */ }
</script>
</body>
</html>
