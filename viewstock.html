<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>View Stock - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="box" id="msg">Verifying session...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuyDgbmycHMjHGupeoZV2lvv_Z0n7WyoY",
            authDomain: "business-saarthi.firebaseapp.com",
            databaseURL: "https://business-saarthi-default-rtdb.firebaseio.com",
            projectId: "business-saarthi",
            storageBucket: "business-saarthi.firebasestorage.app",
            messagingSenderId: "556256084111",
            appId: "1:556256084111:web:14e841b0e7bfff653170fa"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        let initCompleted = false;

        firebase.auth().onAuthStateChanged((user) => {
            // 1. Give Firebase 1 second to confirm the user session
            setTimeout(() => {
                initCompleted = true;
                
                // 2. ONLY redirect if after 1 second, we are STILL null
                if (!user) {
                    window.location.replace('/login.html');
                } else {
                    document.getElementById('msg').innerText = "Session Verified. Redirecting to Inventory...";
                    // You can add your actual code here or redirect to the inventory logic
                    window.location.reload(); 
                }
            }, 1000);
        });
    </script>
</body>
</html>
