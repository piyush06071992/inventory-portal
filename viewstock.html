<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Showroom - Business Saarthi</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="/auth.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { 
            --navy: #0f172a; --primary: #3b82f6; 
            --emerald: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-light: #64748b;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: var(--navy); overflow-x: hidden;}
        .wrapper { padding: 20px; max-width: 1400px; margin: auto; padding-bottom: 80px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header-bar h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1px;}
        
        .btn-action { background: white; border: 2px solid #cbd5e1; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-weight: 800; color: var(--navy); text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 8px;}
        .btn-action:hover { background: #f1f5f9; transform: translateY(-2px); }

        /* Glowing Dashboard Pills */
        .dashboard-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .dash-pill { flex: 1; min-width: 130px; padding: 20px; border-radius: 20px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); transition: transform 0.2s;}
        .dash-pill:hover { transform: translateY(-3px); }
        .dash-pill h3 { margin: 0; font-size: 36px; font-weight: 900; line-height: 1; }
        .dash-pill p { margin: 6px 0 0 0; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9;}
        
        .pill-total { background: linear-gradient(135deg, #0ea5e9, #10b981); box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);}
        .pill-danger { background: linear-gradient(135deg, #f43f5e, #f97316); box-shadow: 0 10px 20px -5px rgba(244, 63, 94, 0.4);}
        .pill-warning { background: linear-gradient(135deg, #8b5cf6, #d946ef); box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);}

        /* Slide-out Side Drawer */
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); z-index: 1999; display: none; backdrop-filter: blur(4px); }
        .side-drawer { position: fixed; top: 0; right: -350px; width: 300px; height: 100%; background: white; z-index: 2000; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 25px rgba(0,0,0,0.1); display: flex; flex-direction: column;}
        .drawer-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .drawer-body label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        .drawer-body input, .drawer-body select { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--navy); background: #f8fafc; outline: none; margin-bottom: 20px; box-sizing: border-box;}
        .drawer-body input:focus, .drawer-body select:focus { border-color: var(--primary); background: white; }

        /* Netflix-style Category Rows */
        .category-section { margin-bottom: 45px; }
        .category-title { font-size: 24px; font-weight: 900; color: var(--navy); margin: 0 0 15px 0; padding-left: 5px; display: flex; align-items: center; gap: 10px; letter-spacing: -0.5px;}
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 20px; padding: 10px 5px 25px 5px; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .horizontal-scroll::-webkit-scrollbar { height: 8px; }
        .horizontal-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .horizontal-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .horizontal-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* The Product Card */
        .product-card { min-width: 260px; max-width: 260px; background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; display: flex; flex-direction: column; scroll-snap-align: start; flex-shrink: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); position: relative; transition: all 0.2s;}
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #cbd5e1;}
        
        /* Smart Image Area */
        .card-image-area { height: 160px; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;}
        .card-image-area h2 { font-size: 60px; color: white; opacity: 0.3; margin: 0; font-weight: 900;}
        
        .promo-badge { position: absolute; top: 12px; left: -8px; background: var(--danger); color: white; padding: 6px 12px 6px 16px; font-size: 11px; font-weight: 900; text-transform: uppercase; border-radius: 0 8px 8px 0; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4); z-index: 10;}
        .gear-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); transition: background 0.2s; z-index: 10;}
        .gear-btn:hover { background: rgba(0,0,0,0.8); }

        .card-body { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { margin: 0 0 4px 0; font-size: 18px; font-weight: 900; line-height: 1.2; }
        .product-sku { font-size: 12px; color: var(--text-light); font-family: monospace; font-weight: 600;}
        
        .price-row { display: flex; justify-content: space-between; align-items: baseline; margin: 12px 0;}
        .msp-price { font-size: 24px; font-weight: 900; color: var(--navy); }
        .stock-pill { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 900; border: 1px solid;}
        .stock-good { background: #dcfce7; color: #065f46; border-color: #86efac; }
        .stock-low { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Privacy Mask Grid */
        .finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 12px;}
        .finance-item { font-size: 9px; color: var(--text-light); display: flex; flex-direction: column; text-transform: uppercase; font-weight: 800;}
        .finance-item strong { color: var(--navy); font-size: 13px; font-weight: 900; display: flex; align-items: center; gap: 6px;}

        /* Card Button Group */
        .btn-group { display: flex; border-top: 1px solid #e2e8f0; background: #f8fafc; }
        .card-btn { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 800; font-size: 12px; text-transform: uppercase; cursor: pointer; color: var(--navy); display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s;}
        .card-btn:hover { background: #e2e8f0; }
        .btn-border-right { border-right: 1px solid #e2e8f0; }
        .promo-active-btn { color: var(--danger); }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.7); z-index: 3000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(4px); }
        .modal-card { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 24px; position: relative; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);}
        .modal-input { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--navy); outline: none; margin-bottom: 15px; box-sizing: border-box; background:#f8fafc;}
        .modal-input:focus { border-color: var(--primary); background:white;}
        .btn-save-modal { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3); margin-top: 10px;}
        
        #error-screen { display: none; text-align: center; margin-top: 10vh; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);}
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-bar">
        <h1>Showroom</h1>
        <div style="display: flex; gap: 10px;">
            <a href="javascript:history.back()" class="btn-action"><i class="bi bi-arrow-left"></i> Exit</a>
            <button class="btn-action" style="border-color:var(--navy); color:white; background:var(--navy);" onclick="openDrawer()"><i class="bi bi-search"></i> Filters</button>
        </div>
    </div>

    <div id="main-content">
        <div class="dashboard-grid">
            <div class="dash-pill pill-total">
                <h3 id="dash-total">0</h3>
                <p>Total Varieties</p>
            </div>
            <div class="dash-pill pill-danger">
                <h3 id="dash-low">0</h3>
                <p>Low Stock</p>
            </div>
            <div class="dash-pill pill-warning">
                <h3 id="dash-exp">0</h3>
                <p>Expiring Soon</p>
            </div>
        </div>

        <div id="inventory-list">
            <div style="text-align: center; padding: 40px; color: var(--text-light);">
                <i class="bi bi-box-seam" style="font-size: 40px; color: #cbd5e1; display: block; margin-bottom: 10px;"></i>
                Loading showroom data...
            </div>
        </div>
    </div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="side-drawer" id="side-drawer">
    <div class="drawer-header">
        <h2 style="margin:0; font-size:20px; font-weight:900;">Search & Filter</h2>
        <button onclick="closeDrawer()" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-light);"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="drawer-body">
        <label>Search Products</label>
        <input type="text" id="search-input" placeholder="Name or Barcode..." oninput="renderInventory()">
        
        <label>Select Branch</label>
        <select id="filter-branch" onchange="fetchInventory()"></select>
        
        <label>Category</label>
        <select id="filter-category" onchange="handleCategoryFilter()"><option value="ALL">All Categories</option></select>
        
        <label>Sub-Category</label>
        <select id="filter-subcategory" onchange="renderInventory()"><option value="ALL">All Sub-Categories</option></select>
        
        <button class="btn-action" style="width:100%; justify-content:center; margin-top:20px; background:var(--emerald); color:white; border:none;" onclick="exportToCSV()"><i class="bi bi-file-earmark-excel-fill"></i> Export to Excel</button>
    </div>
</div>

<div class="modal-overlay" id="promo-modal">
    <div class="modal-card">
        <button onclick="closePromoModal()" style="position:absolute; top:16px; right:16px; background:#f1f5f9; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; color:var(--text-light);"><i class="bi bi-x-lg"></i></button>
        <h2 style="margin:0 0 5px 0; color:var(--navy); font-size:22px; font-weight:900;">🎁 Setup Offer</h2>
        <p id="promo-item-name" style="margin:0 0 20px 0; color:var(--text-light); font-size:14px; font-weight:600;"></p>

        <div style="text-align: left; margin-bottom: 15px;">
            <label style="font-size: 11px; font-weight: 800; color: var(--text-light); text-transform: uppercase;">Offer Type</label>
            <select id="promo-type" class="modal-input" style="margin-top: 5px;" onchange="togglePromoFields()">
                <option value="">No Offer (Remove Promotion)</option>
                <option value="flat_pct">Percentage Off (e.g., 10% Off)</option>
                <option value="flat_amt">Flat Amount Off (e.g., ₹50 Off)</option>
                <option value="volume">Volume Deal (e.g., Buy 3 for ₹100)</option>
                <option value="bogo">BOGO (e.g., Buy 2 Get 1 Free)</option>
            </select>
        </div>

        <div id="promo-dynamic-fields" style="text-align: left;"></div>
        
        <button class="btn-save-modal" id="btn-save-promo" onclick="savePromo()">Apply Promotion</button>
    </div>
</div>

<div class="modal-overlay" id="move-modal">
    <div class="modal-card">
        <button onclick="closeMoveModal()" style="position:absolute; top:16px; right:16px; background:#f1f5f9; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; color:var(--text-light);"><i class="bi bi-x-lg"></i></button>
        <h2 style="margin:0 0 5px 0; color:var(--navy); font-size:22px; font-weight:900;">🚚 Move Stock</h2>
        <p id="move-item-name" style="margin:0 0 15px 0; color:var(--primary); font-size:16px; font-weight:800;"></p>

        <div style="text-align: left; margin-bottom: 15px;">
            <label style="font-size: 11px; font-weight: 800; color: var(--text-light); text-transform: uppercase;">Quantity to Move <span id="move-max-qty" style="color: var(--danger);"></span></label>
            <input type="number" id="move-qty" class="modal-input" style="margin-top: 5px;" min="1" oninput="validateMoveQty()">
        </div>

        <div style="text-align: left;">
            <label style="font-size: 11px; font-weight: 800; color: var(--text-light); text-transform: uppercase;">Destination Branch</label>
            <select id="move-target-branch" class="modal-input" style="margin-top: 5px;"></select>
        </div>
        
        <button class="btn-save-modal" id="btn-save-move" onclick="saveMove()">Confirm Transfer</button>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-card">
        <button onclick="closeSettingsModal()" style="position:absolute; top:16px; right:16px; background:#f1f5f9; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; color:var(--text-light);"><i class="bi bi-x-lg"></i></button>
        <h2 style="margin:0 0 5px 0; color:var(--navy); font-size:22px; font-weight:900;">⚙️ Stock Settings</h2>
        <p id="set-item-name" style="margin:0 0 20px 0; color:var(--primary); font-size:16px; font-weight:800;"></p>

        <div style="text-align: left; margin-bottom: 15px;">
            <label style="font-size: 11px; font-weight: 800; color: var(--text-light); text-transform: uppercase;">Low Stock Alert Level</label>
            <input type="number" id="set-min-stock" class="modal-input" style="margin-top: 5px;" min="0">
            <p style="font-size: 11px; color: var(--text-light); margin-top: 0; line-height: 1.4;">
                The pill will flash <strong style="color:var(--danger);">red</strong> if physical stock falls below this.
            </p>
        </div>
        
        <button class="btn-save-modal" id="btn-save-settings" onclick="saveSettings()">Save Settings</button>
    </div>
</div>

<script>
    let activeUserPhone = localStorage.getItem("activeUserPhone");
    let assignedBranch = localStorage.getItem("assignedBranch");
    const activeStaffId = localStorage.getItem("activeStaffId");

    let shopTaxonomy = {};
    let rawInventory = []; 
    let globalBranches = []; 
    
    let currentMoveItem = null;
    let currentSettingsDocId = null;
    let currentPromoDocId = null;

    // Image Gradients for Placeholders
    const bgGradients = [
        'linear-gradient(135deg, #3b82f6, #8b5cf6)', 'linear-gradient(135deg, #10b981, #0ea5e9)',
        'linear-gradient(135deg, #f43f5e, #f97316)', 'linear-gradient(135deg, #8b5cf6, #d946ef)',
        'linear-gradient(135deg, #14b8a6, #eab308)', 'linear-gradient(135deg, #6366f1, #3b82f6)'
    ];

    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged(async () => {
            if (!activeUserPhone) return; 
            try { if(assignedBranch && assignedBranch.startsWith('[')) assignedBranch = JSON.parse(assignedBranch); } catch(e){}
            await loadShopTaxonomy(); 
            await loadBranches();
        });
    });

    // --- DRAWER UI LOGIC ---
    function openDrawer() {
        document.getElementById('side-drawer').style.right = '0';
        document.getElementById('drawer-overlay').style.display = 'block';
    }
    function closeDrawer() {
        document.getElementById('side-drawer').style.right = '-350px';
        document.getElementById('drawer-overlay').style.display = 'none';
    }

    // --- DATA LOADERS ---
    async function loadShopTaxonomy() {
        try {
            const doc = await firebase.firestore().collection('companies').doc(activeUserPhone).collection('settings').doc('params').get();
            if (doc.exists && doc.data().shopTaxonomy) {
                shopTaxonomy = doc.data().shopTaxonomy;
                const catFilter = document.getElementById('filter-category');
                for (const cat in shopTaxonomy) { catFilter.innerHTML += `<option value="${cat}">${cat}</option>`; }
            }
        } catch(e) { console.error(e); }
    }

    async function loadBranches() {
        const db = firebase.firestore();
        const bSelect = document.getElementById('filter-branch');
        bSelect.innerHTML = '<option value="">Select Branch...</option>';
        globalBranches = [];
        
        try {
            const snap = await db.collection('companies').doc(activeUserPhone).collection('branches').get();
            snap.forEach(doc => {
                const bId = doc.data().branchId; const bName = doc.data().branchName;
                globalBranches.push({ id: bId, name: bName });
                const isAdmin = !activeStaffId || assignedBranch === "admin";
                const isAssigned = Array.isArray(assignedBranch) ? assignedBranch.includes(bId) : assignedBranch === bId;
                if (isAdmin || isAssigned) bSelect.innerHTML += `<option value="${bId}">${bName}</option>`;
            });

            if (bSelect.options.length === 2) {
                bSelect.selectedIndex = 1; fetchInventory();
            }
        } catch(e) { alert("Database error: " + e.message); }
    }

    async function fetchInventory() {
        const branchId = document.getElementById('filter-branch').value;
        if (!branchId) return;

        document.getElementById('inventory-list').innerHTML = `<div style="text-align:center; padding:40px;"><p style="font-weight:800; color:var(--primary);">Arranging Carousels...</p></div>`;
        const db = firebase.firestore();
        try {
            const snap = await db.collection('companies').doc(activeUserPhone).collection('branches').doc(branchId).collection('inventory').get();
            rawInventory = [];
            snap.forEach(doc => { rawInventory.push({ docId: doc.id, ...doc.data() }); });
            renderInventory();
        } catch(e) { alert("Error: " + e.message); }
    }

    function handleCategoryFilter() {
        const cat = document.getElementById('filter-category').value;
        const subSelect = document.getElementById('filter-subcategory');
        subSelect.innerHTML = '<option value="ALL">All Sub-Categories</option>';
        if (cat !== 'ALL' && shopTaxonomy[cat]) {
            shopTaxonomy[cat].forEach(sub => { subSelect.innerHTML += `<option value="${sub}">${sub}</option>`; });
        }
        renderInventory();
    }

    function isExpiringSoon(dateString) {
        if(!dateString) return false;
        const diffDays = Math.ceil((new Date(dateString) - new Date()) / (1000 * 60 * 60 * 24));
        return diffDays > 0 && diffDays <= 30;
    }

    // Toggle Privacy Mask
    window.togglePrice = function(docId) {
        const el = document.getElementById(`price-${docId}`);
        const icon = document.getElementById(`eye-${docId}`);
        if(el.innerText === '₹ ***') {
            el.innerText = el.getAttribute('data-price');
            icon.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
            icon.style.color = 'var(--danger)';
        } else {
            el.innerText = '₹ ***';
            icon.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
            icon.style.color = 'var(--primary)';
        }
    };

    function renderInventory() {
        const list = document.getElementById('inventory-list');
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const fCat = document.getElementById('filter-category').value;
        const fSub = document.getElementById('filter-subcategory').value;

        let totalItems = 0; let lowStock = 0; let expAlert = 0;
        list.innerHTML = "";

        const filtered = rawInventory.filter(item => {
            const textMatch = (item.name && item.name.toLowerCase().includes(query)) || (item.barcode && item.barcode.toLowerCase().includes(query));
            if(!textMatch) return false;
            if(fCat !== 'ALL' && item.category !== fCat) return false;
            if(fSub !== 'ALL' && item.subcategory !== fSub) return false;
            return true;
        });

        if(filtered.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:60px; color:var(--text-light);"><i class="bi bi-box" style="font-size:48px;"></i><h3>Empty View</h3></div>`;
            return;
        }

        const grouped = {};
        filtered.forEach(item => {
            totalItems++;
            const cat = item.category || 'Uncategorized';
            if(!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(item);
        });

        for (const [categoryName, items] of Object.entries(grouped)) {
            let sectionHTML = `
            <div class="category-section">
                <h2 class="category-title">${categoryName} <span style="font-size:14px; color:var(--text-light); font-weight:600; padding-top:4px;">(${items.length})</span></h2>
                <div class="horizontal-scroll">`;

            items.forEach((item, index) => {
                const costPrice = parseFloat(item.costPer || 0).toFixed(2);
                const mspPrice = parseFloat(item.msp || 0).toFixed(2);
                const minStockLevel = item.minStock !== undefined ? parseFloat(item.minStock) : 5;
                const isLow = parseFloat(item.qty) < minStockLevel; 
                const isExp = isExpiringSoon(item.expiryDate);
                
                if(isLow) lowStock++; if(isExp) expAlert++;

                // Smart Image Logic
                const firstLetter = item.name ? item.name.charAt(0).toUpperCase() : 'B';
                const bgGrad = bgGradients[index % bgGradients.length];
                
                // Promo Engine Logic
                let badgeHTML = '';
                let hasPromo = false;
                if(item.offer) {
                    hasPromo = true;
                    let txt = '';
                    if(item.offer.type === 'flat_pct') txt = `🔥 ${item.offer.value}% OFF`;
                    if(item.offer.type === 'flat_amt') txt = `🔥 ₹${item.offer.value} OFF`;
                    if(item.offer.type === 'volume') txt = `📦 ${item.offer.reqQty} FOR ₹${item.offer.targetPrice}`;
                    if(item.offer.type === 'bogo') txt = `✨ BUY ${item.offer.reqQty} GET ${item.offer.freeQty}`;
                    badgeHTML = `<div class="promo-badge">${txt}</div>`;
                }

                // Render Card
                sectionHTML += `
                    <div class="product-card">
                        <div class="card-image-area" style="background: ${bgGrad};">
                            ${badgeHTML}
                            <div class="gear-btn" onclick="openSettingsModal('${item.docId}', '${item.name.replace(/'/g, "\\'")}', ${minStockLevel})"><i class="bi bi-gear-fill"></i></div>
                            <h2>${firstLetter}</h2>
                        </div>
                        
                        <div class="card-body">
                            <h4 class="product-name" title="${item.name}">${item.name.length > 22 ? item.name.substring(0,22)+'...' : item.name}</h4>
                            <span class="product-sku">SKU: ${item.barcode}</span>
                            
                            <div class="price-row">
                                <span class="msp-price">₹${mspPrice}</span>
                                <span class="stock-pill ${isLow ? 'stock-low' : 'stock-good'}">
                                    <i class="bi ${isLow ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill'}"></i> ${item.qty} ${item.unit}
                                </span>
                            </div>

                            <div class="finance-grid">
                                <div class="finance-item">
                                    <span style="display:flex; justify-content:space-between; align-items:center;">Wholesale <i id="eye-${item.docId}" class="bi bi-eye-fill" onclick="togglePrice('${item.docId}')" style="cursor:pointer; color:var(--primary); font-size:14px;"></i></span>
                                    <strong><span id="price-${item.docId}" data-price="₹${costPrice}">₹ ***</span></strong>
                                </div>
                                <div class="finance-item">
                                    <span>GST Rate</span>
                                    <strong>${item.gstRate || 0}% ${item.gstType ? `(${item.gstType})` : ''}</strong>
                                </div>
                            </div>
                        </div>

                        <div class="btn-group">
                            <button class="card-btn btn-border-right" onclick="openMoveModal('${item.docId}')"><i class="bi bi-truck"></i> Move</button>
                            <button class="card-btn ${hasPromo ? 'promo-active-btn' : ''}" onclick="openPromoModal('${item.docId}', '${item.name.replace(/'/g, "\\'")}')"><i class="bi bi-gift-fill"></i> Offer</button>
                        </div>
                    </div>
                `;
            });

            sectionHTML += `</div></div>`;
            list.innerHTML += sectionHTML;
        }

        document.getElementById('dash-total').innerText = totalItems;
        document.getElementById('dash-low').innerText = lowStock;
        document.getElementById('dash-exp').innerText = expAlert;
    }

    // --- PROMO ENGINE LOGIC ---
    function openPromoModal(docId, name) {
        currentPromoDocId = docId;
        const item = rawInventory.find(i => i.docId === docId);
        document.getElementById('promo-item-name').innerText = name;
        
        const typeSelect = document.getElementById('promo-type');
        if(item.offer && item.offer.type) {
            typeSelect.value = item.offer.type;
        } else { typeSelect.value = ""; }
        
        togglePromoFields(item.offer);
        document.getElementById('promo-modal').style.display = 'flex';
    }

    function closePromoModal() { document.getElementById('promo-modal').style.display = 'none'; }

    function togglePromoFields(existingOffer = null) {
        const type = document.getElementById('promo-type').value;
        const container = document.getElementById('promo-dynamic-fields');
        container.innerHTML = "";

        if (type === "flat_pct") {
            container.innerHTML = `<label style="font-size:11px; font-weight:800; color:var(--text-light);">Percentage Discount (%)</label><input type="number" id="promo-val" class="modal-input" placeholder="e.g. 10" value="${existingOffer?.value||''}">`;
        } else if (type === "flat_amt") {
            container.innerHTML = `<label style="font-size:11px; font-weight:800; color:var(--text-light);">Flat Amount Discount (₹)</label><input type="number" id="promo-val" class="modal-input" placeholder="e.g. 50" value="${existingOffer?.value||''}">`;
        } else if (type === "volume") {
            container.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><label style="font-size:11px; font-weight:800; color:var(--text-light);">Buy Quantity</label><input type="number" id="promo-req" class="modal-input" placeholder="e.g. 3" value="${existingOffer?.reqQty||''}"></div>
                    <div style="flex:1;"><label style="font-size:11px; font-weight:800; color:var(--text-light);">For Final Price (₹)</label><input type="number" id="promo-price" class="modal-input" placeholder="e.g. 100" value="${existingOffer?.targetPrice||''}"></div>
                </div>`;
        } else if (type === "bogo") {
            container.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><label style="font-size:11px; font-weight:800; color:var(--text-light);">Buy Quantity</label><input type="number" id="promo-req" class="modal-input" placeholder="e.g. 2" value="${existingOffer?.reqQty||''}"></div>
                    <div style="flex:1;"><label style="font-size:11px; font-weight:800; color:var(--text-light);">Get Free Qty</label><input type="number" id="promo-free" class="modal-input" placeholder="e.g. 1" value="${existingOffer?.freeQty||''}"></div>
                </div>`;
        }
    }

    async function savePromo() {
        const type = document.getElementById('promo-type').value;
        let offerObj = null;

        if (type !== "") {
            offerObj = { type: type };
            if (type === "flat_pct" || type === "flat_amt") {
                const val = parseFloat(document.getElementById('promo-val').value);
                if(isNaN(val) || val <= 0) return alert("Invalid discount value.");
                offerObj.value = val;
            } else if (type === "volume") {
                const req = parseFloat(document.getElementById('promo-req').value);
                const price = parseFloat(document.getElementById('promo-price').value);
                if(isNaN(req) || isNaN(price)) return alert("Invalid volume configuration.");
                offerObj.reqQty = req; offerObj.targetPrice = price;
            } else if (type === "bogo") {
                const req = parseFloat(document.getElementById('promo-req').value);
                const free = parseFloat(document.getElementById('promo-free').value);
                if(isNaN(req) || isNaN(free)) return alert("Invalid BOGO configuration.");
                offerObj.reqQty = req; offerObj.freeQty = free;
            }
        } // If type is "", offerObj remains null, effectively deleting the offer

        const branchId = document.getElementById('filter-branch').value;
        const btn = document.getElementById('btn-save-promo');
        btn.innerText = "SAVING..."; btn.disabled = true;

        try {
            const db = firebase.firestore();
            const ref = db.collection('companies').doc(activeUserPhone).collection('branches').doc(branchId).collection('inventory').doc(currentPromoDocId);
            
            if (offerObj) { await ref.update({ offer: offerObj }); } 
            else { await ref.update({ offer: firebase.firestore.FieldValue.delete() }); }

            const index = rawInventory.findIndex(i => i.docId === currentPromoDocId);
            if(index !== -1) {
                if(offerObj) rawInventory[index].offer = offerObj;
                else delete rawInventory[index].offer;
            }
            
            closePromoModal(); renderInventory();
        } catch(e) { alert("Error saving promotion: " + e.message); }
        
        btn.innerText = "Apply Promotion"; btn.disabled = false;
    }

    // --- MOVE STOCK LOGIC ---
    function openMoveModal(docId) {
        currentMoveItem = rawInventory.find(i => i.docId === docId);
        const currentBranchId = document.getElementById('filter-branch').value;
        const targetSelect = document.getElementById('move-target-branch');
        targetSelect.innerHTML = '<option value="">Select Destination...</option>';
        globalBranches.forEach(b => { if (b.id !== currentBranchId) targetSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`; });
        
        if(targetSelect.options.length <= 1) return alert("You need another branch to move stock to.");
        document.getElementById('move-item-name').innerText = currentMoveItem.name;
        document.getElementById('move-max-qty').innerText = `(Max: ${currentMoveItem.qty})`;
        document.getElementById('move-qty').value = 1; document.getElementById('move-qty').max = currentMoveItem.qty;
        document.getElementById('move-modal').style.display = 'flex';
    }
    function closeMoveModal() { document.getElementById('move-modal').style.display = 'none'; currentMoveItem = null; }
    function validateMoveQty() {
        const input = document.getElementById('move-qty'); let val = parseFloat(input.value);
        if (isNaN(val) || val <= 0) input.value = 1;
        if (val > currentMoveItem.qty) input.value = currentMoveItem.qty;
    }
    async function saveMove() {
        const moveQty = parseFloat(document.getElementById('move-qty').value);
        const targetBranchId = document.getElementById('move-target-branch').value;
        const currentBranchId = document.getElementById('filter-branch').value;
        if(!targetBranchId) return alert("Select a destination.");
        
        const btn = document.getElementById('btn-save-move'); btn.innerText = "MOVING..."; btn.disabled = true;

        try {
            const db = firebase.firestore(); const batch = db.batch();
            const sourceRef = db.collection('companies').doc(activeUserPhone).collection('branches').doc(currentBranchId).collection('inventory').doc(currentMoveItem.docId);
            const targetInvRef = db.collection('companies').doc(activeUserPhone).collection('branches').doc(targetBranchId).collection('inventory');
            const existingSnap = await targetInvRef.where('barcode', '==', currentMoveItem.barcode).get();

            batch.update(sourceRef, { qty: firebase.firestore.FieldValue.increment(-moveQty) });
            if (!existingSnap.empty) { batch.update(targetInvRef.doc(existingSnap.docs[0].id), { qty: firebase.firestore.FieldValue.increment(moveQty) }); } 
            else {
                const newDoc = targetInvRef.doc(); const newItemData = { ...currentMoveItem, qty: moveQty }; delete newItemData.docId; 
                batch.set(newDoc, newItemData);
            }
            await batch.commit();

            const unitName = currentMoveItem.unit;
            currentMoveItem.qty -= moveQty;
            if(currentMoveItem.qty <= 0) rawInventory = rawInventory.filter(i => i.docId !== currentMoveItem.docId);
            renderInventory(); closeMoveModal();
            alert(`✅ Moved ${moveQty} ${unitName} successfully.`);
        } catch(e) { alert("Error: " + e.message); }
        btn.innerText = "Confirm Transfer"; btn.disabled = false;
    }

    // --- SETTINGS (MINIMUM STOCK) LOGIC ---
    function openSettingsModal(docId, name, currentMinStock) {
        currentSettingsDocId = docId; document.getElementById('set-item-name').innerText = name;
        document.getElementById('set-min-stock').value = currentMinStock;
        document.getElementById('settings-modal').style.display = 'flex';
    }
    function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; currentSettingsDocId = null; }
    async function saveSettings() {
        let newMinStock = parseFloat(document.getElementById('set-min-stock').value);
        if (isNaN(newMinStock) || newMinStock < 0) newMinStock = 0;
        const currentBranchId = document.getElementById('filter-branch').value;
        const btn = document.getElementById('btn-save-settings'); btn.innerText = "SAVING..."; btn.disabled = true;

        try {
            await firebase.firestore().collection('companies').doc(activeUserPhone).collection('branches').doc(currentBranchId).collection('inventory').doc(currentSettingsDocId).update({ minStock: newMinStock });
            const index = rawInventory.findIndex(i => i.docId === currentSettingsDocId);
            if(index !== -1) rawInventory[index].minStock = newMinStock;
            closeSettingsModal(); renderInventory(); 
        } catch(e) { alert("Error: " + e.message); }
        btn.innerText = "Save Settings"; btn.disabled = false;
    }

    // --- CSV EXPORT ---
    function exportToCSV() {
        if(rawInventory.length === 0) return alert("No data to export.");
        let csvContent = "data:text/csv;charset=utf-8,Product Name,SKU,Category,Sub-Category,Quantity,Unit,Buy Price,GST Rate,MSP,Offer\n";
        rawInventory.forEach(item => {
            const offerStr = item.offer ? `${item.offer.type} - Val: ${item.offer.value || item.offer.reqQty}` : "None";
            csvContent += `"${(item.name||"").replace(/"/g, '""')}",${item.barcode||""},${item.category||""},${item.subcategory||""},${item.qty||0},${item.unit||""},${item.costPer||0},${item.gstRate||0}%,${item.msp||0},"${offerStr}"\n`;
        });
        const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `Showroom_Export.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
</script>
</body>
</html>
